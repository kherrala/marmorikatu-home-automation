# Port 80 – serves the kiosk HTML app
server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Port 81 – transparent proxy for Grafana
# Strips X-Frame-Options / CSP so the iframe is allowed.
# All Grafana sub-resources (JS, CSS, API, WebSockets) are proxied
# transparently so Grafana never needs to know it is behind a proxy.
server {
    listen 81;
    location / {
        proxy_pass         http://grafana:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              grafana:3000;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
    }
}

# Port 82 – transparent proxy for WAGO WebVisu
# Accepts self-signed TLS from the PLC and strips framing restrictions.
server {
    listen 82;
    location / {
        proxy_pass         https://192.168.1.10;
        proxy_http_version 1.1;
        proxy_set_header   Host              192.168.1.10;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_ssl_verify   off;
        proxy_hide_header  X-Frame-Options;
        proxy_hide_header  Content-Security-Policy;
    }
}
