<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    /* -- Slides ----------------------------------------------------------- */
    #slides { position: fixed; inset: 0; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* -- Swipe / click edge strips ---------------------------------------- */
    .swipe-edge {
      position: fixed;
      top: 20%;
      height: 60%;
      width: 120px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 6px 6px 0;
    }
    #swipe-left  { left: 0; border-radius: 0 6px 6px 0; }
    #swipe-right { right: 0; border-radius: 6px 0 0 6px; }

    .swipe-edge::after {
      content: var(--chevron);
      font-size: 28px;
      color: rgba(255,255,255,0.18);
      transition: color 0.2s, transform 0.2s;
      user-select: none;
    }
    .swipe-edge:hover::after {
      color: rgba(255,255,255,0.65);
      transform: scale(1.2);
    }
    #swipe-left  { --chevron: "\2039"; }
    #swipe-right { --chevron: "\203A"; }

    /* -- Navigation dots -------------------------------------------------- */
    #nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      pointer-events: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.45);
    }

    /* -- Pause badge ------------------------------------------------------ */
    #pause-badge {
      position: fixed;
      bottom: 52px;
      right: 14px;
      z-index: 200;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #pause-badge.visible { opacity: 1; }

    /* -- Start overlay (iOS audio/camera unlock) -------------------------- */
    #start-overlay {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 20px 28px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    #start-overlay.hidden { display: none; }

    #start-overlay .label {
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    #start-overlay .sublabel {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 8px;
    }
    #init-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    #init-spinner.hidden { display: none; }
    #init-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }
    #init-error.visible { display: flex; }
    #init-error .error-message {
      color: rgba(255,255,255,0.7);
      font-size: 18px;
    }
    #retry-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #skip-btn {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: underline;
    }

    /* -- Status indicator dot ---------------------------------------------- */
    #camera-dot {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s, background 0.3s;
    }
    #camera-dot.active { opacity: 0.7; background: #4caf50; }
    #camera-dot.failed { opacity: 0.7; background: #e53935; }

    /* -- Greeting overlay (centered card) --------------------------------- */
    #greeting-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #greeting-overlay.visible {
      opacity: 1;
      pointer-events: none;
    }
    #greeting-card {
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 36px 40px 32px;
      max-width: 460px;
      width: 90%;
      transform: scale(0.92) translateY(12px);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #greeting-overlay.visible #greeting-card {
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    /* -- Avatar ----------------------------------------------------------- */
    #avatar-container {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #avatar {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }

    .avatar-eye-lid {
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0.05); }
    }

    .avatar-mouth-inner {
      transform-origin: 60px 80px;
      transition: transform 0.15s ease;
    }
    #avatar.speaking .avatar-mouth-inner {
      animation: speak 0.3s ease-in-out infinite alternate;
    }
    @keyframes speak {
      0%   { transform: scaleY(0.5) scaleX(0.9); }
      100% { transform: scaleY(1.4) scaleX(1.05); }
    }

    #avatar.speaking {
      animation: headBob 1.2s ease-in-out infinite;
    }
    @keyframes headBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%  { transform: translateY(-3px) rotate(1.5deg); }
      75%  { transform: translateY(-2px) rotate(-1.5deg); }
    }

    #avatar.listening {
      animation: listenAttentive 1.4s ease-in-out infinite;
    }
    @keyframes listenAttentive {
      0%   { transform: rotate(-6deg) translateY(2px); }
      50%  { transform: rotate(6deg) translateY(-4px); }
      100% { transform: rotate(-6deg) translateY(2px); }
    }

    /* Radical listening face */
    #avatar.listening .avatar-eye-lid {
      animation: none;
      transform: scaleY(1.35);
      transform-box: fill-box;
      transform-origin: center;
    }
    #avatar.listening #eb-l  { transform: translateY(-5px); }
    #avatar.listening #eb-r  { transform: translateY(-5px); }
    #avatar.listening #lash-l { transform: translateY(-5px); }
    #avatar.listening #lash-r { transform: translateY(-5px); }
    #avatar.listening .avatar-mouth-inner { display: none; }
    #avatar.listening #listen-mouth { display: block !important; }

    /* -- Greeting content ------------------------------------------------- */
    #greeting-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 480px;
    }

    #greeting-text {
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      text-align: center;
    }

    #report-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
    }

    #report-text {
      color: rgba(255,255,255,0.85);
      font-size: 17px;
      font-weight: 300;
      line-height: 1.5;
      text-align: center;
    }

    #report-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      margin-top: 2px;
    }
    #report-spinner.hidden { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* -- User speech text -------------------------------------------------- */
    #user-text {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      font-style: italic;
      text-align: center;
      min-height: 0;
      transition: opacity 0.3s;
    }
    #user-text:empty { display: none; }

    /* -- Minimized avatar (bottom-right after greeting) -------------------- */
    #greeting-overlay.minimized #greeting-card {
      position: fixed;
      bottom: 64px;
      right: 20px;
      max-width: 460px;
      width: auto;
      padding: 14px 18px 14px 14px;
      border-radius: 20px;
      gap: 12px;
      flex-direction: row;
      pointer-events: auto;
      transform: scale(1) translateY(0);
      animation: cardMinimize 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardMinimize {
      0% { opacity: 0.7; transform: scale(1.4); }
      100% { opacity: 1; transform: scale(1); }
    }
    #greeting-overlay.minimized #avatar-container {
      width: 188px;
      height: 188px;
    }
    #greeting-overlay.minimized #greeting-content {
      align-items: flex-start;
      gap: 4px;
      max-width: 360px;
    }
    #greeting-overlay.minimized #greeting-text { display: none; }
    #greeting-overlay.minimized #report-row { gap: 6px; }
    #greeting-overlay.minimized #report-text {
      font-size: 26px;
      line-height: 1.35;
      text-align: left;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #greeting-overlay.minimized #user-text {
      font-size: 24px;
      text-align: left;
    }
    #greeting-overlay.minimized #listening-indicator {
      margin-top: 2px;
      gap: 6px;
    }
    #greeting-overlay.minimized #listening-indicator span { font-size: 24px; }
    #greeting-overlay.minimized #mic-pulse { width: 20px; height: 20px; }
    #greeting-overlay.minimized #report-spinner {
      width: 28px; height: 28px;
    }

    /* -- Listening indicator ----------------------------------------------- */
    #listening-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    #listening-indicator.hidden { display: none; }

    #listening-indicator span {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 300;
    }

    #mic-pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e53935;
      animation: micPulse 1.5s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <!-- Start overlay: user must tap to unlock camera + audio on iOS -->
  <div id="start-overlay">
    <div class="label">Kosketa aloittaaksesi</div>
    <div class="sublabel">Kamera ja puhe aktivoidaan</div>
    <div id="init-spinner" class="hidden"></div>
    <div id="init-error">
      <div class="error-message">Kamera ei käytettävissä</div>
      <button id="retry-btn">Yritä uudelleen</button>
      <a id="skip-btn" href="#">Jatka ilman kameraa</a>
    </div>
  </div>

  <!-- Camera active indicator -->
  <div id="camera-dot"></div>

  <!-- Greeting + AI report overlay -->
  <div id="greeting-overlay">
    <div id="greeting-card">
      <div id="avatar-container">
        <svg id="avatar" viewBox="0 0 120 120" fill="none">
          <!-- Hair back -->
          <ellipse cx="60" cy="58" rx="46" ry="50" fill="#3d2b1f"/>
          <!-- Neck -->
          <rect x="50" y="92" width="20" height="16" rx="6" fill="#f0c8a0"/>
          <!-- Face -->
          <ellipse cx="60" cy="62" rx="34" ry="38" fill="#f5d4b8"/>
          <!-- Hair front / bangs -->
          <path d="M26 50 Q32 22 60 18 Q88 22 94 50 Q88 34 60 30 Q32 34 26 50z" fill="#3d2b1f"/>
          <!-- Hair sides -->
          <path d="M26 50 Q22 65 24 90 Q28 80 30 60z" fill="#3d2b1f"/>
          <path d="M94 50 Q98 65 96 90 Q92 80 90 60z" fill="#3d2b1f"/>
          <!-- Eyebrows -->
          <path id="eb-l" d="M40 48 Q47 44 54 47" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path id="eb-r" d="M66 47 Q73 44 80 48" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- Eyes -->
          <g class="avatar-eye-lid">
            <ellipse cx="47" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="47" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="48.5" cy="55" r="1.3" fill="#fff"/>
            <ellipse cx="73" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="73" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="74.5" cy="55" r="1.3" fill="#fff"/>
          </g>
          <!-- Eyelashes -->
          <path id="lash-l" d="M41 51.5 Q47 49 53 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <path id="lash-r" d="M67 51.5 Q73 49 79 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <!-- Nose -->
          <path d="M58 66 Q60 70 62 66" stroke="#dbb896" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- Mouth (normal smile) -->
          <g class="avatar-mouth-inner">
            <path d="M48 78 Q54 84 60 84 Q66 84 72 78" stroke="#d4736a" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M50 79 Q60 86 70 79" fill="#d4736a" fill-opacity="0.25"/>
          </g>
          <!-- Listening mouth (subtle open, hidden by default) -->
          <g id="listen-mouth" style="display:none">
            <ellipse cx="60" cy="81" rx="7" ry="3.5" fill="#b05050"/>
            <ellipse cx="60" cy="81" rx="4.5" ry="2" fill="#7a2020"/>
          </g>
          <!-- Cheek blush -->
          <circle cx="38" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
          <circle cx="82" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
        </svg>
      </div>
      <div id="greeting-content">
        <div id="greeting-text"></div>
        <div id="report-row">
          <div id="report-spinner"></div>
          <div id="report-text"></div>
        </div>
        <div id="user-text"></div>
        <div id="listening-indicator" class="hidden">
          <div id="mic-pulse"></div>
          <span>Kuuntelen...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="slides"></div>

  <!-- Swipe / click zones on left and right edges only -->
  <div class="swipe-edge" id="swipe-left"></div>
  <div class="swipe-edge" id="swipe-right"></div>

  <!-- Navigation dots -->
  <div id="nav"></div>

  <div id="pause-badge">&#x23F8; jatkuu 30 s</div>

  <!-- Hidden video element for face detection camera feed -->
  <video id="camera" autoplay playsinline muted width="320" height="240"
         style="position:fixed;top:-9999px;left:-9999px;"></video>

  <!-- Greeting jingle (local MP3, preloaded for instant playback) -->
  <audio id="jingle" preload="auto" src="/jingle.mp3"></audio>
  <!-- Persistent TTS audio element (reused to maintain iOS audio unlock) -->
  <audio id="tts-audio" preload="none"></audio>

  <!-- face-api.js (served from nginx static files, downloaded during Docker build) -->
  <script src="/face-api/face-api.min.js"></script>

  <script>
    // == Config ================================================================
    const WEBVISU_ENABLED = new URLSearchParams(window.location.search).has('webvisu');
    const CAROUSEL_MS = 30_000;
    const PAUSE_MS    = 30_000;
    const PEAK_START  = 6;
    const PEAK_END    = 9;

    // == Sunrise/sunset for Grafana theme (Tampere 61.50N, 23.76E) ==============
    const SUN_LAT = 61.4978, SUN_LNG = 23.7610;
    const D2R = Math.PI / 180, R2D = 180 / Math.PI;
    function getSunHour(doy, rising) {
      var lngH = SUN_LNG / 15;
      var t = doy + ((rising ? 6 : 18) - lngH) / 24;
      var M = 0.9856 * t - 3.289;
      var L = ((M + 1.916 * Math.sin(M * D2R) + 0.020 * Math.sin(2 * M * D2R) + 282.634) % 360 + 360) % 360;
      var RA = ((R2D * Math.atan(0.91764 * Math.tan(L * D2R))) % 360 + 360) % 360;
      RA += Math.floor(L / 90) * 90 - Math.floor(RA / 90) * 90;
      RA /= 15;
      var sinDec = 0.39782 * Math.sin(L * D2R);
      var cosDec = Math.cos(Math.asin(sinDec));
      var cosH = (Math.cos(90.833 * D2R) - sinDec * Math.sin(SUN_LAT * D2R)) / (cosDec * Math.cos(SUN_LAT * D2R));
      if (cosH > 1) return rising ? 99 : -99;
      if (cosH < -1) return rising ? -99 : 99;
      var H = R2D * Math.acos(cosH);
      if (rising) H = 360 - H;
      H /= 15;
      var ut = ((H + RA - 0.06571 * t - 6.622 - lngH) % 24 + 24) % 24;
      return ut + (-new Date().getTimezoneOffset() / 60);
    }
    function isDaytime() {
      var now = new Date();
      var start = new Date(now.getFullYear(), 0, 1);
      var doy = Math.floor((now - start) / 86400000) + 1;
      var h = now.getHours() + now.getMinutes() / 60;
      return h >= getSunHour(doy, true) && h < getSunHour(doy, false);
    }
    function grafanaTheme() { return isDaytime() ? 'light' : 'dark'; }

    // Slide definitions
    const SLIDE_DEFS = [
      { title: 'Yleiskatsaus',      src: '/grafana/d/wago-overview/building-overview?kiosk&theme=' + grafanaTheme() },
      { title: 'Sää',              src: '/weather/' },
      { title: 'Uutiset',           src: '/news/' },
      { title: 'Kalenteri',         src: '/calendar/' },
      { title: 'Nysse',             src: '/nysse/' },
    ];
    const NYSSE_IDX = SLIDE_DEFS.findIndex(s => s.title === 'Nysse');
    const NEWS_IDX  = SLIDE_DEFS.findIndex(s => s.title === 'Uutiset');
    let TOTAL = SLIDE_DEFS.length;

    // =========================================================================
    //  CONSTANTS
    // =========================================================================
    const FACE_DETECT_INTERVAL  = 500;
    const DETECTIONS_REQUIRED   = 5;        // consecutive detections to trigger (was 3)
    const GREETING_COOLDOWN     = 30_000;
    const MAX_OVERLAY_DURATION  = 300_000;   // 5 min absolute max
    const JINGLE_DURATION       = 30_000;
    const FACE_GONE_DISMISS_MS  = 15_000;    // dismiss 15s after face disappears
    const MIN_GREETING_ALIVE_MS = 30_000;    // never dismiss within first 30s

    // =========================================================================
    //  PLATFORM DETECTION
    // =========================================================================
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    // Skip native SpeechRecognition on iOS/Safari — unreliable in kiosk mode.
    // Use MediaRecorder + server-side Whisper transcription instead.
    const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
    const NativeSpeechRecognition = !isIOS && !isSafari
      && (window.SpeechRecognition || window.webkitSpeechRecognition);

    // =========================================================================
    //  STATE MACHINE
    // =========================================================================
    const STATE = {
      INIT:           'INIT',           // before setup
      READY:          'READY',          // camera running, waiting for face
      GREETING:       'GREETING',       // conversation active
      COOLDOWN:       'COOLDOWN',       // post-greeting delay
      FAILED:         'FAILED',         // camera/model init failed
      DASHBOARD_ONLY: 'DASHBOARD_ONLY'  // user skipped camera
    };

    let state = STATE.INIT;

    function setState(next) {
      console.log(`[kiosk] ${state} → ${next}`);
      state = next;
      updateStatusDot();
    }

    function updateStatusDot() {
      if (!cameraDot) return;
      cameraDot.classList.remove('active', 'failed');
      if ([STATE.READY, STATE.GREETING, STATE.COOLDOWN].includes(state)) {
        cameraDot.classList.add('active');
      } else if (state === STATE.FAILED) {
        cameraDot.classList.add('failed');
      }
    }

    // =========================================================================
    //  STATE VARIABLES
    // =========================================================================
    let current       = 0;
    let carouselTimer = null;
    let pauseTimer    = null;
    let paused        = false;

    let lastGreetingDismissTime = 0;
    let lastQuoteTime    = 0;
    const QUOTE_COOLDOWN = 3 * 60 * 60 * 1000;
    let overlayStartTime = 0;
    let detectInterval   = null;
    let overlayTimeout   = null;
    let jingleTimeout    = null;

    let listeningActive = false;
    let conversationHistory = [];

    // =========================================================================
    //  UTILITIES
    // =========================================================================
    function cryptoRand() {
      return crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296;
    }
    const pick = arr => arr[Math.floor(cryptoRand() * arr.length)];
    const randInt = (min, max) => Math.floor(cryptoRand() * (max - min + 1)) + min;

    function stripThinkTags(text) {
      return text
        .replace(/<think>[\s\S]*?<\/think>/gi, '')
        .replace(/<\/?think\s*\/?>/gi, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')
        .replace(/\*(.+?)\*/g, '$1')
        .replace(/__(.+?)__/g, '$1')
        .replace(/_(.+?)_/g, '$1')
        .replace(/~~(.+?)~~/g, '$1')
        .replace(/`(.+?)`/g, '$1')
        .replace(/^#{1,6}\s+/gm, '')
        .replace(/^\s*[-*+]\s+/gm, '')
        .replace(/^\s*\d+\.\s+/gm, '')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1')
        .trim();
    }

    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // Unlock speechSynthesis
      const silentUtterance = new SpeechSynthesisUtterance('');
      silentUtterance.volume = 0;
      speechSynthesis.speak(silentUtterance);

      // Unlock jingle <audio>
      jingleAudio.muted = true;
      jingleAudio.play().then(() => { jingleAudio.pause(); jingleAudio.currentTime = 0; jingleAudio.muted = false; }).catch(() => { jingleAudio.muted = false; });

      // Unlock persistent TTS <audio> with silent WAV
      ttsAudio.muted = true;
      ttsAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
      ttsAudio.play().then(() => { ttsAudio.pause(); ttsAudio.muted = false; }).catch(() => { ttsAudio.muted = false; });

      // Unlock AudioContext and route ttsAudio through a gain node
      try {
        ttsAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ttsAudioCtx.createBuffer(1, 1, 22050);
        const src = ttsAudioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(ttsAudioCtx.destination);
        src.start(0);
        const ttsSource = ttsAudioCtx.createMediaElementSource(ttsAudio);
        const ttsGain = ttsAudioCtx.createGain();
        ttsGain.gain.value = 1.0;
        ttsSource.connect(ttsGain);
        ttsGain.connect(ttsAudioCtx.destination);
        ttsAudioCtx.resume();
      } catch {}

      // iOS speechSynthesis keepalive — prevent the speech engine from going dormant
      setInterval(() => {
        if (!speechSynthesis.speaking) {
          speechSynthesis.cancel();
          const keepalive = new SpeechSynthesisUtterance('');
          keepalive.volume = 0;
          speechSynthesis.speak(keepalive);
        }
      }, 10_000);

      console.log('[audio] Unlocked all audio channels');
    }

    // =========================================================================
    //  TEXT-TO-SPEECH
    // =========================================================================
    function playSentence(b64wav) {
      return new Promise(resolve => {
        if (ttsAudioCtx?.state === 'suspended') ttsAudioCtx.resume();
        const bytes = atob(b64wav);
        const arr = new Uint8Array(bytes.length);
        for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
        const url = URL.createObjectURL(new Blob([arr], { type: 'audio/wav' }));
        let safetyTimer;
        const cleanup = () => {
          clearTimeout(safetyTimer);
          ttsAudio.onended = null;
          ttsAudio.onerror = null;
          URL.revokeObjectURL(url);
        };
        ttsAudio.src = url;
        ttsAudio.currentTime = 0;
        ttsAudio.play().catch(() => { cleanup(); resolve(false); });
        avatarEl.classList.add('speaking');
        avatarEl.classList.remove('listening');
        safetyTimer = setTimeout(() => { cleanup(); resolve(false); }, 15_000);
        ttsAudio.onended = () => { cleanup(); resolve(true); };
        ttsAudio.onerror = () => { cleanup(); resolve(false); };
      });
    }

    async function speakAndWait(text) {
      // Try server-side TTS first — streams NDJSON, one sentence per line
      try {
        const res = await fetch('/api/chat/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          let played = 0;

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop();
            for (const line of lines) {
              if (!line.trim()) continue;
              const { audio } = JSON.parse(line);
              await playSentence(audio);
              played++;
            }
          }
          if (buf.trim()) {
            try { const { audio } = JSON.parse(buf); await playSentence(audio); played++; } catch {}
          }
          avatarEl.classList.remove('speaking');
          if (played > 0) return;
        }
      } catch { /* server TTS failed, fall back to browser */ }

      // Fallback: browser speechSynthesis
      speechSynthesis.cancel();
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';
        const voices = speechSynthesis.getVoices();
        const fiFemale = voices.find(v => v.lang.startsWith('fi') && /female|satu|marjut/i.test(v.name));
        const fiVoice = fiFemale || voices.find(v => v.lang.startsWith('fi'));
        if (fiVoice) utterance.voice = fiVoice;
        utterance.rate = 1.0;
        utterance.onstart = () => {
          avatarEl.classList.add('speaking');
          avatarEl.classList.remove('listening');
        };
        utterance.onend = () => { avatarEl.classList.remove('speaking'); resolve(); };
        utterance.onerror = () => { avatarEl.classList.remove('speaking'); resolve(); };
        speechSynthesis.speak(utterance);
        if (isIOS) { speechSynthesis.pause(); speechSynthesis.resume(); }
      });
    }

    function isSpeaking() {
      return speechSynthesis.speaking || !ttsAudio.paused;
    }

        });
        videoEl.srcObject = stream;
        // Keep audio tracks alive but disabled — maintains iOS audio session
        stream.getAudioTracks().forEach(t => t.enabled = false);
        await videoEl.play();

        console.warn('Camera+mic failed, trying video only:', err);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 320, height: 240 },
            audio: false
          });
          videoEl.srcObject = stream;
          await videoEl.play();

          console.warn('Camera init failed:', err2);
          return false;
        }
      }

      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri('/face-api');
      } catch (err) {

    // Watch for iOS interrupting the camera (device lock, incoming call, tab switch)
    function watchCameraTracks() {
      const stream = videoEl.srcObject;
      if (!stream) return;
      stream.getVideoTracks().forEach(t => {
        t.addEventListener('ended', () => {
          console.warn('[camera] Video track ended — will restart on next visibility');
          scheduleVideoRestart();
        });
      });
    }

    let videoRestartPending = false;
    function scheduleVideoRestart() {
      if (videoRestartPending) return;
      videoRestartPending = true;
      setTimeout(async () => {
        videoRestartPending = false;
        if (document.visibilityState === 'hidden') return;
        console.log('[camera] Restarting camera stream after interruption');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 320, height: 240 },
            audio: true
          });
          videoEl.srcObject = stream;
          stream.getAudioTracks().forEach(t => t.enabled = false);
          await videoEl.play();
          watchCameraTracks();
          // Update mic stream if one was established
          if (audioStream) {
            const audioTracks = stream.getAudioTracks();
            if (audioTracks.length > 0) {
              audioTracks.forEach(t => t.enabled = true);
              audioStream = new MediaStream(audioTracks);
            }
          }
          console.log('[camera] Camera stream restarted');
        } catch (err) {
          console.warn('[camera] Camera restart failed:', err);
        }
      }, 800);
    }

    function startFaceDetection() {
      detectInterval = setInterval(async () => {
        if (![STATE.READY, STATE.GREETING, STATE.COOLDOWN].includes(state)) return;
        if (faceDetectRunning) return;
        faceDetectRunning = true;

        try {
          if (!videoEl.videoWidth) return;

          const detection = await faceapi.detectSingleFace(
            videoEl,
            new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.35 })
          );

          if (state === STATE.GREETING) {
            // During greeting: track face for auto-dismiss via timestamp
            if (detection) {
              lastFaceSeenTime = Date.now();
            } else if (lastFaceSeenTime > 0) {
              const sinceFace = Date.now() - lastFaceSeenTime;
              const overlayAge = Date.now() - overlayStartTime;
              if (sinceFace >= FACE_GONE_DISMISS_MS
                  && overlayAge >= MIN_GREETING_ALIVE_MS
                  && !isSpeaking()) {
                dismissGreeting();
              }
            }
            return;
          }

          if (state === STATE.COOLDOWN) {
            // During cooldown: don't update face tracking — prevents immediate
            // re-trigger when cooldown expires with face still present.
            return;
          }

          // STATE.READY: track face for greeting trigger
          if (detection) {
            consecutiveDetections++;
            if (consecutiveDetections >= DETECTIONS_REQUIRED
                && faceAbsentSinceLastGreeting
                && Date.now() - lastGreetingDismissTime >= GREETING_COOLDOWN) {
              consecutiveDetections = 0;
              faceAbsentSinceLastGreeting = false;
              lastFaceSeenTime = Date.now();
              triggerGreeting();
            }
          } else {
            consecutiveDetections = 0;
            faceAbsentSinceLastGreeting = true;
          }
        } catch (err) {
          console.warn('Face detection error:', err);
          consecutiveDetections = 0;
        } finally {
          faceDetectRunning = false;
        }
      }, FACE_DETECT_INTERVAL);

    async function triggerGreeting() {

      if (h >= 5 && h < 10) startJingle();

      // Show overlay
      greetingText.textContent = greeting;
      reportText.textContent = '';
      greetingActiveAt = Date.now();
      greetingOverlay.classList.add('visible');

      // Random quote (once per 3 hours)
      const now = Date.now();
      if (now - lastQuoteTime >= QUOTE_COOLDOWN) {
        lastQuoteTime = now;
        const quote = randomFallback();
        reportText.textContent = quote;
        conversationHistory.push({ role: 'assistant', content: quote });
        await speakAndWait(greeting);
        await speakAndWait(quote);
      } else {
        await speakAndWait(greeting);
      }

      // Minimize avatar to bottom-right before entering listening mode
      minimizeOverlay();
      clearTimeout(silenceAutoSummaryTimer);
      startListening();
    }

    function minimizeOverlay() {
      greetingOverlay.classList.add('minimized');
    }

    // -- Jingle ---------------------------------------------------------------
    function startJingle() {
      jingleAudio.currentTime = 0;
      jingleAudio.play().catch(() => {});
      clearTimeout(jingleTimeout);
      jingleTimeout = setTimeout(stopJingle, JINGLE_DURATION);
    }

    function stopJingle() {
      clearTimeout(jingleTimeout);
      jingleAudio.pause();
      jingleAudio.currentTime = 0;
    }

    // -- Dismiss greeting on card tap -----------------------------------------
    // greetingActiveAt guards against tap-through: iOS can forward a tap from an
    // element that disappears (e.g. start-overlay) to whatever appears underneath.
    let greetingActiveAt = 0;
    greetingCard.addEventListener('click', () => {
      if (Date.now() - greetingActiveAt < 600) return;
      dismissGreeting();
    });

    // -- Schedule overlay safety net ------------------------------------------
    function scheduleOverlayDismiss() {
      clearTimeout(overlayTimeout);
      const remaining = MAX_OVERLAY_DURATION - (Date.now() - overlayStartTime);
      if (remaining <= 0) { dismissGreeting(); return; }
      overlayTimeout = setTimeout(() => dismissGreeting(), remaining);
    }

    function dismissGreeting() {
      if (state !== STATE.GREETING) return;
      console.log('[kiosk] dismissGreeting — overlayAge=%ds',
        Math.round((Date.now() - overlayStartTime) / 1000));
      setState(STATE.COOLDOWN);
      clearTimeout(overlayTimeout);
      consecutiveDetections = 0;
      faceAbsentSinceLastGreeting = false; // require face to leave+return in READY state
      stopJingle();
      stopListening();
      speechSynthesis.cancel();
      ttsAudio.pause();
      avatarEl.classList.remove('speaking', 'listening');
      greetingOverlay.classList.remove('visible', 'minimized');
      lastGreetingDismissTime = Date.now();
      setTimeout(() => {
        if (state === STATE.COOLDOWN) setState(STATE.READY);
      }, GREETING_COOLDOWN);
    }

    // =========================================================================
    //  VOICE INPUT — MICROPHONE SETUP
    // =========================================================================
    let audioStream = null;
    let audioContext = null;
    let analyserNode = null;
    let micReady = false;

    function initMicrophone() {
      const existingStream = videoEl.srcObject;
      const audioTracks = existingStream?.getAudioTracks() || [];

      if (audioTracks.length > 0) {
        audioTracks.forEach(t => t.enabled = true);
        audioStream = new MediaStream(audioTracks);
        setupAudioAnalyser();
        console.log('[voice] Mic ready (reused camera audio tracks)');
      } else {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          audioStream = stream;
          setupAudioAnalyser();
          console.log('[voice] Mic ready (new stream)');
        }).catch(err => {
          console.warn('[voice] Mic not available:', err);
        });
      }

      if (NativeSpeechRecognition) {
        console.log('[voice] Using native Web Speech API (fi-FI), MediaRecorder as fallback');
      } else {
        console.log('[voice] Using MediaRecorder + server transcription (Safari/iOS path)');
      }
      micReady = true;
    }

    function setupAudioAnalyser() {
      try {
        // Reuse the TTS AudioContext — iOS limits simultaneous AudioContexts
        audioContext = ttsAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (!ttsAudioCtx) ttsAudioCtx = audioContext;
        if (audioContext.state === 'suspended') audioContext.resume();
        const source = audioContext.createMediaStreamSource(audioStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 512;
        source.connect(analyserNode);
      } catch (err) {
        console.warn('[voice] AudioContext setup failed:', err);
      }
    }

    function getRMS() {
      if (!analyserNode) return 0;
      const data = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      return Math.sqrt(sum / data.length);
    }

    // =========================================================================
    //  VOICE INPUT — LISTENING MANAGEMENT
    // =========================================================================
    let activeRecognizer = null;  // native SpeechRecognition instance
    let activeRecorder = null;    // MediaRecorder instance
    let silenceTimer = null;
    let nativeFailed = false;     // sticky: once native fails, use MediaRecorder
    let nativeSilenceCount = 0;   // consecutive no-speech from native
    const MAX_NATIVE_SILENCE = 5;

    const SILENCE_THRESHOLD    = 0.015;
    const SILENCE_DURATION     = 1500;   // ms of silence before sending (first utterance)
    const SILENCE_DURATION_SHORT = 700;  // ms after first exchange
    const MIN_RECORDING_MS     = 500;
    const MAX_RECORDING_MS     = 10_000;

    function startListening() {
      if (!micReady || state !== STATE.GREETING) return;

      // Re-enable audio tracks so iOS shows mic indicator
      videoEl.srcObject?.getAudioTracks().forEach(t => { t.enabled = true; });

      // Wait for jingle to finish before opening mic
      if (!jingleAudio.paused) {
        const onJingleDone = () => {
          jingleAudio.removeEventListener('ended', onJingleDone);
          jingleAudio.removeEventListener('pause', onJingleDone);
          if (state === STATE.GREETING) startListening();
        };
        jingleAudio.addEventListener('ended', onJingleDone);
        jingleAudio.addEventListener('pause', onJingleDone);
        return;
      }

      listeningActive = true;
      voiceInputReceived = false;
      reportText.textContent = '';
      listeningIndicator.classList.remove('hidden');
      avatarEl.classList.add('listening');
      scheduleOverlayDismiss();

      // Daily-report timer: fires if user says nothing for 5s after mic opens
      if (!autoSummaryGiven && new Date().toISOString().slice(0, 10) !== lastReportDate) {
        clearTimeout(silenceAutoSummaryTimer);
        silenceAutoSummaryTimer = setTimeout(async () => {
          if (state !== STATE.GREETING || !listeningActive || autoSummaryGiven || voiceInputReceived) return;

          // Pause listening while generating summary
          pauseListening();
          reportSpinner.classList.remove('hidden');
          try {
            conversationHistory.push({ role: 'user', content: 'Hae päiväraportti get_daily_report-työkalulla ja tiivistä se lyhyeksi katsaukseksi. Aloita tärkeimmästä uutisesta, sitten sää, kodin tilanne ja kalenterin tapahtumat. Älä luettele lukemia, vaan kerro olennainen.' });
            const summary = await generateAIResponse();
            reportSpinner.classList.add('hidden');
            if (summary) {
              autoSummaryGiven = true;
              lastReportDate = new Date().toISOString().slice(0, 10);
              reportText.textContent = summary;
              conversationHistory.push({ role: 'assistant', content: summary });
              await speakAndWait(summary);
            }
          } catch {
            reportSpinner.classList.add('hidden');
          }

          if (state === STATE.GREETING && Date.now() - overlayStartTime < MAX_OVERLAY_DURATION) {
            startListening();
          }
        }, SILENCE_AUTO_SUMMARY_MS);
      }

      // Start voice recognition
      if (NativeSpeechRecognition && !nativeFailed) {
        startNativeListening();
      } else if (audioStream) {
        if (audioContext?.state === 'suspended') audioContext.resume();
        startRecording();
      }
    }

    function pauseListening() {
      listeningActive = false;
      listeningIndicator.classList.add('hidden');
      avatarEl.classList.remove('listening');
      clearTimeout(silenceTimer);
      if (activeRecognizer) {
        try { activeRecognizer.abort(); } catch {}
        activeRecognizer = null;
      }
      if (activeRecorder?.state === 'recording') {
        try { activeRecorder.stop(); } catch {}
      }
      activeRecorder = null;
    }

    function stopListening() {
      pauseListening();
      clearTimeout(silenceAutoSummaryTimer);
      // Disable audio tracks — clears iOS mic indicator
      videoEl.srcObject?.getAudioTracks().forEach(t => { t.enabled = false; });
    }

    // =========================================================================
    //  NATIVE SPEECH RECOGNITION (Chrome/Edge only — skipped on iOS/Safari)
    // =========================================================================
    function startNativeListening() {
      if (!listeningActive) return;

      const recognizer = new NativeSpeechRecognition();
      activeRecognizer = recognizer;
      recognizer.lang = 'fi-FI';
      recognizer.continuous = true;
      recognizer.interimResults = true;
      recognizer.maxAlternatives = 1;

      let finalText = '';
      let bestInterim = '';
      let resolved = false;
      let pauseTimer = null;
      let hardTimer = null;

      function resetHardTimer() {
        clearTimeout(hardTimer);
        hardTimer = setTimeout(() => {
          if (resolved) return;
          console.warn('[voice] Native hard timeout (15s)');
          try { recognizer.abort(); } catch {}
        }, 15_000);
      }

      function finish(text) {
        if (resolved) return;
        resolved = true;
        activeRecognizer = null;
        clearTimeout(hardTimer);
        clearTimeout(pauseTimer);

        if (text?.trim()) {
          nativeSilenceCount = 0;
          handleVoiceResult(text.trim());
        } else if (listeningActive && state === STATE.GREETING) {
          nativeSilenceCount++;
          if (nativeSilenceCount >= MAX_NATIVE_SILENCE) {
            // User is genuinely silent — stop gracefully
            listeningActive = false;
            listeningIndicator.classList.add('hidden');
            avatarEl.classList.remove('listening');
          } else {
            startListening();
          }
        }
      }

      resetHardTimer();

      recognizer.onresult = (event) => {
        if (resolved) return;

        finalText = '';
        bestInterim = '';
        for (let i = 0; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript;
          } else {
            bestInterim += event.results[i][0].transcript;
          }
        }

        const liveText = finalText || bestInterim;
        if (liveText) {
          voiceInputReceived = true;
          clearTimeout(silenceAutoSummaryTimer);
          userTextEl.textContent = '\u201c' + liveText + '\u201d';
        }

        clearTimeout(pauseTimer);
        resetHardTimer();

        if (finalText.trim()) {
          // Final result — short pause then process
          pauseTimer = setTimeout(() => finish(finalText.trim()), 200);
        } else {
          // Interim only — wait for pause before processing
          pauseTimer = setTimeout(() => {
            if (!resolved && (finalText || bestInterim)) {
              try { recognizer.stop(); } catch {}
              finish((finalText || bestInterim).trim());
            }
          }, hadVoiceInput ? 800 : 2000);
        }
      };

      recognizer.onerror = (event) => {
        if (resolved) return;
        console.warn('[voice] Native error:', event.error);

        if (event.error === 'no-speech' || event.error === 'aborted') {
          // Use accumulated text if any
          const accumulated = (finalText || bestInterim)?.trim();
          if (accumulated) {
            finish(accumulated);
          } else {
            finish(null);
          }
        } else {
          // Non-recoverable error — fall back to MediaRecorder permanently
          console.warn('[voice] Falling back to MediaRecorder + server transcription');
          nativeFailed = true;
          resolved = true;
          activeRecognizer = null;
          clearTimeout(hardTimer);
          clearTimeout(pauseTimer);
          if (listeningActive && audioStream) {
            if (audioContext?.state === 'suspended') audioContext.resume();
            startRecording();
          }
        }
      };

      recognizer.onend = () => {
        finish((finalText || bestInterim)?.trim() || null);
      };

      try {
        recognizer.start();
        console.log('[voice] Native recognition started');
      } catch (err) {
        console.warn('[voice] Native recognition start failed:', err);
        nativeFailed = true;
        resolved = true;
        activeRecognizer = null;
        if (listeningActive && audioStream) startRecording();
      }
    }

    // =========================================================================
    //  MEDIARECORDER + WHISPER (primary path on iOS/Safari)
    // =========================================================================
    function startRecording() {
      if (!audioStream || !listeningActive) return;

      let audioChunks = [];
      const recordingStartTime = Date.now();

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                     : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                     : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
                     : '';

      try {
        const recorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
        activeRecorder = recorder;

        recorder.ondataavailable = (e) => {
          if (e.data.size > 0) audioChunks.push(e.data);
        };

        recorder.onstop = async () => {
          activeRecorder = null;
          const duration = Date.now() - recordingStartTime;
          if (duration < MIN_RECORDING_MS || audioChunks.length === 0) {
            if (listeningActive && state === STATE.GREETING) startRecording();
            return;
          }

          const ext = (recorder.mimeType || '').includes('mp4') ? 'mp4' : 'webm';
          const blob = new Blob(audioChunks, { type: recorder.mimeType || 'audio/webm' });
          audioChunks = [];

          try {
            const formData = new FormData();
            formData.append('audio', blob, `recording.${ext}`);
            const res = await fetch('/api/chat/transcribe', { method: 'POST', body: formData });
            if (res.ok) {
              const data = await res.json();
              const text = data.text?.trim();
              if (text) {
                handleVoiceResult(text);
                return;
              }
            }
          } catch (err) {
            console.warn('[voice] Transcription error:', err);
          }

          if (listeningActive && state === STATE.GREETING) startRecording();
        };

        recorder.start(250);
        startSilenceDetection(recorder, recordingStartTime);
      } catch (err) {
        console.warn('[voice] MediaRecorder failed:', err);
      }
    }

    function startSilenceDetection(recorder, recordingStartTime) {
      clearTimeout(silenceTimer);
      let silenceStart = null;
      let speechDetected = false;

      const check = () => {
        if (!listeningActive || !recorder || recorder.state !== 'recording') return;

        const elapsed = Date.now() - recordingStartTime;

        if (elapsed >= MAX_RECORDING_MS) {
          console.log('[voice] Max recording duration reached, stopping');
          recorder.stop();
          return;
        }

        const rms = getRMS();

        // If analyser isn't working, fall back to duration-based cutoff
        if (!analyserNode) {
          if (elapsed >= 5000) {
            console.log('[voice] No analyser, stopping after 5s');
            recorder.stop();
          } else {
            silenceTimer = setTimeout(check, 150);
          }
          return;
        }

        if (rms >= SILENCE_THRESHOLD) {
          if (!speechDetected) { voiceInputReceived = true; clearTimeout(silenceAutoSummaryTimer); }
          speechDetected = true;
          silenceStart = null;
        } else if (speechDetected) {
          if (!silenceStart) silenceStart = Date.now();
          const silentFor = Date.now() - silenceStart;
          if (silentFor >= (hadVoiceInput ? SILENCE_DURATION_SHORT : SILENCE_DURATION)) {
            console.log('[voice] Silence after speech, stopping recording');
            recorder.stop();
            return;
          }
        }

        silenceTimer = setTimeout(check, 150);
      };

      silenceTimer = setTimeout(check, 500);
    }

    // =========================================================================
    //  VOICE RESULT HANDLING & AI
    // =========================================================================
    const FAREWELL_PATTERNS = /\b(heippa|heihei|hei\s*hei|näkemiin|nähdään|moi\s*moi|moikka|kiitos\s+siitä|kiitos\s+paljon|selvä\s+homma|hyvää\s+päivän\s*jatkoa|hyvää\s+yötä|hyvää\s+iltaa|bye|goodbye|see\s*you)\b/i;

    function isFarewell(text) {
      return FAREWELL_PATTERNS.test(text);
    }

    async function handleVoiceResult(transcript) {
      userTextEl.textContent = `"${transcript}"`;
      clearTimeout(overlayTimeout);
      clearTimeout(silenceAutoSummaryTimer);

      // Pause listening while processing + speaking
      pauseListening();

      // Farewell detection
      if (isFarewell(transcript)) {
        const goodbye = pick(['Heippa!', 'Nähdään!', 'Moikka!', 'Hei hei!']);
        reportSpinner.classList.add('hidden');
        reportText.textContent = goodbye;
        await speakAndWait(goodbye);
        dismissGreeting();
        return;
      }

      conversationHistory.push({ role: 'user', content: transcript });
      reportSpinner.classList.remove('hidden');

      try {
        const response = await generateAIResponse() || randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = response;
        conversationHistory.push({ role: 'assistant', content: response });
        hadVoiceInput = true;
        await speakAndWait(response);
      } catch {
        const fallback = randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = fallback;
        await speakAndWait(fallback);
      }

      // Resume listening if still within max duration
      if (Date.now() - overlayStartTime < MAX_OVERLAY_DURATION && state === STATE.GREETING) {
        startListening();
      }
    }

    async function generateAIResponse() {
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        const res = await fetch('/api/chat/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const text = data.response?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Bridge unavailable */ }
      return null;
    }

    // =========================================================================
    //  INITIALIZATION
    // =========================================================================
    async function tryAutoActivate() {
      if (isIOS) return false; // always require tap on iOS to unlock audio
      try {
        const cam = await navigator.permissions.query({ name: 'camera' });
        const mic = await navigator.permissions.query({ name: 'microphone' });
        if (cam.state === 'granted' && mic.state === 'granted') {
          const cameraOk = await setupCamera();
          if (cameraOk) {
            unlockAudio();
            startOverlay.classList.add('hidden');
            initMicrophone();
            setState(STATE.READY);
            startFaceDetection();
            watchCameraTracks();
            return true;
          }
        }
      } catch {}
      return false;
    }

    tryAutoActivate();

    startOverlay.addEventListener('click', async function handleStart() {
      startOverlay.removeEventListener('click', handleStart);
      unlockAudio();

      startLabel.textContent = 'Aktivoidaan...';
      startSublabel.textContent = '';
      initSpinner.classList.remove('hidden');
      startOverlay.style.cursor = 'default';

      const cameraOk = await setupCamera();
      if (cameraOk) {
        initSpinner.classList.add('hidden');
        startOverlay.classList.add('hidden');
        initMicrophone();
        setState(STATE.READY);
        startFaceDetection();
        watchCameraTracks();
      } else {
        showCameraError();
      }
    });

    function showCameraError() {
      setState(STATE.FAILED);
      initSpinner.classList.add('hidden');
      startLabel.textContent = '';
      startSublabel.textContent = '';
      initError.classList.add('visible');
    }

    document.getElementById('retry-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      initError.classList.remove('visible');
      startLabel.textContent = 'Aktivoidaan kamera...';
      startSublabel.textContent = '';
      initSpinner.classList.remove('hidden');
      const ok = await setupCamera();
      if (ok) {
        initSpinner.classList.add('hidden');
        startLabel.textContent = 'Valmis!';
        startSublabel.textContent = '';
        await new Promise(r => setTimeout(r, 500));
        startOverlay.classList.add('hidden');
        initMicrophone();
        setState(STATE.READY);
        startFaceDetection();
        watchCameraTracks();
      } else {
        showCameraError();
      }
    });

    document.getElementById('skip-btn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setState(STATE.DASHBOARD_ONLY);
      startOverlay.classList.add('hidden');
      initMicrophone();
    });

    // =========================================================================
    //  AUTO-RELOAD ON VERSION CHANGE
    // =========================================================================
    let knownVersion = null;

    async function checkVersion() {
      try {
        const res = await fetch('/version.txt', { cache: 'no-store' });
        if (!res.ok) return;
        const version = (await res.text()).trim();
        if (knownVersion === null) {
          knownVersion = version;
        } else if (version !== knownVersion && state !== STATE.GREETING) {
          window.location.reload();
        }
      } catch { /* network error — skip */ }
    }

    checkVersion();
    setInterval(checkVersion, 60_000);
  </script>

</body>
