<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    /* -- Slides ----------------------------------------------------------- */
    #slides { position: fixed; inset: 0; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* -- Swipe / click edge strips ---------------------------------------- */
    .swipe-edge {
      position: fixed;
      top: 20%;
      height: 60%;
      width: 120px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 6px 6px 0;
    }
    #swipe-left  { left: 0; border-radius: 0 6px 6px 0; }
    #swipe-right { right: 0; border-radius: 6px 0 0 6px; }

    .swipe-edge::after {
      content: var(--chevron);
      font-size: 28px;
      color: rgba(255,255,255,0.18);
      transition: color 0.2s, transform 0.2s;
      user-select: none;
    }
    .swipe-edge:hover::after {
      color: rgba(255,255,255,0.65);
      transform: scale(1.2);
    }
    #swipe-left  { --chevron: "\2039"; }
    #swipe-right { --chevron: "\203A"; }

    /* -- Navigation dots -------------------------------------------------- */
    #nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      pointer-events: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.45);
    }

    /* -- Pause badge ------------------------------------------------------ */
    #pause-badge {
      position: fixed;
      bottom: 52px;
      right: 14px;
      z-index: 200;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #pause-badge.visible { opacity: 1; }

    /* -- Start overlay (iOS audio/camera unlock) -------------------------- */
    #start-overlay {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 1000;
      background: rgba(0,0,0,0.82);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      padding: 20px 28px;
      border-radius: 16px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.3);
    }
    #start-overlay.hidden { display: none; }

    #start-overlay .label {
      color: rgba(255,255,255,0.85);
      font-size: 18px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    #start-overlay .sublabel {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      margin-top: 8px;
    }
    #init-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    #init-spinner.hidden { display: none; }
    #init-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }
    #init-error.visible { display: flex; }
    #init-error .error-message {
      color: rgba(255,255,255,0.7);
      font-size: 18px;
    }
    #retry-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #skip-btn {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: underline;
    }

    /* -- Status indicator dot ---------------------------------------------- */
    #camera-dot {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s, background 0.3s;
    }
    #camera-dot.active { opacity: 0.7; background: #4caf50; }
    #camera-dot.failed { opacity: 0.7; background: #e53935; }

    /* -- Greeting overlay (centered card) --------------------------------- */
    #greeting-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #greeting-overlay.visible {
      opacity: 1;
      pointer-events: none;
    }
    #greeting-card {
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 36px 40px 32px;
      max-width: 460px;
      width: 90%;
      transform: scale(0.92) translateY(12px);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #greeting-overlay.visible #greeting-card {
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    /* -- Avatar ----------------------------------------------------------- */
    #avatar-container {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #avatar {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }

    .avatar-eye-lid {
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0.05); }
    }

    .avatar-mouth-inner {
      transform-origin: 60px 80px;
      transition: transform 0.15s ease;
    }
    #avatar.speaking .avatar-mouth-inner {
      animation: speak 0.3s ease-in-out infinite alternate;
    }
    @keyframes speak {
      0%   { transform: scaleY(0.5) scaleX(0.9); }
      100% { transform: scaleY(1.4) scaleX(1.05); }
    }

    #avatar.speaking {
      animation: headBob 1.2s ease-in-out infinite;
    }
    @keyframes headBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%  { transform: translateY(-3px) rotate(1.5deg); }
      75%  { transform: translateY(-2px) rotate(-1.5deg); }
    }

    #avatar.listening {
      animation: listenPulse 2s ease-in-out infinite;
    }
    @keyframes listenPulse {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-2px) rotate(2deg); }
    }

    /* -- Greeting content ------------------------------------------------- */
    #greeting-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 480px;
    }

    #greeting-text {
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      text-align: center;
    }

    #report-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
    }

    #report-text {
      color: rgba(255,255,255,0.85);
      font-size: 17px;
      font-weight: 300;
      line-height: 1.5;
      text-align: center;
    }

    #report-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      margin-top: 2px;
    }
    #report-spinner.hidden { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* -- User speech text -------------------------------------------------- */
    #user-text {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      font-style: italic;
      text-align: center;
      min-height: 0;
      transition: opacity 0.3s;
    }
    #user-text:empty { display: none; }

    /* -- Minimized avatar (bottom-right after greeting) -------------------- */
    #greeting-overlay.minimized #greeting-card {
      position: fixed;
      bottom: 64px;
      right: 20px;
      max-width: 280px;
      width: auto;
      padding: 14px 18px 14px 14px;
      border-radius: 20px;
      gap: 10px;
      flex-direction: row;
      pointer-events: auto;
      transform: scale(1) translateY(0);
      animation: cardMinimize 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardMinimize {
      0% { opacity: 0.7; transform: scale(1.4); }
      100% { opacity: 1; transform: scale(1); }
    }
    #greeting-overlay.minimized #avatar-container {
      width: 52px;
      height: 52px;
    }
    #greeting-overlay.minimized #greeting-content {
      align-items: flex-start;
      gap: 4px;
      max-width: 180px;
    }
    #greeting-overlay.minimized #greeting-text { display: none; }
    #greeting-overlay.minimized #report-row { gap: 6px; }
    #greeting-overlay.minimized #report-text {
      font-size: 13px;
      line-height: 1.35;
      text-align: left;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #greeting-overlay.minimized #user-text {
      font-size: 12px;
      text-align: left;
    }
    #greeting-overlay.minimized #listening-indicator {
      margin-top: 2px;
      gap: 6px;
    }
    #greeting-overlay.minimized #listening-indicator span { font-size: 12px; }
    #greeting-overlay.minimized #mic-pulse { width: 10px; height: 10px; }
    #greeting-overlay.minimized #report-spinner {
      width: 14px; height: 14px;
    }

    /* -- Listening indicator ----------------------------------------------- */
    #listening-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    #listening-indicator.hidden { display: none; }

    #listening-indicator span {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 300;
    }

    #mic-pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e53935;
      animation: micPulse 1.5s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <!-- Start overlay: user must tap to unlock camera + audio on iOS -->
  <div id="start-overlay">
    <div class="label">Kosketa aloittaaksesi</div>
    <div class="sublabel">Kamera ja puhe aktivoidaan</div>
    <div id="init-spinner" class="hidden"></div>
    <div id="init-error">
      <div class="error-message">Kamera ei käytettävissä</div>
      <button id="retry-btn">Yritä uudelleen</button>
      <a id="skip-btn" href="#">Jatka ilman kameraa</a>
    </div>
  </div>

  <!-- Camera active indicator -->
  <div id="camera-dot"></div>

  <!-- Greeting + AI report overlay -->
  <div id="greeting-overlay">
    <div id="greeting-card">
      <div id="avatar-container">
        <svg id="avatar" viewBox="0 0 120 120" fill="none">
          <!-- Hair back -->
          <ellipse cx="60" cy="58" rx="46" ry="50" fill="#3d2b1f"/>
          <!-- Neck -->
          <rect x="50" y="92" width="20" height="16" rx="6" fill="#f0c8a0"/>
          <!-- Face -->
          <ellipse cx="60" cy="62" rx="34" ry="38" fill="#f5d4b8"/>
          <!-- Hair front / bangs -->
          <path d="M26 50 Q32 22 60 18 Q88 22 94 50 Q88 34 60 30 Q32 34 26 50z" fill="#3d2b1f"/>
          <!-- Hair sides -->
          <path d="M26 50 Q22 65 24 90 Q28 80 30 60z" fill="#3d2b1f"/>
          <path d="M94 50 Q98 65 96 90 Q92 80 90 60z" fill="#3d2b1f"/>
          <!-- Eyebrows -->
          <path d="M40 48 Q47 44 54 47" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M66 47 Q73 44 80 48" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- Eyes -->
          <g class="avatar-eye-lid">
            <ellipse cx="47" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="47" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="48.5" cy="55" r="1.3" fill="#fff"/>
            <ellipse cx="73" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="73" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="74.5" cy="55" r="1.3" fill="#fff"/>
          </g>
          <!-- Eyelashes -->
          <path d="M41 51.5 Q47 49 53 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <path d="M67 51.5 Q73 49 79 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <!-- Nose -->
          <path d="M58 66 Q60 70 62 66" stroke="#dbb896" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- Mouth -->
          <g class="avatar-mouth-inner">
            <path d="M48 78 Q54 84 60 84 Q66 84 72 78" stroke="#d4736a" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M50 79 Q60 86 70 79" fill="#d4736a" fill-opacity="0.25"/>
          </g>
          <!-- Cheek blush -->
          <circle cx="38" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
          <circle cx="82" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
        </svg>
      </div>
      <div id="greeting-content">
        <div id="greeting-text"></div>
        <div id="report-row">
          <div id="report-spinner"></div>
          <div id="report-text"></div>
        </div>
        <div id="user-text"></div>
        <div id="listening-indicator" class="hidden">
          <div id="mic-pulse"></div>
          <span>Kuuntelen...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="slides"></div>

  <!-- Swipe / click zones on left and right edges only -->
  <div class="swipe-edge" id="swipe-left"></div>
  <div class="swipe-edge" id="swipe-right"></div>

  <!-- Navigation dots -->
  <div id="nav"></div>

  <div id="pause-badge">&#x23F8; jatkuu 30 s</div>

  <!-- Hidden video element for face detection camera feed -->
  <video id="camera" autoplay playsinline muted width="320" height="240"
         style="position:fixed;top:-9999px;left:-9999px;"></video>

  <!-- Greeting jingle (local MP3, preloaded for instant playback) -->
  <audio id="jingle" preload="auto" src="/jingle.mp3"></audio>
  <!-- Persistent TTS audio element (reused to maintain iOS audio unlock) -->
  <audio id="tts-audio" preload="none"></audio>

  <!-- face-api.js (served from nginx static files, downloaded during Docker build) -->
  <script src="/face-api/face-api.min.js"></script>

  <script>
    // == Config ================================================================
    const WEBVISU_ENABLED = new URLSearchParams(window.location.search).has('webvisu');
    const CAROUSEL_MS = 30_000;
    const PAUSE_MS    = 30_000;
    const PEAK_START  = 6;
    const PEAK_END    = 9;

    // == Sunrise/sunset for Grafana theme (Tampere 61.50N, 23.76E) ==============
    const SUN_LAT = 61.4978, SUN_LNG = 23.7610;
    const D2R = Math.PI / 180, R2D = 180 / Math.PI;
    function getSunHour(doy, rising) {
      var lngH = SUN_LNG / 15;
      var t = doy + ((rising ? 6 : 18) - lngH) / 24;
      var M = 0.9856 * t - 3.289;
      var L = ((M + 1.916 * Math.sin(M * D2R) + 0.020 * Math.sin(2 * M * D2R) + 282.634) % 360 + 360) % 360;
      var RA = ((R2D * Math.atan(0.91764 * Math.tan(L * D2R))) % 360 + 360) % 360;
      RA += Math.floor(L / 90) * 90 - Math.floor(RA / 90) * 90;
      RA /= 15;
      var sinDec = 0.39782 * Math.sin(L * D2R);
      var cosDec = Math.cos(Math.asin(sinDec));
      var cosH = (Math.cos(90.833 * D2R) - sinDec * Math.sin(SUN_LAT * D2R)) / (cosDec * Math.cos(SUN_LAT * D2R));
      if (cosH > 1) return rising ? 99 : -99;
      if (cosH < -1) return rising ? -99 : 99;
      var H = R2D * Math.acos(cosH);
      if (rising) H = 360 - H;
      H /= 15;
      var ut = ((H + RA - 0.06571 * t - 6.622 - lngH) % 24 + 24) % 24;
      return ut + (-new Date().getTimezoneOffset() / 60);
    }
    function isDaytime() {
      var now = new Date();
      var start = new Date(now.getFullYear(), 0, 1);
      var doy = Math.floor((now - start) / 86400000) + 1;
      var h = now.getHours() + now.getMinutes() / 60;
      return h >= getSunHour(doy, true) && h < getSunHour(doy, false);
    }
    function grafanaTheme() { return isDaytime() ? 'light' : 'dark'; }

    // Slide definitions: { title, src } — built dynamically from Grafana dashboards
    const SLIDE_DEFS = [
      { title: 'Yleiskatsaus',      src: '/grafana/d/wago-overview/building-overview?kiosk&theme=' + grafanaTheme() },
      { title: 'Sää',              src: '/weather/' },
      { title: 'Uutiset',           src: '/news/' },
      { title: 'Kalenteri',         src: '/calendar/' },
      { title: 'Nysse',             src: '/nysse/' },
    ];
    const NYSSE_IDX = SLIDE_DEFS.findIndex(s => s.title === 'Nysse');
    const NEWS_IDX  = SLIDE_DEFS.findIndex(s => s.title === 'Uutiset');
    let TOTAL = SLIDE_DEFS.length;

    const FACE_DETECT_INTERVAL = 500;   // ms between detection attempts
    const GREETING_COOLDOWN    = 30_000; // ms after overlay dismiss before next greeting
    const MAX_OVERLAY_DURATION = 300_000; // 5 min absolute max to prevent stuck overlay

    const JINGLE_DURATION     = 30_000; // ms to play the jingle

    // == State Machine =========================================================
    const STATES = {
      NOT_STARTED: 'NOT_STARTED',
      UNLOCKING: 'UNLOCKING',
      REQUESTING_CAMERA: 'REQUESTING_CAMERA',
      LOADING_MODEL: 'LOADING_MODEL',
      READY: 'READY',
      GREETING: 'GREETING',
      GREETING_COOLDOWN: 'GREETING_COOLDOWN',
      CAMERA_FAILED: 'CAMERA_FAILED',
      DASHBOARD_ONLY: 'DASHBOARD_ONLY'
    };

    let kioskState = STATES.NOT_STARTED;

    function setState(newState) {
      console.log(`[kiosk] ${kioskState} → ${newState}`);
      kioskState = newState;
      updateStatusIndicator();
    }

    function updateStatusIndicator() {
      if (!cameraDot) return;
      cameraDot.classList.remove('active', 'failed');
      if ([STATES.READY, STATES.GREETING, STATES.GREETING_COOLDOWN].includes(kioskState)) {
        cameraDot.classList.add('active');
      } else if (kioskState === STATES.CAMERA_FAILED) {
        cameraDot.classList.add('failed');
      }
    }

    // == State =================================================================
    let current       = 0;
    let carouselTimer = null;
    let pauseTimer    = null;
    let paused        = false;

    let lastGreetingTime = 0;   // set on dismiss, for cooldown
    let lastQuoteTime = 0;      // throttle random quotes to once per 3h
    const QUOTE_COOLDOWN = 3 * 60 * 60 * 1000;
    let overlayStartTime = 0;   // set on trigger, for overlay duration
    let detectInterval   = null;
    let overlayTimeout   = null;
    let jingleTimeout    = null;

    // Voice command state
    let recognition = null;
    let listeningActive = false;
    let conversationHistory = [];

    // Random fallback system when AI is unavailable
    function cryptoRand() {
      return crypto.getRandomValues(new Uint32Array(1))[0] / 4294967296;
    }
    const pick = arr => arr[Math.floor(cryptoRand() * arr.length)];
    const randInt = (min, max) => Math.floor(cryptoRand() * (max - min + 1)) + min;

    // Strip LLM reasoning traces (<think>...</think>) from responses
    function stripThinkTags(text) {
      return text
        .replace(/<think>[\s\S]*?<\/think>/gi, '')
        .replace(/<\/?think\s*\/?>/gi, '')
        .replace(/\*\*(.+?)\*\*/g, '$1')   // **bold**
        .replace(/\*(.+?)\*/g, '$1')        // *italic*
        .replace(/__(.+?)__/g, '$1')        // __bold__
        .replace(/_(.+?)_/g, '$1')          // _italic_
        .replace(/~~(.+?)~~/g, '$1')        // ~~strikethrough~~
        .replace(/`(.+?)`/g, '$1')          // `code`
        .replace(/^#{1,6}\s+/gm, '')        // # headings
        .replace(/^\s*[-*+]\s+/gm, '')      // - bullet lists
        .replace(/^\s*\d+\.\s+/gm, '')      // 1. numbered lists
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1') // [link](url)
        .trim();
    }

    function randomFallback() {
      // ~40% chance: generate absurd sentence from vocabulary
      if (cryptoRand() < 0.4) return generateAbsurd();
      // ~30% chance: existential robot musings
      if (cryptoRand() < 0.5) return generateMusing();
      // ~30% chance: fake statistic
      return generateFakeStat();
    }

    function generateAbsurd() {
      const subjects = [
        'Naapurin kissa', 'Kuun pimeä puoli', 'Pörröinen pilvi',
        'Kadonneet sukat', 'Jääkaapin valo', 'Kaukosäädin',
        'Saunan kiuas', 'Postilaatikko', 'Pyykkikone',
        'Takapihan siili', 'Muuttolinnut', 'Parveketuoli',
        'Kerrostalon hissi', 'Tuuliviiri', 'Verhokisko',

    // Config loaded from server (Ollama model, OpenAI key)

    // == Build slides and dots from config ======================================
    const slidesContainer = document.getElementById('slides');
    const navContainer    = document.getElementById('nav');
    SLIDE_DEFS.forEach((def, i) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.id = `slide-${i}`;
      div.innerHTML = `<iframe title="${def.title}" src="${def.src}"></iframe>`;

      const dot = document.createElement('div');

      dot.dataset.idx = i;
      navContainer.appendChild(dot);
    });

    // == Grafana theme auto-switch (check every 60s) ==========================
    let lastGrafanaTheme = grafanaTheme();
    setInterval(() => {
      const theme = grafanaTheme();
      if (theme === lastGrafanaTheme) return;
      lastGrafanaTheme = theme;
      document.querySelectorAll('.slide iframe').forEach(iframe => {
        const src = iframe.getAttribute('src');
        if (src && src.startsWith('/grafana/')) {
          iframe.src = src.replace(/([?&])theme=(light|dark)/, '$1theme=' + theme);
        }
      });
    }, 60_000);

    // == DOM refs ==============================================================
    const slides         = Array.from(document.querySelectorAll('.slide'));
    const dots           = Array.from(document.querySelectorAll('.dot'));
    const pauseBadge     = document.getElementById('pause-badge');
    const edgeLeft       = document.getElementById('swipe-left');
    const edgeRight      = document.getElementById('swipe-right');
    const startOverlay   = document.getElementById('start-overlay');
    const cameraDot      = document.getElementById('camera-dot');
    const greetingOverlay = document.getElementById('greeting-overlay');
    const greetingCard   = document.getElementById('greeting-card');
    const greetingText   = document.getElementById('greeting-text');
    const reportText     = document.getElementById('report-text');
    const reportSpinner  = document.getElementById('report-spinner');
    const videoEl        = document.getElementById('camera');
    const jingleAudio    = document.getElementById('jingle');
    const ttsAudio       = document.getElementById('tts-audio');
    const userTextEl     = document.getElementById('user-text');
    const listeningIndicator = document.getElementById('listening-indicator');
    const initSpinner    = document.getElementById('init-spinner');
    const initError      = document.getElementById('init-error');
    const startLabel     = startOverlay.querySelector('.label');
    const startSublabel  = startOverlay.querySelector('.sublabel');

    // == Slide switching =======================================================
    function show(idx) {
      const next = ((idx % TOTAL) + TOTAL) % TOTAL;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    // == Carousel ==============================================================
    function startCarousel() {
      clearInterval(carouselTimer);
      carouselTimer = setInterval(() => {
        if (!paused) show(current + 1);
      }, CAROUSEL_MS);
    }

    // == Interaction / pause ===================================================
    function handleInteraction() {
      paused = true;
      pauseBadge.classList.add('visible');
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        paused = false;
        pauseBadge.classList.remove('visible');
      }, PAUSE_MS);
    }

    // == Edge click navigation ================================================
    edgeLeft.addEventListener('click', () => { handleInteraction(); show(current - 1); });
    edgeRight.addEventListener('click', () => { handleInteraction(); show(current + 1); });

    // == Swipe navigation =====================================================
    let swipeStartX = 0;
    let swipeStartY = 0;
    const SWIPE_THRESHOLD = 50;

    function handleSwipeStart(e) {
      const t = e.touches[0];
      swipeStartX = t.clientX;
      swipeStartY = t.clientY;
    }
    function handleSwipeEnd(e) {
      const t = e.changedTouches[0];
      const dx = t.clientX - swipeStartX;
      const dy = t.clientY - swipeStartY;
      if (Math.abs(dx) > SWIPE_THRESHOLD && Math.abs(dx) > Math.abs(dy)) {
        handleInteraction();
        show(dx < 0 ? current + 1 : current - 1);
      }
    }
    // Listen on edge zones (always above iframes) and document
    [edgeLeft, edgeRight, document].forEach(el => {
      el.addEventListener('touchstart', handleSwipeStart, { passive: true });
      el.addEventListener('touchend', handleSwipeEnd, { passive: true });
    });

    let lastMoveReset = 0;
    document.addEventListener('mousemove', () => {
      const now = Date.now();
      if (now - lastMoveReset > 1000) {
        lastMoveReset = now;
        handleInteraction();
      }
    });

    window.addEventListener('blur', handleInteraction);

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismissOverlay();
      if (e.key === 'ArrowLeft')  { handleInteraction(); show(current - 1); }
      if (e.key === 'ArrowRight') { handleInteraction(); show(current + 1); }
    });

    // == Bus departure auto-switch =============================================
    const BUS_CHECK_INTERVAL = 30_000; // check every 30s
    const BUS_LEAVE_SOON_MS  = 15 * 60_000; // show Nysse when bus leaves within 15 min

    async function checkBusDepartures() {
      if (paused || kioskState === STATES.GREETING) return; // don't interrupt user
      try {
        const res = await fetch('/api/departures');
        if (!res.ok) return;
        const departures = await res.json();
        const soon = departures.some(d => d.departureMs > 0 && d.departureMs <= BUS_LEAVE_SOON_MS);
        if (soon && current !== NYSSE_IDX) {
          show(NYSSE_IDX);
        }
      } catch { /* network error */ }
    }

    setInterval(checkBusDepartures, BUS_CHECK_INTERVAL);

    // == Init carousel =========================================================
    const hour    = new Date().getHours();
    const initial = (hour >= PEAK_START && hour < PEAK_END) ? NYSSE_IDX : 0;
    show(initial);
    startCarousel();

    // =========================================================================
    //  FACE DETECTION, GREETING & AI REPORT
    // =========================================================================


    // -- Audio unlock (must be called from a user gesture) --------------------
    let audioUnlocked = false;
    let ttsAudioCtx = null; // persisted so it isn't GC'd and can be resumed

    function unlockAudio() {
      if (audioUnlocked) return;
      audioUnlocked = true;

      // Unlock speechSynthesis
      const silentUtterance = new SpeechSynthesisUtterance('');
      silentUtterance.volume = 0;
      speechSynthesis.speak(silentUtterance);

      // Unlock jingle <audio>
      jingleAudio.muted = true;
      jingleAudio.play().then(() => { jingleAudio.pause(); jingleAudio.currentTime = 0; jingleAudio.muted = false; }).catch(() => { jingleAudio.muted = false; });

      // Unlock persistent TTS <audio> (reused for all server TTS playback)
      ttsAudio.muted = true;
      ttsAudio.src = 'data:audio/wav;base64,UklGRiQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=';
      ttsAudio.play().then(() => { ttsAudio.pause(); ttsAudio.muted = false; }).catch(() => { ttsAudio.muted = false; });

      // Unlock AudioContext and route ttsAudio through a gain node.
      // Gain > 1.0 amplifies the voice signal; the iPad OS/Safari volume mixer
      // still controls the final output level (system volume buttons work normally).
      // Stored in ttsAudioCtx (module-level) so it is never GC'd and can be
      // resumed after iOS suspends it (device lock, tab background, etc.).
      try {
        ttsAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        // Silent buffer to unlock the AudioContext within the gesture handler
        const buf = ttsAudioCtx.createBuffer(1, 1, 22050);
        const src = ttsAudioCtx.createBufferSource();
        src.buffer = buf;
        src.connect(ttsAudioCtx.destination);
        src.start(0);
        // Route TTS audio through a gain node so the voice is loud enough
        const ttsSource = ttsAudioCtx.createMediaElementSource(ttsAudio);
        const ttsGain = ttsAudioCtx.createGain();
        ttsGain.gain.value = 3.0;
        ttsSource.connect(ttsGain);
        ttsGain.connect(ttsAudioCtx.destination);
        ttsAudioCtx.resume();
      } catch {}

      // iOS speechSynthesis keepalive — prevent the speech engine from going dormant
      setInterval(() => {
        if (!speechSynthesis.speaking) {
          speechSynthesis.cancel();
          const keepalive = new SpeechSynthesisUtterance('');
          keepalive.volume = 0;
          speechSynthesis.speak(keepalive);
        }
      }, 10_000);

      console.log('[audio] Unlocked all audio channels');
    }

    // -- Start overlay: unlock camera + audio on iOS --------------------------
    // iOS requires a user gesture to unlock audio — never auto-activate on iOS/iPadOS
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);

    async function tryAutoActivate() {
      if (isIOS) return false; // always require tap on iOS to unlock audio
      try {
        const cam = await navigator.permissions.query({ name: 'camera' });
        const mic = await navigator.permissions.query({ name: 'microphone' });
        if (cam.state === 'granted' && mic.state === 'granted') {
          setState(STATES.UNLOCKING);
          const cameraOk = await initCameraSteps();
          if (cameraOk) {
            unlockAudio(); // set up TTS AudioContext even on the no-tap path
            startOverlay.classList.add('hidden');
            initSpeechRecognition();
            return true;
          }
        }
      } catch {}
      return false;
    }

    // Auto-activate or show the small overlay prompt
    tryAutoActivate();

    startOverlay.addEventListener('click', async function handleStart() {
      startOverlay.removeEventListener('click', handleStart);
      setState(STATES.UNLOCKING);

      // Unlock all audio playback channels (must be in gesture handler)
      unlockAudio();

      // Show progress
      startLabel.textContent = 'Aktivoidaan...';
      startSublabel.textContent = '';
      initSpinner.classList.remove('hidden');
      startOverlay.style.cursor = 'default';

      const cameraOk = await initCameraSteps();

      if (cameraOk) {
        initSpinner.classList.add('hidden');
        startOverlay.classList.add('hidden');
        initSpeechRecognition();
      } else {
        showCameraError();
      }
    });

    function showCameraError() {
      initSpinner.classList.add('hidden');
      startLabel.textContent = '';
      startSublabel.textContent = '';
      initError.classList.add('visible');
    }

    document.getElementById('retry-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      initError.classList.remove('visible');
      startLabel.textContent = 'Aktivoidaan kamera...';
      startSublabel.textContent = '';
      initSpinner.classList.remove('hidden');
      const ok = await initCameraSteps();
      if (ok) {
        initSpinner.classList.add('hidden');
        startLabel.textContent = 'Valmis!';
        startSublabel.textContent = '';
        await new Promise(r => setTimeout(r, 500));
        startOverlay.classList.add('hidden');
        initSpeechRecognition();
      } else {
        showCameraError();
      }
    });

    document.getElementById('skip-btn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setState(STATES.DASHBOARD_ONLY);
      startOverlay.classList.add('hidden');
      initSpeechRecognition();
    });

    // -- Camera init (stepped) ------------------------------------------------
    async function initCameraSteps() {
      setState(STATES.REQUESTING_CAMERA);
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 320, height: 240 },
          audio: true
        });
        videoEl.srcObject = stream;
        // Keep audio tracks alive — maintains iOS audio session in record mode
        // so webkitSpeechRecognition can access the mic later without re-requesting
        stream.getAudioTracks().forEach(t => t.enabled = false);
        await videoEl.play();
      } catch (err) {
        console.warn('Camera+mic failed, trying video only:', err);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 320, height: 240 },
            audio: false
          });
          videoEl.srcObject = stream;
          await videoEl.play();
        } catch (err2) {
          console.warn('Camera init failed:', err2);
          setState(STATES.CAMERA_FAILED);
          return false;
        }
      }

      setState(STATES.LOADING_MODEL);
      startLabel.textContent = 'Ladataan kasvojentunnistus...';
      startSublabel.textContent = '';
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri('/face-api');
      } catch (err) {
        console.warn('Face detection model failed to load:', err);
        setState(STATES.CAMERA_FAILED);
        return false;
      }

      setState(STATES.READY);
      startFaceDetection();

      // Watch for iOS interrupting the camera (device lock, incoming call, tab switch).
      // When any video track ends, schedule a camera restart once the page is visible.
      function attachTrackEndedWatcher() {
        const stream = videoEl.srcObject;
        if (!stream) return;
        stream.getVideoTracks().forEach(t => {
          t.addEventListener('ended', () => {
            console.warn('[camera] Video track ended — will restart on next visibility');
            scheduleVideoRestart();
          });
        });
      }
      attachTrackEndedWatcher();

      return true;
    }

    // Restart the camera stream after an iOS interruption.
    let videoRestartPending = false;
    function scheduleVideoRestart() {
      if (videoRestartPending) return;
      videoRestartPending = true;
      async function doRestart() {
        videoRestartPending = false;
        if (document.visibilityState === 'hidden') return; // wait for visible event
        console.log('[camera] Restarting camera stream after interruption');
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 320, height: 240 },
            audio: true
          });
          videoEl.srcObject = stream;
          stream.getAudioTracks().forEach(t => t.enabled = false);
          await videoEl.play();
          // Re-enable mic track in the speech recognition path
          const existingTracks = stream.getAudioTracks();
          if (existingTracks.length > 0 && audioStream) {
            existingTracks.forEach(t => t.enabled = true);
            audioStream = new MediaStream(existingTracks);
          }
          console.log('[camera] Camera stream restarted');
        } catch (err) {
          console.warn('[camera] Camera restart failed:', err);
        }
      }
      // Give iOS a moment to release the camera before re-requesting
      setTimeout(doRestart, 800);
    }

    // iOS pauses video when the tab is hidden; resume + restart if needed on return.
    document.addEventListener('visibilitychange', async () => {
      if (document.visibilityState !== 'visible') return;
      // Resume AudioContext that iOS may have suspended
      if (ttsAudioCtx?.state === 'suspended') ttsAudioCtx.resume();
      // If video has stalled or tracks have ended, restart the stream
      const tracks = videoEl.srcObject?.getVideoTracks() ?? [];
      const needsRestart = tracks.length === 0 || tracks.some(t => t.readyState === 'ended');
      if (needsRestart) {
        scheduleVideoRestart();
      } else if (videoEl.paused) {
        videoEl.play().catch(() => {});
      }
    });

    // -- Face detection loop --------------------------------------------------
    let consecutiveDetections = 0;
    const DETECTIONS_REQUIRED = 3; // require 3 consecutive detections
    let faceWasAbsent = true; // must be true to allow greeting trigger
    let faceVisible = false;  // tracks face presence during greeting
    const FACE_GONE_DISMISS_MS = 15_000; // dismiss 15s after face disappears
    const MIN_GREETING_ALIVE_MS = 30_000; // never dismiss within first 30s
    let faceGoneTimeout = null;
    let consecutiveFaceGone = 0;
    const FACE_GONE_REQUIRED = 8; // require 8 consecutive non-detections (~4s)

    let faceDetectRunning = false; // prevent overlapping async detections

    function startFaceDetection() {
      detectInterval = setInterval(async () => {
        if (![STATES.READY, STATES.GREETING, STATES.GREETING_COOLDOWN].includes(kioskState)) return;
        if (faceDetectRunning) return; // previous detection still in-flight
        faceDetectRunning = true;

        try {
          if (!videoEl.videoWidth) { faceDetectRunning = false; return; }

          const detection = await faceapi.detectSingleFace(
            videoEl,
            new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.35 })
          );

          if (kioskState === STATES.GREETING) {
            // During greeting: track face to keep conversation alive
            if (detection) {
              faceVisible = true;
              consecutiveFaceGone = 0;
              // Face returned — cancel pending dismiss
              if (faceGoneTimeout) {
                clearTimeout(faceGoneTimeout);
                faceGoneTimeout = null;
              }
            } else {
              consecutiveFaceGone++;
              if (consecutiveFaceGone >= FACE_GONE_REQUIRED && faceVisible) {
                faceVisible = false;
                // Face left — start dismiss countdown (skip if too early or already pending)
                if (!faceGoneTimeout && Date.now() - overlayStartTime > MIN_GREETING_ALIVE_MS) {
                  faceGoneTimeout = setTimeout(() => {
                    faceGoneTimeout = null;
                    if (kioskState === STATES.GREETING && !faceVisible) {
                      // Wait for speech to finish before dismissing (covers both browser TTS and server TTS)
                      const isSpeaking = () => speechSynthesis.speaking || !ttsAudio.paused;
                      if (isSpeaking()) {
                        const checkDone = setInterval(() => {
                          if (!isSpeaking()) {
                            clearInterval(checkDone);
                            if (!faceVisible) dismissOverlay();
                          }
                        }, 300);
                      } else {
                        dismissOverlay();
                      }
                    }
                  }, FACE_GONE_DISMISS_MS);
                }
              }
            }
            return;
          }

          // READY / COOLDOWN: track face presence for next trigger
          if (detection) {
            consecutiveDetections++;
            // Only trigger greeting when ready and cooldown has passed
            if (consecutiveDetections >= DETECTIONS_REQUIRED
                && kioskState === STATES.READY
                && faceWasAbsent
                && Date.now() - lastGreetingTime >= GREETING_COOLDOWN) {
              consecutiveDetections = 0;
              faceWasAbsent = false;
              faceVisible = true;
              consecutiveFaceGone = 0;
              triggerGreeting();
            }
          } else {
            consecutiveDetections = 0;
            faceWasAbsent = true; // face gone — next appearance can trigger
          }
        } catch (err) {
          console.warn('Face detection error:', err);
          consecutiveDetections = 0;
        } finally {
          faceDetectRunning = false;
        }
      }, FACE_DETECT_INTERVAL);
    }

    // -- Trigger greeting sequence --------------------------------------------
    let silenceAutoSummaryTimer = null;
    let autoSummaryGiven = false;
    let lastReportDate = '';  // YYYY-MM-DD of last daily report
    const SILENCE_AUTO_SUMMARY_MS = 5_000; // generate summary if no speech in 5s

    async function triggerGreeting() {
      setState(STATES.GREETING);
      overlayStartTime = Date.now();

      // Switch to news slide, or Nysse if a bus is leaving soon
      try {
        const res = await fetch('/api/departures');
        if (res.ok) {
          const departures = await res.json();
          const busSoon = departures.some(d => d.departureMs > 0 && d.departureMs <= BUS_LEAVE_SOON_MS);
          show(busSoon && NYSSE_IDX >= 0 ? NYSSE_IDX : NEWS_IDX);
        } else {
          show(NEWS_IDX);
        }
      } catch {
        show(NEWS_IDX);
      }
      conversationHistory = [];
      autoSummaryGiven = false;
      nativeRestartRounds = 0; // fresh restart budget for each greeting
      userTextEl.textContent = '';

      // Determine time-appropriate greeting (short form)
      const h = new Date().getHours();
      let greeting;
      if (h >= 5 && h < 10)       greeting = 'Huomenta!';
      else if (h >= 10 && h < 17)  greeting = 'P\u00e4iv\u00e4\u00e4!';
      else if (h >= 17 && h < 22)  greeting = 'Iltaa!';
      else                          greeting = 'Y\u00f6t\u00e4!';

      // Start background jingle (morning only)
      if (h >= 5 && h < 10) startJingle();

      // Show overlay with greeting
      greetingText.textContent = greeting;
      reportText.textContent = '';
      greetingActiveAt = Date.now();
      greetingOverlay.classList.add('visible');

      // Random quote only once every 3 hours
      const now = Date.now();
      if (now - lastQuoteTime >= QUOTE_COOLDOWN) {
        lastQuoteTime = now;
        const quote = randomFallback();
        reportText.textContent = quote;
        conversationHistory.push({ role: 'assistant', content: quote });
        await speakAndWait(greeting);
        await speakAndWait(quote);
      } else {
        await speakAndWait(greeting);
      }

      // Minimize avatar to bottom-right before entering listening mode
      minimizeOverlay();

      // Enter listening mode (waits for jingle to finish if still playing)
      // scheduleOverlayDismiss is called inside startListening after mic actually opens
      startListening();

      // If no speech input within 5s, generate a daily report (once per day)
      const todayDate = new Date().toISOString().slice(0, 10);
      const dailyReportDue = lastReportDate !== todayDate;
      clearTimeout(silenceAutoSummaryTimer);
      if (dailyReportDue) {
        silenceAutoSummaryTimer = setTimeout(async () => {
          if (kioskState !== STATES.GREETING || !listeningActive || autoSummaryGiven) return;

          // Pause listening while generating summary
          listeningActive = false;
          listeningIndicator.classList.add('hidden');
          avatarEl.classList.remove('listening');
          clearTimeout(silenceTimer);
          clearTimeout(nativeSpeechTimer);
          clearTimeout(nativeHardTimer);
          recognitionEpoch++; // invalidate any pending callbacks before abort fires
          if (nativeRecognizer) { try { nativeRecognizer.abort(); } catch {} nativeRecognizer = null; }
          if (mediaRecorder && mediaRecorder.state === 'recording') { try { mediaRecorder.stop(); } catch {} }

          reportSpinner.classList.remove('hidden');
          try {
            conversationHistory.push({ role: 'user', content: 'Hae päiväraportti get_daily_report-työkalulla ja tiivistä se lyhyeksi katsaukseksi. Aloita tärkeimmästä uutisesta, sitten sää, kodin tilanne ja kalenterin tapahtumat. Älä luettele lukemia, vaan kerro olennainen.' });
            const summary = await generateConversationalResponse();
            reportSpinner.classList.add('hidden');
            if (summary) {
              autoSummaryGiven = true;
              lastReportDate = todayDate;
              reportText.textContent = summary;
              conversationHistory.push({ role: 'assistant', content: summary });
              await speakAndWait(summary);
            }
          } catch {
            reportSpinner.classList.add('hidden');
          }

          // Resume listening after summary
          if (kioskState === STATES.GREETING && Date.now() - overlayStartTime < MAX_OVERLAY_DURATION) {
            startListening();
          }
        }, SILENCE_AUTO_SUMMARY_MS);
      }
    }

    function minimizeOverlay() {
      greetingOverlay.classList.add('minimized');
    }

    // -- Jingle (local MP3) ---------------------------------------------------
    function startJingle() {
      jingleAudio.currentTime = 0;
      jingleAudio.play().catch(() => {});
      clearTimeout(jingleTimeout);
      jingleTimeout = setTimeout(stopJingle, JINGLE_DURATION);
    }

    function stopJingle() {
      clearTimeout(jingleTimeout);
      jingleAudio.pause();
      jingleAudio.currentTime = 0;
    }

    // -- Dismiss greeting on card tap (not full overlay, so arrows stay tappable)
    // greetingActiveAt guards against tap-through: iOS can forward a tap from an element
    // that disappears (e.g. start-overlay) to whatever appears underneath it.
    let greetingActiveAt = 0;
    greetingCard.addEventListener('click', () => {
      if (Date.now() - greetingActiveAt < 600) return; // ignore phantom tap-throughs
      dismissOverlay();
    });

    // -- Schedule overlay dismiss ---------------------------------------------
    function scheduleOverlayDismiss() {
      clearTimeout(overlayTimeout);

      // Absolute safety net (MAX_OVERLAY_DURATION); normal dismiss is face-based
      if (Date.now() - overlayStartTime > MAX_OVERLAY_DURATION) {
        dismissOverlay();
        return;
      }

      overlayTimeout = setTimeout(() => {
        dismissOverlay();
      }, MAX_OVERLAY_DURATION - (Date.now() - overlayStartTime));
    }

    function dismissOverlay() {
      if (kioskState !== STATES.GREETING) return;
      console.log('[kiosk] dismissOverlay — overlayAge=%ds caller=%s',
        Math.round((Date.now() - overlayStartTime) / 1000),
        new Error().stack.split('\n')[2]?.trim() ?? '?');
      setState(STATES.GREETING_COOLDOWN);
      clearTimeout(overlayTimeout);
      clearTimeout(faceGoneTimeout);
      faceGoneTimeout = null;
      faceVisible = false;
      faceWasAbsent = false; // require face to leave+return before next trigger
      consecutiveFaceGone = 0;
      consecutiveDetections = 0;
      stopJingle();
      stopListening();
      speechSynthesis.cancel();
      avatarEl.classList.remove('speaking');
      avatarEl.classList.remove('listening');
      greetingOverlay.classList.remove('visible');
      greetingOverlay.classList.remove('minimized');
      lastGreetingTime = Date.now();
      setTimeout(() => {
        if (kioskState === STATES.GREETING_COOLDOWN) setState(STATES.READY);
      }, GREETING_COOLDOWN);
    }

    // -- Text-to-speech -------------------------------------------------------
    const avatarEl = document.getElementById('avatar');

    function speak(text) {
      speakAndWait(text);
    }

    async function speakAndWait(text) {
      // Try server-side TTS first — streams NDJSON, one sentence per line.
      // Playing each sentence as it arrives pipelines synthesis with playback.
      try {
        const res = await fetch('/api/chat/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const reader = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';
          let played = 0;

          const playSentence = (b64wav) => new Promise(resolve => {
            // Resume AudioContext if iOS suspended it (device lock / tab background)
            if (ttsAudioCtx?.state === 'suspended') ttsAudioCtx.resume();
            const bytes = atob(b64wav);
            const arr = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) arr[i] = bytes.charCodeAt(i);
            const url = URL.createObjectURL(new Blob([arr], { type: 'audio/wav' }));
            let safetyTimer;
            const cleanup = () => {
              clearTimeout(safetyTimer);
              ttsAudio.onended = null;
              ttsAudio.onerror = null;
              URL.revokeObjectURL(url);
            };
            ttsAudio.src = url;
            ttsAudio.currentTime = 0;
            ttsAudio.play().catch(() => { cleanup(); resolve(false); });
            avatarEl.classList.add('speaking');
            avatarEl.classList.remove('listening');
            // Safety net: if onended never fires (network drop mid-stream) don't hang
            safetyTimer = setTimeout(() => { cleanup(); resolve(false); }, 15_000);
            ttsAudio.onended = () => { cleanup(); resolve(true); };
            ttsAudio.onerror = () => { cleanup(); resolve(false); };
          });

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const lines = buf.split('\n');
            buf = lines.pop(); // keep incomplete trailing line
            for (const line of lines) {
              if (!line.trim()) continue;
              const { audio } = JSON.parse(line);
              await playSentence(audio);
              played++;
            }
          }
          // flush any remaining complete line
          if (buf.trim()) {
            try { const { audio } = JSON.parse(buf); await playSentence(audio); played++; } catch {}
          }
          avatarEl.classList.remove('speaking');
          if (played > 0) return;
        }
      } catch { /* server TTS failed, fall back to browser */ }

      // Fallback: browser speechSynthesis
      speechSynthesis.cancel(); // iOS fix: clear any stuck queue
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';
        const voices = speechSynthesis.getVoices();
        const fiFemale = voices.find(v => v.lang.startsWith('fi') && /female|satu|marjut/i.test(v.name));
        const fiVoice = fiFemale || voices.find(v => v.lang.startsWith('fi'));
        if (fiVoice) utterance.voice = fiVoice;
        utterance.rate = 1.0;
        utterance.onstart = () => {
          avatarEl.classList.add('speaking');
          avatarEl.classList.remove('listening');
        };
        utterance.onend = () => {
          avatarEl.classList.remove('speaking');
          resolve();
        };
        utterance.onerror = (e) => {
          console.warn('[tts] speechSynthesis error:', e.error);
          avatarEl.classList.remove('speaking');
          resolve();
        };
        // iOS workaround: speechSynthesis.speak can silently fail if called too
        // long after the last user gesture. Force a pause/resume cycle first.
        speechSynthesis.speak(utterance);
        if (isIOS) {
          speechSynthesis.pause();
          speechSynthesis.resume();
        }
      });
    }

    // -- Speech recognition ---------------------------------------------------
    // Native Web Speech API on Chrome/Edge; MediaRecorder + Whisper on Safari

    const NativeSpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const useNativeSpeech = !!NativeSpeechRecognition;

    let nativeRecognizer = null;
    let nativeSpeechTimer = null;
    let nativeHardTimer = null;
    let nativeSpeechText = '';
    let nativeFailCount = 0;
    let nativeRestartRounds = 0;       // counts restart rounds when nativeHasWorked; capped to prevent infinite loop
    let nativeFallenBack = false;      // sticky: once fallen back, stay on MediaRecorder
    let nativeHasWorked = false;       // true once native API has produced a result this session
    let recognitionEpoch = 0;          // incremented on every intentional stop — stale callbacks check this
    const NATIVE_SPEECH_PAUSE = 2000;
    const NATIVE_HARD_TIMEOUT = 15000; // force-stop after 15s if no final result
    const NATIVE_MAX_FAILS = 3;        // fall back to MediaRecorder after N failures
    const NATIVE_MAX_RESTART_ROUNDS = 5; // give up restarting native after N rounds (user is silent)

    let mediaRecorder = null;
    let audioChunks = [];
    let silenceTimer = null;
    let audioStream = null;       // mic stream obtained during init
    let audioContext = null;
    let analyserNode = null;
    const SILENCE_THRESHOLD = 0.015; // RMS below this = silence
    const SILENCE_DURATION = 1500;   // ms of silence before sending
    const MIN_RECORDING_MS = 500;    // ignore very short recordings
    const MAX_RECORDING_MS = 10_000; // hard cap — send after 10s regardless
    let recordingStartTime = 0;
    let micReady = false;

    function initSpeechRecognition() {
      // Always set up mic stream — needed for MediaRecorder fallback even on native path
      const existingStream = videoEl.srcObject;
      const audioTracks = existingStream?.getAudioTracks() || [];

      if (audioTracks.length > 0) {
        audioTracks.forEach(t => t.enabled = true);
        audioStream = new MediaStream(audioTracks);
        setupAudioAnalyser();
        console.log('[voice] Mic stream ready (reused camera audio tracks)');
      } else {
        navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
          audioStream = stream;
          setupAudioAnalyser();
          console.log('[voice] Mic stream ready (new stream)');
        }).catch(err => {
          console.warn('[voice] Mic not available:', err);
        });
      }

      if (useNativeSpeech) {
        console.log('[voice] Using native Web Speech API (fi-FI), MediaRecorder as fallback');
      } else {
        console.log('[voice] Using MediaRecorder + server transcription');
      }

      micReady = true;
      recognition = true;
    }

    function setupAudioAnalyser() {
      try {
        // Reuse the TTS AudioContext when available — iOS only allows a small
        // number of simultaneous AudioContexts; keeping one prevents the other
        // from being silently suspended.
        audioContext = ttsAudioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (!ttsAudioCtx) ttsAudioCtx = audioContext; // keep a reference either way
        if (audioContext.state === 'suspended') audioContext.resume();
        const source = audioContext.createMediaStreamSource(audioStream);
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 512;
        source.connect(analyserNode);
      } catch (err) {
        console.warn('[voice] AudioContext setup failed:', err);
      }
    }

    function getRMS() {
      if (!analyserNode) return 0;
      const data = new Float32Array(analyserNode.fftSize);
      analyserNode.getFloatTimeDomainData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i] * data[i];
      return Math.sqrt(sum / data.length);
    }

    function startListening() {
      if (!micReady || kioskState !== STATES.GREETING) {
        console.log('[voice] startListening skipped: micReady=%s, state=%s', micReady, kioskState);
        return;
      }
      // Re-enable audio tracks so iOS shows the mic indicator and MediaRecorder works
      videoEl.srcObject?.getAudioTracks().forEach(t => { t.enabled = true; });

      // Wait for jingle to finish before opening mic
      if (!jingleAudio.paused) {
        const onJingleDone = () => {
          jingleAudio.removeEventListener('ended', onJingleDone);
          jingleAudio.removeEventListener('pause', onJingleDone);
          if (kioskState === STATES.GREETING) startListening();
        };
        jingleAudio.addEventListener('ended', onJingleDone);
        jingleAudio.addEventListener('pause', onJingleDone);
        return;
      }

      listeningActive = true;
      listeningIndicator.classList.remove('hidden');
      avatarEl.classList.add('listening');
      scheduleOverlayDismiss();

      if (useNativeSpeech && !nativeFallenBack) {
        startNativeRecognition();
      } else {
        if (audioContext?.state === 'suspended') audioContext.resume();
        startRecording();
      }
    }

    // -- Native Web Speech API -----------------------------------------------
    function fallbackToMediaRecorder() {
      if (nativeHasWorked) {
        nativeRestartRounds++;
        if (nativeRestartRounds <= NATIVE_MAX_RESTART_ROUNDS) {
          console.warn('[voice] Native failed but has worked this session — restarting native (round %d/%d)', nativeRestartRounds, NATIVE_MAX_RESTART_ROUNDS);
          nativeFailCount = 0;
          if (listeningActive) startNativeRecognition();
          return;
        }
        // Exceeded max rounds — user is silent; stop listening gracefully
        console.warn('[voice] Too many consecutive native failures — stopping listening');
        nativeRestartRounds = 0;
        listeningActive = false;
        listeningIndicator.classList.add('hidden');
        avatarEl.classList.remove('listening');
        clearTimeout(nativeSpeechTimer);
        clearTimeout(nativeHardTimer);
        try { nativeRecognizer?.abort(); } catch {}
        nativeRecognizer = null;
        return;
      }
      console.warn('[voice] Falling back to MediaRecorder + server transcription');
      nativeFailCount = 0;
      nativeFallenBack = true;
      recognitionEpoch++; // invalidate any pending native callbacks
      if (nativeRecognizer) { try { nativeRecognizer.abort(); } catch {} nativeRecognizer = null; }
      if (audioStream && listeningActive) {
        if (audioContext?.state === 'suspended') audioContext.resume();
        startRecording();
      }
    }

    function startNativeRecognition() {
      if (!listeningActive) return;

      nativeSpeechText = '';
      clearTimeout(nativeSpeechTimer);
      clearTimeout(nativeHardTimer);

      const myEpoch = ++recognitionEpoch; // capture — stale callbacks will see epoch mismatch
      nativeRecognizer = new NativeSpeechRecognition();
      nativeRecognizer.lang = 'fi-FI';
      nativeRecognizer.continuous = true;
      nativeRecognizer.interimResults = true;
      nativeRecognizer.maxAlternatives = 1;

      // Hard timeout: if no usable result after 15s, stop and restart/fallback
      nativeHardTimer = setTimeout(() => {
        if (myEpoch !== recognitionEpoch) return; // stale
        console.warn('[voice] Native hard timeout — no final result in %ds', NATIVE_HARD_TIMEOUT / 1000);
        try { nativeRecognizer.abort(); } catch {}
      }, NATIVE_HARD_TIMEOUT);

      let bestInterim = '';

      nativeRecognizer.onresult = (event) => {
        if (myEpoch !== recognitionEpoch) return; // stale — a newer session owns things now
        nativeFailCount = 0; // got a result, reset fail counter
        nativeRestartRounds = 0; // user spoke — reset restart cap
        nativeHasWorked = true;
        let finalText = '';
        let interimText = '';
        for (let i = 0; i < event.results.length; i++) {
          if (event.results[i].isFinal) {
            finalText += event.results[i][0].transcript;
          } else {
            interimText += event.results[i][0].transcript;
          }
        }

        if (finalText.trim()) {
          nativeSpeechText = finalText.trim();
          console.log('[voice] Native final result:', nativeSpeechText);
        }
        if (interimText.trim()) {
          bestInterim = interimText.trim();
          console.log('[voice] Native interim:', bestInterim);
        }

        // Reset pause timer on any result activity
        clearTimeout(nativeSpeechTimer);
        nativeSpeechTimer = setTimeout(() => {
          if (myEpoch !== recognitionEpoch) return; // stale
          // Prefer final text, fall back to best interim
          const text = nativeSpeechText || bestInterim;
          if (text && listeningActive) {
            clearTimeout(nativeHardTimer);
            console.log('[voice] Native speech done:', text);
            try { nativeRecognizer.stop(); } catch {}
            handleVoiceResult(text);
          }
        }, NATIVE_SPEECH_PAUSE);
      };

      nativeRecognizer.onerror = (event) => {
        if (myEpoch !== recognitionEpoch) return; // stale — a newer session owns things now
        console.warn('[voice] Native error:', event.error, 'listeningActive=', listeningActive);

        // 'aborted' when not listening is expected — we called .stop() ourselves
        if (event.error === 'aborted' && !listeningActive) return;

        clearTimeout(nativeHardTimer);

        if ((event.error === 'no-speech' || event.error === 'aborted') && listeningActive && kioskState === STATES.GREETING && !nativeFallenBack) {
          nativeFailCount++;
          if (nativeFailCount >= NATIVE_MAX_FAILS && audioStream) {
            fallbackToMediaRecorder();
          } else {
            startNativeRecognition();
          }
        } else if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          console.warn('[voice] Mic permission denied — falling back to MediaRecorder');
          if (audioStream) fallbackToMediaRecorder();
        } else if (event.error === 'network') {
          console.warn('[voice] Network error — falling back to MediaRecorder');
          if (audioStream) fallbackToMediaRecorder();
        } else if (listeningActive && !nativeFallenBack) {
          // Only fall back on truly unrecoverable errors while actively listening
          console.warn('[voice] Unrecoverable native error — falling back to MediaRecorder');
          if (audioStream) fallbackToMediaRecorder();
        }
      };

      nativeRecognizer.onend = () => {
        if (myEpoch !== recognitionEpoch) return; // stale callback — ignore
        clearTimeout(nativeHardTimer);
        // Use whatever text we have (final or interim)
        const text = nativeSpeechText || bestInterim;
        if (text && listeningActive) {
          clearTimeout(nativeSpeechTimer);
          handleVoiceResult(text);
          return;
        }
        if (listeningActive && kioskState === STATES.GREETING && !nativeFallenBack) {
          nativeFailCount++;
          if (nativeFailCount >= NATIVE_MAX_FAILS && audioStream) {
            fallbackToMediaRecorder();
          } else {
            startNativeRecognition();
          }
        }
      };

      try {
        nativeRecognizer.start();
        console.log('[voice] Native recognition started (attempt %d)', nativeFailCount + 1);
      } catch (err) {
        console.warn('[voice] Native recognition start failed:', err);
        if (audioStream) fallbackToMediaRecorder();
      }
    }
    function startRecording() {
      if (!audioStream || !listeningActive) {
        console.log('[voice] startRecording skipped: audioStream=%s, listeningActive=%s', !!audioStream, listeningActive);
        return;
      }

      audioChunks = [];
      recordingStartTime = Date.now();

      const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus'
                      : MediaRecorder.isTypeSupported('audio/webm') ? 'audio/webm'
                      : MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4'
                      : '';

      try {
        mediaRecorder = new MediaRecorder(audioStream, mimeType ? { mimeType } : {});
      } catch (err) {
        console.warn('[voice] MediaRecorder failed:', err);
        return;
      }

      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };

      mediaRecorder.onstop = async () => {
        const duration = Date.now() - recordingStartTime;
        if (duration < MIN_RECORDING_MS || audioChunks.length === 0) {
          if (listeningActive) startRecording();
          return;
        }

        const ext = (mediaRecorder.mimeType || '').includes('mp4') ? 'mp4' : 'webm';
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType || 'audio/webm' });
        audioChunks = [];

        try {
          const formData = new FormData();
          formData.append('audio', blob, `recording.${ext}`);
          const res = await fetch('/api/chat/transcribe', { method: 'POST', body: formData });
          if (res.ok) {
            const data = await res.json();
            const text = data.text?.trim();
            if (text) {
              handleVoiceResult(text);
              return;
            }
          }
        } catch (err) {
          console.warn('[voice] Transcription error:', err);
        }

        if (listeningActive && kioskState === STATES.GREETING) startRecording();
      };

      mediaRecorder.start(250);
      startSilenceDetection();
    }

    function startSilenceDetection() {
      clearTimeout(silenceTimer);
      let silenceStart = null;

      let speechDetected = false;

      const check = () => {
        if (!listeningActive || !mediaRecorder || mediaRecorder.state !== 'recording') return;

        const elapsed = Date.now() - recordingStartTime;

        if (elapsed >= MAX_RECORDING_MS) {
          console.log('[voice] Max recording duration reached, stopping');
          mediaRecorder.stop();
          return;
        }

        const rms = getRMS();

        // If analyser isn't working (rms always 0), fall back to duration-based cutoff
        if (!analyserNode) {
          if (elapsed >= 5000) {
            console.log('[voice] No analyser, stopping after 5s');
            mediaRecorder.stop();
          } else {
            silenceTimer = setTimeout(check, 150);
          }
          return;
        }

        if (rms >= SILENCE_THRESHOLD) {
          speechDetected = true;
          silenceStart = null;
        } else if (speechDetected) {
          // Only start counting silence after speech was detected
          if (!silenceStart) silenceStart = Date.now();
          const silentFor = Date.now() - silenceStart;
          if (silentFor >= SILENCE_DURATION) {
            console.log('[voice] Silence after speech, stopping recording');
            mediaRecorder.stop();
            return;
          }
        }

        silenceTimer = setTimeout(check, 150);
      };

      silenceTimer = setTimeout(check, 500);
    }

    function stopListening() {
      recognitionEpoch++; // invalidate any in-flight native recognition callbacks
      listeningActive = false;
      listeningIndicator.classList.add('hidden');
      avatarEl.classList.remove('listening');
      clearTimeout(silenceTimer);
      clearTimeout(nativeSpeechTimer);
      clearTimeout(nativeHardTimer);
      clearTimeout(silenceAutoSummaryTimer);
      if (nativeRecognizer) {
        try { nativeRecognizer.abort(); } catch {}
        nativeRecognizer = null;
      }
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch { /* ignore */ }
      }
      // Disable audio tracks so the iOS mic indicator clears between sessions.
      // Tracks are re-enabled at the start of startListening().
      videoEl.srcObject?.getAudioTracks().forEach(t => { t.enabled = false; });
    }

    const FAREWELL_PATTERNS = /\b(heippa|heihei|hei\s*hei|näkemiin|nähdään|moi\s*moi|moikka|kiitos\s+siitä|kiitos\s+paljon|selvä\s+homma|hyvää\s+päivän\s*jatkoa|hyvää\s+yötä|hyvää\s+iltaa|bye|goodbye|see\s*you)\b/i;

    function isFarewell(text) {
      return FAREWELL_PATTERNS.test(text);
    }

    async function handleVoiceResult(transcript) {
      // Show what the user said
      userTextEl.textContent = `"${transcript}"`;

      // Cancel idle dismiss / auto-summary timers while processing
      clearTimeout(overlayTimeout);
      clearTimeout(silenceAutoSummaryTimer);

      // Pause listening while processing + speaking
      listeningActive = false;
      listeningIndicator.classList.add('hidden');
      avatarEl.classList.remove('listening');
      clearTimeout(silenceTimer);
      clearTimeout(nativeSpeechTimer);
      clearTimeout(nativeHardTimer);
      if (nativeRecognizer) {
        try { nativeRecognizer.abort(); } catch {}
        nativeRecognizer = null;
      }
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        try { mediaRecorder.stop(); } catch { /* ignore */ }
      }

      // Detect farewell — say goodbye and dismiss
      if (isFarewell(transcript)) {
        const goodbye = pick(['Heippa!', 'Nähdään!', 'Moikka!', 'Hei hei!']);
        reportSpinner.classList.add('hidden');
        reportText.textContent = goodbye;
        await speakAndWait(goodbye);
        dismissOverlay();
        return;
      }

      // Add to conversation history
      conversationHistory.push({ role: 'user', content: transcript });

      // Show spinner while generating response
      reportSpinner.classList.remove('hidden');

      try {
        const response = await generateConversationalResponse() || randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = response;
        conversationHistory.push({ role: 'assistant', content: response });
        await speakAndWait(response);
      } catch {
        const fallback = randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = fallback;
        await speakAndWait(fallback);
      }

      // Resume listening if still within max duration and face is present
      if (Date.now() - overlayStartTime < MAX_OVERLAY_DURATION && kioskState === STATES.GREETING) {
        startListening();
      }
    }

    async function generateConversationalResponse() {
      // Claude Bridge handles Ollama → Claude fallback internally with MCP tools
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        const res = await fetch('/api/chat/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const text = data.response?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Bridge unavailable */ }

      return null;
    }

    // -- Auto-reload on backend version change ------------------------------
    let knownVersion = null;

    async function checkVersion() {
      try {
        const res = await fetch('/version.txt', { cache: 'no-store' });
        if (!res.ok) return;
        const version = (await res.text()).trim();
        if (knownVersion === null) {
          knownVersion = version;
        } else if (version !== knownVersion && kioskState !== STATES.GREETING) {
          window.location.reload();
        }
      } catch { /* network error — skip */ }
    }

    checkVersion();
    setInterval(checkVersion, 60_000);
  </script>
