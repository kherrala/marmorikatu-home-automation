<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    /* ── Slides ─────────────────────────────────────────────────────────── */
    #slides { position: fixed; inset: 0; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 0.45s ease;
    }
    .slide.active { opacity: 1; }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Swipe overlay ───────────────────────────────────────────────────── */
    /* Covers the full screen so swipe gestures are reliably captured even
       when an iframe is underneath. Tap-through is handled in JS. */
    #overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      cursor: grab;
    }
    #overlay:active { cursor: grabbing; }

    /* ── Navigation dots ─────────────────────────────────────────────────── */
    #nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      pointer-events: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.45);
    }

    /* Pause indicator – fades in when carousel is paused by the user */
    #pause-badge {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 200;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #pause-badge.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="slides">
    <!-- 0: Home automation dashboard -->
    <div class="slide" id="slide-0">
      <iframe src="http://localhost:3000" title="Kotiautomaatio"></iframe>
    </div>
    <!-- 1: Nysse bus schedules -->
    <div class="slide" id="slide-1">
      <iframe src="http://localhost:3002" title="Nysse"></iframe>
    </div>
    <!-- 2: Yle Uutiset (note: yle.fi may block iframe embedding via X-Frame-Options) -->
    <div class="slide" id="slide-2">
      <iframe src="https://yle.fi/uutiset" title="Yle Uutiset"></iframe>
    </div>
  </div>

  <!-- Swipe-detection overlay (covers iframes) -->
  <div id="overlay"></div>

  <!-- Navigation dots -->
  <div id="nav">
    <div class="dot" data-idx="0"></div>
    <div class="dot" data-idx="1"></div>
    <div class="dot" data-idx="2"></div>
  </div>

  <div id="pause-badge">⏸ jatkuu 30 s</div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const TOTAL         = 3;
    const CAROUSEL_MS   = 30_000;  // rotate every 30 s
    const PAUSE_MS      = 30_000;  // pause carousel this long after interaction
    const NYSSE_IDX     = 1;       // index of the Nysse slide
    const PEAK_START    = 6;       // 06:00 – default to Nysse view
    const PEAK_END      = 9;       // 09:00

    // ── State ───────────────────────────────────────────────────────────────
    let current       = 0;
    let carouselTimer = null;
    let pauseTimer    = null;
    let paused        = false;

    // ── DOM refs ────────────────────────────────────────────────────────────
    const slides     = Array.from(document.querySelectorAll('.slide'));
    const dots       = Array.from(document.querySelectorAll('.dot'));
    const overlay    = document.getElementById('overlay');
    const pauseBadge = document.getElementById('pause-badge');

    // ── Slide switching ─────────────────────────────────────────────────────
    function show(idx) {
      const next = ((idx % TOTAL) + TOTAL) % TOTAL;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    // ── Carousel ─────────────────────────────────────────────────────────────
    function startCarousel() {
      clearInterval(carouselTimer);
      carouselTimer = setInterval(() => {
        if (!paused) show(current + 1);
      }, CAROUSEL_MS);
    }

    // ── Interaction / pause ──────────────────────────────────────────────────
    function handleInteraction() {
      paused = true;
      pauseBadge.classList.add('visible');
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        paused = false;
        pauseBadge.classList.remove('visible');
      }, PAUSE_MS);
    }

    // ── Swipe detection ──────────────────────────────────────────────────────
    let startX = 0, startY = 0, tracking = false, didSwipe = false;

    // Touch
    overlay.addEventListener('touchstart', (e) => {
      startX    = e.touches[0].clientX;
      startY    = e.touches[0].clientY;
      tracking  = true;
      didSwipe  = false;
    }, { passive: true });

    overlay.addEventListener('touchmove', (e) => {
      if (!tracking) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      // Only lock into swipe mode when horizontal movement dominates
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)) {
        didSwipe = true;
        e.preventDefault(); // suppress scroll during horizontal swipe
      }
    }, { passive: false });

    overlay.addEventListener('touchend', (e) => {
      if (!tracking) return;
      tracking = false;
      handleInteraction();
      const dx = e.changedTouches[0].clientX - startX;
      if (didSwipe && Math.abs(dx) > 40) {
        show(dx < 0 ? current + 1 : current - 1);
      }
    }, { passive: true });

    // Mouse (desktop / development)
    overlay.addEventListener('mousedown', (e) => {
      startX   = e.clientX;
      startY   = e.clientY;
      tracking = true;
      didSwipe = false;
    });

    overlay.addEventListener('mousemove', (e) => {
      if (!tracking) return;
      if (Math.abs(e.clientX - startX) > 12) didSwipe = true;
    });

    overlay.addEventListener('mouseup', (e) => {
      if (!tracking) return;
      tracking = false;
      handleInteraction();
      const dx = e.clientX - startX;
      if (didSwipe && Math.abs(dx) > 40) {
        show(dx < 0 ? current + 1 : current - 1);
      }
    });

    // Cancel tracking if pointer leaves window mid-drag
    document.addEventListener('mouseleave', () => { tracking = false; });

    // ── Init ─────────────────────────────────────────────────────────────────
    const hour    = new Date().getHours();
    const initial = (hour >= PEAK_START && hour < PEAK_END) ? NYSSE_IDX : 0;
    show(initial);
    startCarousel();
  </script>
</body>
</html>
