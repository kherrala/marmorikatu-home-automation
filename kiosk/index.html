<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    /* ── Slides ─────────────────────────────────────────────────────────── */
    #slides { position: fixed; inset: 0; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* ── Swipe / click edge strips ───────────────────────────────────────── */
    /* The left and right edges capture gestures and clicks for navigation.
       The centre passes all events directly to the iframe. */
    .swipe-edge {
      position: fixed;
      top: 20%;
      height: 60%;
      width: 56px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 6px 6px 0;
    }
    #swipe-left  { left: 0; border-radius: 0 6px 6px 0; }
    #swipe-right { right: 0; border-radius: 6px 0 0 6px; }

    /* Arrow chevrons – visible on hover/focus, barely there otherwise */
    .swipe-edge::after {
      content: var(--chevron);
      font-size: 28px;
      color: rgba(255,255,255,0.18);
      transition: color 0.2s, transform 0.2s;
      user-select: none;
    }
    .swipe-edge:hover::after {
      color: rgba(255,255,255,0.65);
      transform: scale(1.2);
    }
    #swipe-left  { --chevron: "‹"; }
    #swipe-right { --chevron: "›"; }

    /* ── Navigation dots ─────────────────────────────────────────────────── */
    #nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      pointer-events: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.45);
    }

    /* ── Pause badge ─────────────────────────────────────────────────────── */
    #pause-badge {
      position: fixed;
      top: 12px;
      right: 14px;
      z-index: 200;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #pause-badge.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="slides">
    <!-- 0: Home automation dashboard -->
    <div class="slide" id="slide-0">
      <iframe title="Kotiautomaatio"></iframe>
    </div>
    <!-- 1: Nysse bus schedules -->
    <div class="slide" id="slide-1">
      <iframe title="Nysse"></iframe>
    </div>
    <!-- 2: WAGO PLC web visualisation -->
    <div class="slide" id="slide-2">
      <iframe title="WebVisu"></iframe>
    </div>
  </div>

  <!-- Swipe / click zones on left and right edges only -->
  <div class="swipe-edge" id="swipe-left"></div>
  <div class="swipe-edge" id="swipe-right"></div>

  <!-- Navigation dots -->
  <div id="nav">
    <div class="dot" data-idx="0"></div>
    <div class="dot" data-idx="1"></div>
    <div class="dot" data-idx="2"></div>
  </div>

  <div id="pause-badge">⏸ jatkuu 30 s</div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    const TOTAL       = 3;
    const CAROUSEL_MS = 30_000;
    const PAUSE_MS    = 30_000;
    const NYSSE_IDX   = 1;
    const PEAK_START  = 6;
    const PEAK_END    = 9;

    // ── State ───────────────────────────────────────────────────────────────
    let current       = 0;
    let carouselTimer = null;
    let pauseTimer    = null;
    let paused        = false;

    // ── DOM refs ────────────────────────────────────────────────────────────
    const slides     = Array.from(document.querySelectorAll('.slide'));
    const dots       = Array.from(document.querySelectorAll('.dot'));
    const pauseBadge = document.getElementById('pause-badge');
    const edgeLeft   = document.getElementById('swipe-left');
    const edgeRight  = document.getElementById('swipe-right');

    // ── Slide switching ─────────────────────────────────────────────────────
    function show(idx) {
      const next = ((idx % TOTAL) + TOTAL) % TOTAL;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    // ── Carousel ─────────────────────────────────────────────────────────────
    function startCarousel() {
      clearInterval(carouselTimer);
      carouselTimer = setInterval(() => {
        if (!paused) show(current + 1);
      }, CAROUSEL_MS);
    }

    // ── Interaction / pause ──────────────────────────────────────────────────
    function handleInteraction() {
      paused = true;
      pauseBadge.classList.add('visible');
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        paused = false;
        pauseBadge.classList.remove('visible');
      }, PAUSE_MS);
    }

    // ── Swipe + click detection ──────────────────────────────────────────────
    // A gesture on an edge strip is either:
    //   • a click / tap  → navigate in the direction of that edge
    //   • a drag / swipe → navigate in the direction of the drag
    // Both also pause the carousel for PAUSE_MS.

    let startX = 0, startY = 0, tracking = false, didSwipe = false;

    function onTouchStart(e) {
      startX   = e.touches[0].clientX;
      startY   = e.touches[0].clientY;
      tracking = true;
      didSwipe = false;
    }

    function onTouchMove(e) {
      if (!tracking) return;
      const dx = e.touches[0].clientX - startX;
      const dy = e.touches[0].clientY - startY;
      if (Math.abs(dx) > 12 && Math.abs(dx) > Math.abs(dy)) {
        didSwipe = true;
        e.preventDefault();
      }
    }

    function onTouchEnd(e, isLeft) {
      if (!tracking) return;
      tracking = false;
      handleInteraction();
      const dx = e.changedTouches[0].clientX - startX;
      if (didSwipe && Math.abs(dx) > 40) {
        show(dx < 0 ? current + 1 : current - 1);
      } else if (!didSwipe) {
        // Tap on edge – navigate by edge direction
        show(isLeft ? current - 1 : current + 1);
      }
    }

    function onMouseDown(e) {
      startX   = e.clientX;
      startY   = e.clientY;
      tracking = true;
      didSwipe = false;
    }

    function onMouseMove(e) {
      if (!tracking) return;
      if (Math.abs(e.clientX - startX) > 12) didSwipe = true;
    }

    function onMouseUp(e, isLeft) {
      if (!tracking) return;
      tracking = false;
      handleInteraction();
      const dx = e.clientX - startX;
      if (didSwipe && Math.abs(dx) > 40) {
        show(dx < 0 ? current + 1 : current - 1);
      } else if (!didSwipe) {
        // Click on edge – navigate by edge direction
        show(isLeft ? current - 1 : current + 1);
      }
    }

    [
      [edgeLeft,  true ],
      [edgeRight, false],
    ].forEach(([el, isLeft]) => {
      el.addEventListener('touchstart', onTouchStart,              { passive: true  });
      el.addEventListener('touchmove',  onTouchMove,               { passive: false });
      el.addEventListener('touchend',   e => onTouchEnd(e, isLeft),{ passive: true  });
      el.addEventListener('mousedown',  onMouseDown);
      el.addEventListener('mousemove',  onMouseMove);
      el.addEventListener('mouseup',    e => onMouseUp(e, isLeft));
    });

    // Cancel mid-drag if pointer leaves window
    document.addEventListener('mouseleave', () => { tracking = false; });

    // ── Set iframe sources from origin hostname ──────────────────────────────
    const host = window.location.hostname;
    document.querySelector('#slide-0 iframe').src = `http://${host}:81/?kiosk`;
    document.querySelector('#slide-1 iframe').src = `http://${host}:3002`;
    document.querySelector('#slide-2 iframe').src = `http://${host}:82/webvisu/webvisu.htm`;

    // ── Init ─────────────────────────────────────────────────────────────────
    const hour    = new Date().getHours();
    const initial = (hour >= PEAK_START && hour < PEAK_END) ? NYSSE_IDX : 0;
    show(initial);
    startCarousel();
  </script>
</body>
</html>
