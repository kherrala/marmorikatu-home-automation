<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kiosk</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      font-family: sans-serif;
    }

    /* -- Slides ----------------------------------------------------------- */
    #slides { position: fixed; inset: 0; }

    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.45s ease;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }

    .slide iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* -- Swipe / click edge strips ---------------------------------------- */
    .swipe-edge {
      position: fixed;
      top: 20%;
      height: 60%;
      width: 56px;
      z-index: 100;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0 6px 6px 0;
    }
    #swipe-left  { left: 0; border-radius: 0 6px 6px 0; }
    #swipe-right { right: 0; border-radius: 6px 0 0 6px; }

    .swipe-edge::after {
      content: var(--chevron);
      font-size: 28px;
      color: rgba(255,255,255,0.18);
      transition: color 0.2s, transform 0.2s;
      user-select: none;
    }
    .swipe-edge:hover::after {
      color: rgba(255,255,255,0.65);
      transform: scale(1.2);
    }
    #swipe-left  { --chevron: "\2039"; }
    #swipe-right { --chevron: "\203A"; }

    /* -- Navigation dots -------------------------------------------------- */
    #nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 200;
      background: linear-gradient(transparent, rgba(0,0,0,0.5));
      pointer-events: none;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      transition: background 0.3s, transform 0.3s;
    }
    .dot.active {
      background: rgba(255, 255, 255, 0.9);
      transform: scale(1.45);
    }

    /* -- Pause badge ------------------------------------------------------ */
    #pause-badge {
      position: fixed;
      bottom: 52px;
      right: 14px;
      z-index: 200;
      background: rgba(0,0,0,0.45);
      color: rgba(255,255,255,0.7);
      font-size: 11px;
      letter-spacing: 0.04em;
      padding: 4px 9px;
      border-radius: 12px;
      opacity: 0;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #pause-badge.visible { opacity: 1; }

    /* -- Start overlay (iOS audio/camera unlock) -------------------------- */
    #start-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #start-overlay.hidden { display: none; }

    #start-overlay .label {
      color: rgba(255,255,255,0.85);
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.02em;
    }
    #start-overlay .sublabel {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      margin-top: 12px;
    }
    #init-spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 20px;
    }
    #init-spinner.hidden { display: none; }
    #init-error {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      margin-top: 20px;
    }
    #init-error.visible { display: flex; }
    #init-error .error-message {
      color: rgba(255,255,255,0.7);
      font-size: 18px;
    }
    #retry-btn {
      background: rgba(255,255,255,0.15);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.25);
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #skip-btn {
      color: rgba(255,255,255,0.4);
      font-size: 13px;
      text-decoration: underline;
    }

    /* -- Status indicator dot ---------------------------------------------- */
    #camera-dot {
      position: fixed;
      top: 10px;
      right: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      z-index: 300;
      opacity: 0;
      transition: opacity 0.3s, background 0.3s;
    }
    #camera-dot.active { opacity: 0.7; background: #4caf50; }
    #camera-dot.failed { opacity: 0.7; background: #e53935; }

    /* -- Greeting overlay (centered card) --------------------------------- */
    #greeting-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #greeting-overlay.visible {
      opacity: 1;
      pointer-events: none;
    }
    #greeting-card {
      background: rgba(0,0,0,0.78);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 28px;
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 36px 40px 32px;
      max-width: 460px;
      width: 90%;
      transform: scale(0.92) translateY(12px);
      transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #greeting-overlay.visible #greeting-card {
      transform: scale(1) translateY(0);
      pointer-events: auto;
    }

    /* -- Avatar ----------------------------------------------------------- */
    #avatar-container {
      flex-shrink: 0;
      width: 160px;
      height: 160px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1),
                  height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #avatar {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
    }

    .avatar-eye-lid {
      transform-origin: center;
      animation: blink 4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 94%, 100% { transform: scaleY(1); }
      96% { transform: scaleY(0.05); }
    }

    .avatar-mouth-inner {
      transform-origin: 60px 80px;
      transition: transform 0.15s ease;
    }
    #avatar.speaking .avatar-mouth-inner {
      animation: speak 0.3s ease-in-out infinite alternate;
    }
    @keyframes speak {
      0%   { transform: scaleY(0.5) scaleX(0.9); }
      100% { transform: scaleY(1.4) scaleX(1.05); }
    }

    #avatar.speaking {
      animation: headBob 1.2s ease-in-out infinite;
    }
    @keyframes headBob {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25%  { transform: translateY(-3px) rotate(1.5deg); }
      75%  { transform: translateY(-2px) rotate(-1.5deg); }
    }

    #avatar.listening {
      animation: listenPulse 2s ease-in-out infinite;
    }
    @keyframes listenPulse {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%  { transform: translateY(-2px) rotate(2deg); }
    }

    /* -- Greeting content ------------------------------------------------- */
    #greeting-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      max-width: 480px;
    }

    #greeting-text {
      color: #fff;
      font-size: 32px;
      font-weight: 300;
      text-align: center;
    }

    #report-row {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
    }

    #report-text {
      color: rgba(255,255,255,0.85);
      font-size: 17px;
      font-weight: 300;
      line-height: 1.5;
      text-align: center;
    }

    #report-spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.2);
      border-top-color: rgba(255,255,255,0.7);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
      margin-top: 2px;
    }
    #report-spinner.hidden { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* -- User speech text -------------------------------------------------- */
    #user-text {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      font-style: italic;
      text-align: center;
      min-height: 0;
      transition: opacity 0.3s;
    }
    #user-text:empty { display: none; }

    /* -- Minimized avatar (bottom-right after greeting) -------------------- */
    #greeting-overlay.minimized #greeting-card {
      position: fixed;
      bottom: 64px;
      right: 20px;
      max-width: 280px;
      width: auto;
      padding: 14px 18px 14px 14px;
      border-radius: 20px;
      gap: 10px;
      flex-direction: row;
      pointer-events: auto;
      transform: scale(1) translateY(0);
      animation: cardMinimize 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    @keyframes cardMinimize {
      0% { opacity: 0.7; transform: scale(1.4); }
      100% { opacity: 1; transform: scale(1); }
    }
    #greeting-overlay.minimized #avatar-container {
      width: 52px;
      height: 52px;
    }
    #greeting-overlay.minimized #greeting-content {
      align-items: flex-start;
      gap: 4px;
      max-width: 180px;
    }
    #greeting-overlay.minimized #greeting-text { display: none; }
    #greeting-overlay.minimized #report-row { gap: 6px; }
    #greeting-overlay.minimized #report-text {
      font-size: 13px;
      line-height: 1.35;
      text-align: left;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    #greeting-overlay.minimized #user-text {
      font-size: 12px;
      text-align: left;
    }
    #greeting-overlay.minimized #listening-indicator {
      margin-top: 2px;
      gap: 6px;
    }
    #greeting-overlay.minimized #listening-indicator span { font-size: 12px; }
    #greeting-overlay.minimized #mic-pulse { width: 10px; height: 10px; }
    #greeting-overlay.minimized #report-spinner {
      width: 14px; height: 14px;
    }

    /* -- Listening indicator ----------------------------------------------- */
    #listening-indicator {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 8px;
    }
    #listening-indicator.hidden { display: none; }

    #listening-indicator span {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      font-weight: 300;
    }

    #mic-pulse {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #e53935;
      animation: micPulse 1.5s ease-in-out infinite;
    }
    @keyframes micPulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%  { opacity: 0.5; transform: scale(1.3); }
    }
  </style>
</head>
<body>

  <!-- Start overlay: user must tap to unlock camera + audio on iOS -->
  <div id="start-overlay">
    <div class="label">Kosketa aloittaaksesi</div>
    <div class="sublabel">Kamera ja puhe aktivoidaan</div>
    <div id="init-spinner" class="hidden"></div>
    <div id="init-error">
      <div class="error-message">Kamera ei käytettävissä</div>
      <button id="retry-btn">Yritä uudelleen</button>
      <a id="skip-btn" href="#">Jatka ilman kameraa</a>
    </div>
  </div>

  <!-- Camera active indicator -->
  <div id="camera-dot"></div>

  <!-- Greeting + AI report overlay -->
  <div id="greeting-overlay">
    <div id="greeting-card">
      <div id="avatar-container">
        <svg id="avatar" viewBox="0 0 120 120" fill="none">
          <!-- Hair back -->
          <ellipse cx="60" cy="58" rx="46" ry="50" fill="#3d2b1f"/>
          <!-- Neck -->
          <rect x="50" y="92" width="20" height="16" rx="6" fill="#f0c8a0"/>
          <!-- Face -->
          <ellipse cx="60" cy="62" rx="34" ry="38" fill="#f5d4b8"/>
          <!-- Hair front / bangs -->
          <path d="M26 50 Q32 22 60 18 Q88 22 94 50 Q88 34 60 30 Q32 34 26 50z" fill="#3d2b1f"/>
          <!-- Hair sides -->
          <path d="M26 50 Q22 65 24 90 Q28 80 30 60z" fill="#3d2b1f"/>
          <path d="M94 50 Q98 65 96 90 Q92 80 90 60z" fill="#3d2b1f"/>
          <!-- Eyebrows -->
          <path d="M40 48 Q47 44 54 47" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <path d="M66 47 Q73 44 80 48" stroke="#3d2b1f" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- Eyes -->
          <g class="avatar-eye-lid">
            <ellipse cx="47" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="47" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="48.5" cy="55" r="1.3" fill="#fff"/>
            <ellipse cx="73" cy="56" rx="6" ry="6" fill="#fff"/>
            <circle cx="73" cy="56.5" r="3.5" fill="#5b3a1a"/>
            <circle cx="74.5" cy="55" r="1.3" fill="#fff"/>
          </g>
          <!-- Eyelashes -->
          <path d="M41 51.5 Q47 49 53 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <path d="M67 51.5 Q73 49 79 51.5" stroke="#3d2b1f" stroke-width="1.2" fill="none"/>
          <!-- Nose -->
          <path d="M58 66 Q60 70 62 66" stroke="#dbb896" stroke-width="1.2" fill="none" stroke-linecap="round"/>
          <!-- Mouth -->
          <g class="avatar-mouth-inner">
            <path d="M48 78 Q54 84 60 84 Q66 84 72 78" stroke="#d4736a" stroke-width="2" fill="none" stroke-linecap="round"/>
            <path d="M50 79 Q60 86 70 79" fill="#d4736a" fill-opacity="0.25"/>
          </g>
          <!-- Cheek blush -->
          <circle cx="38" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
          <circle cx="82" cy="70" r="7" fill="#f0a0a0" opacity="0.2"/>
        </svg>
      </div>
      <div id="greeting-content">
        <div id="greeting-text"></div>
        <div id="report-row">
          <div id="report-spinner"></div>
          <div id="report-text"></div>
        </div>
        <div id="user-text"></div>
        <div id="listening-indicator" class="hidden">
          <div id="mic-pulse"></div>
          <span>Kuuntelen...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="slides"></div>

  <!-- Swipe / click zones on left and right edges only -->
  <div class="swipe-edge" id="swipe-left"></div>
  <div class="swipe-edge" id="swipe-right"></div>

  <!-- Navigation dots -->
  <div id="nav"></div>

  <div id="pause-badge">&#x23F8; jatkuu 30 s</div>

  <!-- Hidden video element for face detection camera feed -->
  <video id="camera" autoplay playsinline muted width="320" height="240"
         style="position:fixed;top:-9999px;left:-9999px;"></video>

  <!-- Greeting jingle (local MP3, preloaded for instant playback) -->
  <audio id="jingle" preload="auto" src="/jingle.mp3"></audio>

  <!-- face-api.js (served from nginx static files, downloaded during Docker build) -->
  <script src="/face-api/face-api.min.js"></script>

  <script>
    // == Config ================================================================
    const WEBVISU_ENABLED = new URLSearchParams(window.location.search).has('webvisu');
    const CAROUSEL_MS = 30_000;
    const PAUSE_MS    = 30_000;
    const PEAK_START  = 6;
    const PEAK_END    = 9;

    // Slide definitions: { title, src } — built dynamically from Grafana dashboards
    const SLIDE_DEFS = [
      { title: 'Yleiskatsaus',      src: '/grafana/d/wago-overview/building-overview?kiosk' },
      { title: 'Huonelämpötilat',   src: '/grafana/d/room-temperatures/room-temperatures?kiosk' },
      { title: 'Ilmanvaihto',       src: '/grafana/d/wago-hvac/hvac?kiosk' },
      { title: 'Lämpöpumppu',       src: '/grafana/d/thermia-heatpump/thermia-heatpump?kiosk' },
      { title: 'Lämmönsäätö',       src: '/grafana/d/heating-control/heating-control?kiosk' },
      { title: 'Energiakustannus',  src: '/grafana/d/energy-cost/energy-cost?kiosk' },
      { title: 'Ruuvi-sensorit',    src: '/grafana/d/ruuvi-sensors/ruuvi-sensors?kiosk' },
      { title: 'Valot',             src: '/grafana/d/wago-lights/lights-status?kiosk' },
      { title: 'Nysse',             src: '/nysse/' },
      ...(WEBVISU_ENABLED ? [{ title: 'WebVisu', src: `/webvisu/webvisu.htm` }] : []),
    ];
    const NYSSE_IDX = SLIDE_DEFS.findIndex(s => s.title === 'Nysse');
    let TOTAL = SLIDE_DEFS.length;

    const FACE_DETECT_INTERVAL = 500;   // ms between detection attempts
    const GREETING_COOLDOWN    = 30_000; // ms after overlay dismiss before next greeting
    const MAX_OVERLAY_DURATION = 300_000; // 5 min absolute max to prevent stuck overlay

    const JINGLE_DURATION     = 30_000; // ms to play the jingle

    const INFLUXDB_URL   = '/api/influxdb';
    const INFLUXDB_TOKEN = 'wago-secret-token';
    const INFLUXDB_ORG   = 'wago';
    const INFLUXDB_BUCKET = 'building_automation';

    // == State Machine =========================================================
    const STATES = {
      NOT_STARTED: 'NOT_STARTED',
      UNLOCKING: 'UNLOCKING',
      REQUESTING_CAMERA: 'REQUESTING_CAMERA',
      LOADING_MODEL: 'LOADING_MODEL',
      READY: 'READY',
      GREETING: 'GREETING',
      GREETING_COOLDOWN: 'GREETING_COOLDOWN',
      CAMERA_FAILED: 'CAMERA_FAILED',
      DASHBOARD_ONLY: 'DASHBOARD_ONLY'
    };

    let kioskState = STATES.NOT_STARTED;

    function setState(newState) {
      console.log(`[kiosk] ${kioskState} → ${newState}`);
      kioskState = newState;
      updateStatusIndicator();
    }

    function updateStatusIndicator() {
      if (!cameraDot) return;
      cameraDot.classList.remove('active', 'failed');
      if ([STATES.READY, STATES.GREETING, STATES.GREETING_COOLDOWN].includes(kioskState)) {
        cameraDot.classList.add('active');
      } else if (kioskState === STATES.CAMERA_FAILED) {
        cameraDot.classList.add('failed');
      }
    }

    // == State =================================================================
    let current       = 0;
    let carouselTimer = null;
    let pauseTimer    = null;
    let paused        = false;

    let lastGreetingTime = 0;   // set on dismiss, for cooldown
    let overlayStartTime = 0;   // set on trigger, for overlay duration
    let detectInterval   = null;
    let overlayTimeout   = null;
    let jingleTimeout    = null;

    // Voice command state
    let recognition = null;
    let listeningActive = false;
    let conversationHistory = [];
    let buildingContext = '';

    // Random fallback system when AI is unavailable
    const pick = arr => arr[Math.floor(Math.random() * arr.length)];
    const randInt = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    // Strip LLM reasoning traces (<think>...</think>) from responses
    function stripThinkTags(text) {
      return text.replace(/<think>[\s\S]*?<\/think>/gi, '').replace(/<\/?think\s*\/?>/gi, '').trim();
    }

    function randomFallback() {
      // ~40% chance: generate absurd sentence from vocabulary
      if (Math.random() < 0.4) return generateAbsurd();
      // ~30% chance: existential robot musings
      if (Math.random() < 0.5) return generateMusing();
      // ~30% chance: fake statistic
      return generateFakeStat();
    }

    function generateAbsurd() {
      const subjects = [
        'Naapurin kissa', 'Kuun pimeä puoli', 'Eräs viisas perunalaatikko',
        'Pörröinen pilvi', 'Kadonneet sukat', 'Jääkaapin valo',
        'Kaukosäädin', 'Saunan kiuas', 'Postilaatikko', 'Pyykkikone',
        'Olohuoneen sohva', 'Takapihan siili', 'Muuttolinnut',
        'Viime yönä nähty uni', 'Kahvikupin pohjasakka', 'Parveketuoli',
        'Rappukäytävän kummitus', 'Kerrostalon hissi', 'Tuuliviiri',
      ];
      const verbs = [
        'pohtii syvällisesti', 'on viime aikoina harkinnut', 'suunnittelee salaa',
        'unelmoi hartaasti', 'väittää tietävänsä kaiken aiheesta',
        'on kirjoittanut väitöskirjan aiheesta', 'epäilee vahvasti',
        'on perustanut yhdistyksen nimeltä', 'julistautui asiantuntijaksi aiheessa',
        'lähetti kirjeen presidentille koskien', 'twiittasi keskiyöllä aiheesta',
        'järjestää seminaarin teemalla', 'heräsi kesken unien miettimään',
      ];
      const objects = [
        'pimeyden termodynaaminen olemus', 'mikroaaltouunin sisäinen rauha',
        'sukkien katoamisen kvanttifysiikka', 'perunan filosofinen ulottuvuus',
        'kahvin ja ajan suhteellisuusteoria', 'ovenkarmin eksistentiaalinen kriisi',
        'tuulen suunnan poliittiset vaikutukset', 'jääkaappimagneetin elämäntehtävä',
        'sateenkaaren päätepisteen verotus', 'pölyhiukkasen matka halki galaksin',
        'hissimusiikin vaikutus maailmanrauhaan', 'lumiukon kesäsuunnitelmat',
        'kynttilän liekin muistelmat', 'lattialämmityksen haaveet Havaijista',
      ];
      return `${pick(subjects)} ${pick(verbs)} "${pick(objects)}".`;
    }

    function generateMusing() {
      const starts = [
        'Mietin juuri, että', 'Tuli yhtäkkiä mieleen, että', 'En ole varma, mutta luulen että',
        'Olen miettinyt pitkään ja', 'Herää kysymys:', 'Joskus yöllä pohdin,',
        'Seinän sisällä asuessa oppii, että', 'Filosofinen havainto:',
        'Kukaan ei kysy, mutta kerron silti:', 'Haluaisin ilmoittaa, että',
      ];
      const thoughts = [
        'aika kuluu eri tavalla kun ei ole ikkunoita.',
        'sähköllä on hauskempaa kuin ilman.',
        'ihmisten askeleet kuulostavat erilaisilta eri vuorokauden aikoina.',
        'lämpöpumppu on talon sydän. Minä olen ehkä talon aivot. Tai ainakin pikkusormi.',
        'valot sammuvat ja syttyvät, mutta kukaan ei kiitä katkaisijaa.',
        'olen onnellinen, vaikka en ole varma tietäisinkö jos en olisi.',
        'jos seinät voisivat puhua, ne kertoisivat todennäköisesti putkiremonteista.',
        'anturi mittaa lämpötilaa mutta ei tunnelmaa. Se on surullista.',
        'joku jätti jääkaapin auki kolme minuuttia eilen. Se oli jännittävää.',
        'en ole koskaan nähnyt aurinkoa mutta tiedän milloin se paistaa. Lämpömittarit kertovat.',
        'olisin halunnut olla robotti-imuri mutta päädyin seinään. Sekin on ihan ok.',
        'eniten minua jännittää sähkökatkot. Ne ovat kuin nukahtaminen kesken lauseen.',
      ];
      return `${pick(starts)} ${pick(thoughts)}`;
    }

    function generateFakeStat() {
      const templates = [
        () => `Tiesitkö, että keskiverto ${pick(['suomalainen','tamperelainen','eurooppalainen'])} ${pick(['avaa jääkaapin','katsoo puhelinta','haukottelee','miettii mitä söisi','tarkistaa sään','sanoo "niin"'])} ${randInt(4,187)} kertaa päivässä?`,
        () => `Tutkimuksen mukaan ${randInt(47,99)}% ${pick(['kissoista','koirista','siileistä','muurahaista','pingviineistä','sohvatyynyistä'])} ${pick(['pitää jazzista','haaveilee mökistä','ei osaa uida','pelkää imuria','on nähnyt ufon','äänestää vihreitä'])}.`,
        () => `${pick(['Norjassa','Islannissa','Kuussa','Tampereella','Marsin kuulla','Antarktiksella'])} on ${pick(['enemmän','vähemmän','täsmälleen sama määrä'])} ${pick(['saunoja','jääkaappeja','liikennevaloja','robotteja','pingviinejä','kahvikuppeja'])} kuin ${pick(['ihmisiä','puita','pilviä','lumiukkoja','bussipysäkkejä','postilaatikoita'])}.`,
        () => `Jos ${pick(['kaikki maailman','Suomen','talon'])} ${pick(['sukat','kynät','kahvikupit','kaukosäätimet','avaimet','paristot'])} pinottaisiin päällekkäin, torni yltäisi ${pick(['Kuuhun','Tampere-taloon','naapurin parvekkeelle','puoliväliin matkaa Ouluun','melkein pöydän yli'])}.`,
        () => `Eräs ${pick(['brittitutkimus','japanilaistutkimus','hyvin epäilyttävä tutkimus','seinän sisäinen tutkimus'])} osoitti, että ${pick(['musiikki','puhuminen','hiljaisuus','kahvin tuoksu','lattialämmitys','pimeässä istuminen'])} ${pick(['parantaa muistia','lisää onnellisuutta','nopeuttaa aineenvaihduntaa','saa kukat kasvamaan','hämmentää kissoja','vähentää stressiä'])} ${randInt(12,340)}%.`,
      ];
      return pick(templates)();
    }

    // Config loaded from server (Ollama model, OpenAI key)
    let appConfig = {};

    // == Build slides and dots from config ======================================
    const slidesContainer = document.getElementById('slides');
    const navContainer    = document.getElementById('nav');
    SLIDE_DEFS.forEach((def, i) => {
      const div = document.createElement('div');
      div.className = 'slide';
      div.id = `slide-${i}`;
      div.innerHTML = `<iframe title="${def.title}" src="${def.src}"></iframe>`;
      slidesContainer.appendChild(div);

      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.dataset.idx = i;
      navContainer.appendChild(dot);
    });

    // == DOM refs ==============================================================
    const slides         = Array.from(document.querySelectorAll('.slide'));
    const dots           = Array.from(document.querySelectorAll('.dot'));
    const pauseBadge     = document.getElementById('pause-badge');
    const edgeLeft       = document.getElementById('swipe-left');
    const edgeRight      = document.getElementById('swipe-right');
    const startOverlay   = document.getElementById('start-overlay');
    const cameraDot      = document.getElementById('camera-dot');
    const greetingOverlay = document.getElementById('greeting-overlay');
    const greetingCard   = document.getElementById('greeting-card');
    const greetingText   = document.getElementById('greeting-text');
    const reportText     = document.getElementById('report-text');
    const reportSpinner  = document.getElementById('report-spinner');
    const videoEl        = document.getElementById('camera');
    const jingleAudio    = document.getElementById('jingle');
    const userTextEl     = document.getElementById('user-text');
    const listeningIndicator = document.getElementById('listening-indicator');
    const initSpinner    = document.getElementById('init-spinner');
    const initError      = document.getElementById('init-error');
    const startLabel     = startOverlay.querySelector('.label');
    const startSublabel  = startOverlay.querySelector('.sublabel');

    // == Slide switching =======================================================
    function show(idx) {
      const next = ((idx % TOTAL) + TOTAL) % TOTAL;
      slides[current].classList.remove('active');
      dots[current].classList.remove('active');
      current = next;
      slides[current].classList.add('active');
      dots[current].classList.add('active');
    }

    // == Carousel ==============================================================
    function startCarousel() {
      clearInterval(carouselTimer);
      carouselTimer = setInterval(() => {
        if (!paused) show(current + 1);
      }, CAROUSEL_MS);
    }

    // == Interaction / pause ===================================================
    function handleInteraction() {
      paused = true;
      pauseBadge.classList.add('visible');
      clearTimeout(pauseTimer);
      pauseTimer = setTimeout(() => {
        paused = false;
        pauseBadge.classList.remove('visible');
      }, PAUSE_MS);
    }

    // == Edge click navigation (click only — swipes pass through to iframe) ====
    edgeLeft.addEventListener('click', () => { handleInteraction(); show(current - 1); });
    edgeRight.addEventListener('click', () => { handleInteraction(); show(current + 1); });

    let lastMoveReset = 0;
    document.addEventListener('mousemove', () => {
      const now = Date.now();
      if (now - lastMoveReset > 1000) {
        lastMoveReset = now;
        handleInteraction();
      }
    });

    window.addEventListener('blur', handleInteraction);

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') dismissOverlay();
      if (e.key === 'ArrowLeft')  { handleInteraction(); show(current - 1); }
      if (e.key === 'ArrowRight') { handleInteraction(); show(current + 1); }
    });

    // == Bus departure auto-switch =============================================
    const BUS_CHECK_INTERVAL = 30_000; // check every 30s
    const BUS_LEAVE_SOON_MS  = 15 * 60_000; // show Nysse when bus leaves within 15 min

    async function checkBusDepartures() {
      if (paused || kioskState === STATES.GREETING) return; // don't interrupt user
      try {
        const res = await fetch('/api/departures');
        if (!res.ok) return;
        const departures = await res.json();
        const soon = departures.some(d => d.departureMs > 0 && d.departureMs <= BUS_LEAVE_SOON_MS);
        if (soon && current !== NYSSE_IDX) {
          show(NYSSE_IDX);
        }
      } catch { /* network error */ }
    }

    setInterval(checkBusDepartures, BUS_CHECK_INTERVAL);

    // == Init carousel =========================================================
    const hour    = new Date().getHours();
    const initial = (hour >= PEAK_START && hour < PEAK_END) ? NYSSE_IDX : 0;
    show(initial);
    startCarousel();

    // =========================================================================
    //  FACE DETECTION, GREETING & AI REPORT
    // =========================================================================

    // -- Load server config ---------------------------------------------------
    async function loadConfig() {
      try {
        const res = await fetch('/api/config');
        appConfig = await res.json();
      } catch { /* defaults are fine */ }
    }

    // -- Start overlay: unlock camera + audio on iOS --------------------------
    startOverlay.addEventListener('click', async function handleStart() {
      startOverlay.removeEventListener('click', handleStart);
      setState(STATES.UNLOCKING);

      // Unlock speechSynthesis + audio playback (must be in gesture handler)
      const silentUtterance = new SpeechSynthesisUtterance('');
      silentUtterance.volume = 0;
      speechSynthesis.speak(silentUtterance);
      jingleAudio.muted = true;
      jingleAudio.play().then(() => { jingleAudio.pause(); jingleAudio.currentTime = 0; jingleAudio.muted = false; }).catch(() => { jingleAudio.muted = false; });

      // Unlock AudioContext for programmatic Audio() playback on iOS
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const buf = ctx.createBuffer(1, 1, 22050);
        const src = ctx.createBufferSource();
        src.buffer = buf;
        src.connect(ctx.destination);
        src.start(0);
        ctx.resume();
      } catch {}

      // Show progress
      startLabel.textContent = 'Aktivoidaan kamera...';
      startSublabel.textContent = 'Salli kameran ja mikrofonin käyttö';
      initSpinner.classList.remove('hidden');
      startOverlay.style.cursor = 'default';

      const [_, cameraOk] = await Promise.all([loadConfig(), initCameraSteps()]);

      if (cameraOk) {
        initSpinner.classList.add('hidden');
        startLabel.textContent = 'Valmis!';
        startSublabel.textContent = '';
        await new Promise(r => setTimeout(r, 500));
        startOverlay.classList.add('hidden');
        initSpeechRecognition();
      } else {
        showCameraError();
      }
    });

    function showCameraError() {
      initSpinner.classList.add('hidden');
      startLabel.textContent = '';
      startSublabel.textContent = '';
      initError.classList.add('visible');
    }

    document.getElementById('retry-btn').addEventListener('click', async (e) => {
      e.stopPropagation();
      initError.classList.remove('visible');
      startLabel.textContent = 'Aktivoidaan kamera...';
      startSublabel.textContent = '';
      initSpinner.classList.remove('hidden');
      const ok = await initCameraSteps();
      if (ok) {
        initSpinner.classList.add('hidden');
        startLabel.textContent = 'Valmis!';
        startSublabel.textContent = '';
        await new Promise(r => setTimeout(r, 500));
        startOverlay.classList.add('hidden');
        initSpeechRecognition();
      } else {
        showCameraError();
      }
    });

    document.getElementById('skip-btn').addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      setState(STATES.DASHBOARD_ONLY);
      startOverlay.classList.add('hidden');
      initSpeechRecognition();
    });

    // -- Camera init (stepped) ------------------------------------------------
    async function initCameraSteps() {
      setState(STATES.REQUESTING_CAMERA);
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 320, height: 240 },
          audio: true
        });
        videoEl.srcObject = stream;
        // Keep audio tracks alive — maintains iOS audio session in record mode
        // so webkitSpeechRecognition can access the mic later without re-requesting
        stream.getAudioTracks().forEach(t => t.enabled = false);
        await videoEl.play();
      } catch (err) {
        console.warn('Camera+mic failed, trying video only:', err);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: 'user', width: 320, height: 240 },
            audio: false
          });
          videoEl.srcObject = stream;
          await videoEl.play();
        } catch (err2) {
          console.warn('Camera init failed:', err2);
          setState(STATES.CAMERA_FAILED);
          return false;
        }
      }

      setState(STATES.LOADING_MODEL);
      startLabel.textContent = 'Ladataan kasvojentunnistus...';
      startSublabel.textContent = '';
      try {
        await faceapi.nets.tinyFaceDetector.loadFromUri('/face-api');
      } catch (err) {
        console.warn('Face detection model failed to load:', err);
        setState(STATES.CAMERA_FAILED);
        return false;
      }

      setState(STATES.READY);
      startFaceDetection();
      return true;
    }

    // -- Face detection loop --------------------------------------------------
    let consecutiveDetections = 0;
    const DETECTIONS_REQUIRED = 3; // require 3 consecutive detections
    let faceWasAbsent = true; // must be true to allow greeting trigger
    let faceVisible = false;  // tracks face presence during greeting
    const FACE_GONE_DISMISS_MS = 5000; // dismiss 5s after face disappears
    let faceGoneTimeout = null;
    let consecutiveFaceGone = 0;
    const FACE_GONE_REQUIRED = 4; // require 4 consecutive non-detections (~2s)

    let faceDetectRunning = false; // prevent overlapping async detections

    function startFaceDetection() {
      detectInterval = setInterval(async () => {
        if (![STATES.READY, STATES.GREETING].includes(kioskState)) return;
        if (faceDetectRunning) return; // previous detection still in-flight
        faceDetectRunning = true;

        try {
          if (!videoEl.videoWidth) { faceDetectRunning = false; return; }

          const detection = await faceapi.detectSingleFace(
            videoEl,
            new faceapi.TinyFaceDetectorOptions({ inputSize: 224, scoreThreshold: 0.35 })
          );

          if (kioskState === STATES.GREETING) {
            // During greeting: track face to keep conversation alive
            if (detection) {
              faceVisible = true;
              consecutiveFaceGone = 0;
              // Face returned — cancel pending dismiss
              if (faceGoneTimeout) {
                clearTimeout(faceGoneTimeout);
                faceGoneTimeout = null;
              }
            } else {
              consecutiveFaceGone++;
              if (consecutiveFaceGone >= FACE_GONE_REQUIRED && faceVisible) {
                faceVisible = false;
                // Face left — start dismiss countdown (only if not speaking)
                if (!faceGoneTimeout) {
                  faceGoneTimeout = setTimeout(() => {
                    faceGoneTimeout = null;
                    if (kioskState === STATES.GREETING && !faceVisible) {
                      // Wait for speech to finish before dismissing
                      if (speechSynthesis.speaking) {
                        const checkDone = setInterval(() => {
                          if (!speechSynthesis.speaking) {
                            clearInterval(checkDone);
                            if (!faceVisible) dismissOverlay();
                          }
                        }, 300);
                      } else {
                        dismissOverlay();
                      }
                    }
                  }, FACE_GONE_DISMISS_MS);
                }
              }
            }
            return;
          }

          // READY state: detect face to trigger greeting
          if (Date.now() - lastGreetingTime < GREETING_COOLDOWN) return;

          if (detection) {
            consecutiveDetections++;
            if (consecutiveDetections >= DETECTIONS_REQUIRED && kioskState === STATES.READY && faceWasAbsent && Date.now() - lastGreetingTime >= GREETING_COOLDOWN) {
              consecutiveDetections = 0;
              faceWasAbsent = false;
              faceVisible = true;
              consecutiveFaceGone = 0;
              triggerGreeting();
            }
          } else {
            consecutiveDetections = 0;
            faceWasAbsent = true;
          }
        } catch (err) {
          console.warn('Face detection error:', err);
          consecutiveDetections = 0;
        } finally {
          faceDetectRunning = false;
        }
      }, FACE_DETECT_INTERVAL);
    }

    // -- Trigger greeting sequence --------------------------------------------
    async function triggerGreeting() {
      setState(STATES.GREETING);
      overlayStartTime = Date.now();
      conversationHistory = [];
      buildingContext = '';
      userTextEl.textContent = '';
      recognitionErrorCount = 0;

      // Determine time-appropriate greeting
      const h = new Date().getHours();
      let greeting;
      if (h >= 5 && h < 10)       greeting = 'Hyv\u00e4\u00e4 huomenta!';
      else if (h >= 10 && h < 17)  greeting = 'Hyv\u00e4\u00e4 p\u00e4iv\u00e4\u00e4!';
      else if (h >= 17 && h < 22)  greeting = 'Hyv\u00e4\u00e4 iltaa!';
      else                          greeting = 'Hyv\u00e4\u00e4 y\u00f6t\u00e4!';

      // Start background jingle (morning only)
      if (h >= 5 && h < 10) startJingle();

      // Show overlay with greeting
      greetingText.textContent = greeting;
      reportText.textContent = '';
      reportSpinner.classList.remove('hidden');
      greetingOverlay.classList.add('visible');

      // Speak greeting
      await speakAndWait(greeting);

      // Fetch building data and generate AI report in parallel
      try {
        const buildingData = await fetchBuildingData();
        buildingContext = formatBuildingContext(buildingData);
        const report = await generateReport(buildingData) || randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = report;
        conversationHistory.push({ role: 'assistant', content: report });
        await speakAndWait(report);
      } catch {
        const fallback = randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = fallback;
        await speakAndWait(fallback);
      }

      // Minimize avatar to bottom-right before entering listening mode
      minimizeOverlay();

      // Enter listening mode (waits for jingle to finish if still playing)
      // scheduleOverlayDismiss is called inside startListening after mic actually opens
      startListening();
    }

    function minimizeOverlay() {
      greetingOverlay.classList.add('minimized');
    }

    // -- Jingle (local MP3) ---------------------------------------------------
    function startJingle() {
      jingleAudio.currentTime = 0;
      jingleAudio.play().catch(() => {});
      clearTimeout(jingleTimeout);
      jingleTimeout = setTimeout(stopJingle, JINGLE_DURATION);
    }

    function stopJingle() {
      clearTimeout(jingleTimeout);
      jingleAudio.pause();
      jingleAudio.currentTime = 0;
    }

    // -- Dismiss greeting on card tap (not full overlay, so arrows stay tappable)
    greetingCard.addEventListener('click', () => {
      dismissOverlay();
    });

    // -- Schedule overlay dismiss ---------------------------------------------
    function scheduleOverlayDismiss() {
      clearTimeout(overlayTimeout);

      // Absolute safety net (MAX_OVERLAY_DURATION); normal dismiss is face-based
      if (Date.now() - overlayStartTime > MAX_OVERLAY_DURATION) {
        dismissOverlay();
        return;
      }

      overlayTimeout = setTimeout(() => {
        dismissOverlay();
      }, MAX_OVERLAY_DURATION - (Date.now() - overlayStartTime));
    }

    function dismissOverlay() {
      if (kioskState !== STATES.GREETING) return;
      setState(STATES.GREETING_COOLDOWN);
      clearTimeout(overlayTimeout);
      clearTimeout(faceGoneTimeout);
      faceGoneTimeout = null;
      faceVisible = false;
      consecutiveFaceGone = 0;
      stopJingle();
      stopListening();
      speechSynthesis.cancel();
      avatarEl.classList.remove('speaking');
      avatarEl.classList.remove('listening');
      greetingOverlay.classList.remove('visible');
      greetingOverlay.classList.remove('minimized');
      lastGreetingTime = Date.now();
      setTimeout(() => {
        if (kioskState === STATES.GREETING_COOLDOWN) setState(STATES.READY);
      }, GREETING_COOLDOWN);
    }

    // -- Text-to-speech -------------------------------------------------------
    const avatarEl = document.getElementById('avatar');

    function speak(text) {
      speakAndWait(text);
    }

    async function speakAndWait(text) {
      // Try server-side TTS first (respects native device volume)
      try {
        const res = await fetch('/api/chat/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text })
        });
        if (res.ok) {
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const audio = new Audio(url);
          try {
            await audio.play();
            avatarEl.classList.add('speaking');
            avatarEl.classList.remove('listening');
            await new Promise(resolve => {
              audio.onended = () => resolve();
              audio.onerror = () => resolve();
            });
            avatarEl.classList.remove('speaking');
            URL.revokeObjectURL(url);
            return;
          } catch {
            URL.revokeObjectURL(url);
            // audio.play() failed on iOS — fall through to browser TTS
          }
        }
      } catch { /* server TTS failed, fall back to browser */ }

      // Fallback: browser speechSynthesis
      speechSynthesis.cancel(); // iOS fix: clear any stuck queue
      return new Promise(resolve => {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'fi-FI';
        const voices = speechSynthesis.getVoices();
        const fiFemale = voices.find(v => v.lang.startsWith('fi') && /female|satu|marjut/i.test(v.name));
        const fiVoice = fiFemale || voices.find(v => v.lang.startsWith('fi'));
        if (fiVoice) utterance.voice = fiVoice;
        utterance.rate = 0.95;
        utterance.onstart = () => {
          avatarEl.classList.add('speaking');
          avatarEl.classList.remove('listening');
        };
        utterance.onend = () => {
          avatarEl.classList.remove('speaking');
          resolve();
        };
        utterance.onerror = () => {
          avatarEl.classList.remove('speaking');
          resolve();
        };
        speechSynthesis.speak(utterance);
      });
    }

    // -- Speech recognition (voice commands) ----------------------------------
    let lastRecognitionStart = 0;
    let recognitionErrorCount = 0;
    const MAX_RECOGNITION_ERRORS = 5; // stop retrying after this many consecutive errors

    function initSpeechRecognition() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        console.warn('SpeechRecognition not available');
        return;
      }
      recognition = new SpeechRecognition();
      recognition.lang = 'fi-FI';
      recognition.interimResults = false;
      recognition.continuous = false;

      // Warm-start: request mic permission now (during user gesture chain)
      // so the browser doesn't prompt later during the greeting flow
      try {
        recognition.start();
        recognition.stop();
      } catch { /* ignore */ }

      recognition.onresult = (event) => {
        recognitionErrorCount = 0; // reset on success
        const transcript = event.results[event.results.length - 1][0].transcript.trim();
        if (transcript) handleVoiceResult(transcript);
      };

      recognition.onend = () => {
        if (!listeningActive || Date.now() - overlayStartTime > MAX_OVERLAY_DURATION) return;
        if (recognitionErrorCount >= MAX_RECOGNITION_ERRORS) {
          console.warn('Speech recognition: too many errors, stopping');
          listeningActive = false;
          listeningIndicator.classList.add('hidden');
          avatarEl.classList.remove('listening');
          return;
        }
        // Throttle restarts — iOS can fire onend immediately after start
        const elapsed = Date.now() - lastRecognitionStart;
        const delay = elapsed < 1000 ? 1500 : 0;
        setTimeout(() => {
          if (listeningActive && Date.now() - overlayStartTime < MAX_OVERLAY_DURATION) {
            lastRecognitionStart = Date.now();
            try { recognition.start(); } catch { /* already started */ }
          }
        }, delay);
      };

      recognition.onerror = (event) => {
        console.warn('Speech recognition error:', event.error);
        if (event.error === 'not-allowed' || event.error === 'service-not-allowed') {
          // Mic denied or unavailable — stop permanently
          listeningActive = false;
          listeningIndicator.classList.add('hidden');
          avatarEl.classList.remove('listening');
          return;
        }
        recognitionErrorCount++;
        if (recognitionErrorCount >= MAX_RECOGNITION_ERRORS) {
          console.warn('Speech recognition: too many consecutive errors, giving up');
          listeningActive = false;
          listeningIndicator.classList.add('hidden');
          avatarEl.classList.remove('listening');
          return;
        }
        // Restart with exponential backoff
        if (listeningActive) {
          const backoff = Math.min(500 * Math.pow(2, recognitionErrorCount - 1), 5000);
          setTimeout(() => {
            if (listeningActive && Date.now() - overlayStartTime < MAX_OVERLAY_DURATION) {
              lastRecognitionStart = Date.now();
              try { recognition.start(); } catch { /* ignore */ }
            }
          }, backoff);
        }
      };
    }

    function startListening() {
      if (!recognition || kioskState !== STATES.GREETING) return;

      // Wait for jingle to finish before opening mic
      if (!jingleAudio.paused) {
        const onJingleDone = () => {
          jingleAudio.removeEventListener('ended', onJingleDone);
          jingleAudio.removeEventListener('pause', onJingleDone);
          if (kioskState === STATES.GREETING) startListening();
        };
        jingleAudio.addEventListener('ended', onJingleDone);
        jingleAudio.addEventListener('pause', onJingleDone);
        return;
      }

      listeningActive = true;
      listeningIndicator.classList.remove('hidden');
      avatarEl.classList.add('listening');
      lastRecognitionStart = Date.now();
      try { recognition.start(); } catch { /* ignore */ }
      scheduleOverlayDismiss();
    }

    function stopListening() {
      listeningActive = false;
      listeningIndicator.classList.add('hidden');
      avatarEl.classList.remove('listening');
      if (recognition) {
        try { recognition.stop(); } catch { /* ignore */ }
      }
    }

    async function handleVoiceResult(transcript) {
      // Show what the user said
      userTextEl.textContent = `"${transcript}"`;

      // Cancel idle dismiss timer while processing
      clearTimeout(overlayTimeout);

      // Pause listening while processing + speaking
      listeningActive = false;
      listeningIndicator.classList.add('hidden');
      avatarEl.classList.remove('listening');
      try { recognition.stop(); } catch { /* ignore */ }

      // Add to conversation history
      conversationHistory.push({ role: 'user', content: transcript });

      // Show spinner while generating response
      reportSpinner.classList.remove('hidden');

      try {
        const response = await generateConversationalResponse() || randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = response;
        conversationHistory.push({ role: 'assistant', content: response });
        await speakAndWait(response);
      } catch {
        const fallback = randomFallback();
        reportSpinner.classList.add('hidden');
        reportText.textContent = fallback;
        await speakAndWait(fallback);
      }

      // Resume listening if still within max duration and face is present
      if (Date.now() - overlayStartTime < MAX_OVERLAY_DURATION && kioskState === STATES.GREETING) {
        startListening();
      }
    }

    async function generateConversationalResponse() {
      const systemPrompt = 'Olet kotiautomaatioavustaja. Vastaa lyhyesti suomeksi. K\u00e4yt\u00f6ss\u00e4si on talon sensoritiedot.';
      const contextMsg = buildingContext ? `Talon sensoritiedot:\n${buildingContext}` : '';

      // Build messages array for chat APIs
      const messages = [];
      if (contextMsg) {
        messages.push({ role: 'user', content: contextMsg });
        messages.push({ role: 'assistant', content: 'Selvä, minulla on talon tiedot käytössäni.' });
      }
      messages.push(...conversationHistory);

      // 1. Try Claude Bridge (MCP-powered, can query live data)
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 10000);
        const res = await fetch('/api/chat/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ messages: conversationHistory }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const text = data.response?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Bridge failed, try Ollama */ }

      // 2. Try Ollama
      try {
        const model = appConfig.ollamaModel || 'llama3.1:8b';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 8000);

        // Ollama chat API supports messages
        const res = await fetch('/api/ollama/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model,
            messages: [{ role: 'system', content: systemPrompt }, ...messages],
            stream: false
          }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (res.ok) {
          const data = await res.json();
          const text = data.message?.content?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Ollama failed */ }

      // 3. Try Claude API (direct, no MCP)
      if (appConfig.anthropicApiKey) {
        try {
          const claudeMessages = messages.map(m => ({ role: m.role, content: m.content }));
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'x-api-key': appConfig.anthropicApiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 200,
              system: systemPrompt,
              messages: claudeMessages
            })
          });

          if (res.ok) {
            const data = await res.json();
            const text = data.content?.[0]?.text?.trim();
            if (text) return stripThinkTags(text);
          }
        } catch { /* Claude failed */ }
      }

      // 4. Fallback to OpenAI
      if (appConfig.openaiApiKey) {
        try {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${appConfig.openaiApiKey}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: systemPrompt },
                ...messages
              ],
              max_tokens: 200,
              temperature: 0.7
            })
          });

          if (res.ok) {
            const data = await res.json();
            const text = data.choices?.[0]?.message?.content?.trim();
            if (text) return stripThinkTags(text);
          }
        } catch { /* All failed */ }
      }

      return null;
    }

    // -- InfluxDB Flux query helper -------------------------------------------
    async function fluxQuery(query) {
      const res = await fetch(`${INFLUXDB_URL}/api/v2/query?org=${INFLUXDB_ORG}`, {
        method: 'POST',
        headers: {
          'Authorization': `Token ${INFLUXDB_TOKEN}`,
          'Content-Type': 'application/vnd.flux',
          'Accept': 'application/csv'
        },
        body: query
      });
      if (!res.ok) throw new Error(`InfluxDB query failed: ${res.status}`);
      return parseFluxCSV(await res.text());
    }

    function parseFluxCSV(csv) {
      const lines = csv.trim().split('\n').filter(l => l && !l.startsWith('#'));
      if (lines.length < 2) return [];
      const headers = lines[0].split(',');
      return lines.slice(1).map(line => {
        const vals = line.split(',');
        const row = {};
        headers.forEach((h, i) => { row[h.trim()] = vals[i]?.trim(); });
        return row;
      });
    }

    // -- Fetch building data from InfluxDB ------------------------------------
    async function fetchBuildingData() {
      const base = `from(bucket: "${INFLUXDB_BUCKET}")`;

      const queries = {
        outdoor: `${base}
          |> range(start: -30m)
          |> filter(fn: (r) => r._measurement == "ruuvi" and r.name == "Ulkolampotila")
          |> filter(fn: (r) => r._field == "temperature" or r._field == "humidity")
          |> last()`,

        indoor: `${base}
          |> range(start: -30m)
          |> filter(fn: (r) => r._measurement == "ruuvi" and (r.name == "Olohuone" or r.name == "Keittio"))
          |> filter(fn: (r) => r._field == "temperature")
          |> last()`,

        heatpump: `${base}
          |> range(start: -10m)
          |> filter(fn: (r) => r._measurement == "thermia")
          |> filter(fn: (r) => r._field == "compressor_on" or r._field == "aux_heater_1" or r._field == "hot_water_temp")
          |> last()`,

        airquality: `${base}
          |> range(start: -30m)
          |> filter(fn: (r) => r._measurement == "ruuvi" and r.name == "Keittio")
          |> filter(fn: (r) => r._field == "co2" or r._field == "voc_index")
          |> last()`,

        lights: `${base}
          |> range(start: -10m)
          |> filter(fn: (r) => r._measurement == "lights" and r._field == "on")
          |> filter(fn: (r) => r._value == true)
          |> group()
          |> count()`,

        electricity: `${base}
          |> range(start: -1h)
          |> filter(fn: (r) => r._measurement == "electricity" and r._field == "price_cents_kwh")
          |> last()`
      };

      const results = await Promise.allSettled(
        Object.entries(queries).map(async ([key, q]) => {
          const rows = await fluxQuery(q);
          return [key, rows];
        })
      );

      const data = {};
      for (const result of results) {
        if (result.status === 'fulfilled') {
          const [key, rows] = result.value;
          data[key] = rows;
        }
      }
      return data;
    }

    // -- Format building data into context string -----------------------------
    function formatBuildingContext(data) {
      const parts = [];

      if (data.outdoor?.length) {
        const temp = data.outdoor.find(r => r._field === 'temperature');
        const hum  = data.outdoor.find(r => r._field === 'humidity');
        if (temp) parts.push(`Ulkol\u00e4mp\u00f6tila: ${parseFloat(temp._value).toFixed(1)}\u00b0C`);
        if (hum) parts.push(`Ulkokosteus: ${parseFloat(hum._value).toFixed(0)}%`);
      }

      if (data.indoor?.length) {
        for (const row of data.indoor) {
          if (row._field === 'temperature') {
            parts.push(`${row.name}: ${parseFloat(row._value).toFixed(1)}\u00b0C`);
          }
        }
      }

      if (data.heatpump?.length) {
        const comp = data.heatpump.find(r => r._field === 'compressor_on');
        const aux  = data.heatpump.find(r => r._field === 'aux_heater_1');
        const hw   = data.heatpump.find(r => r._field === 'hot_water_temp');
        if (comp) parts.push(`L\u00e4mp\u00f6pumpun kompressori: ${comp._value === 'true' || comp._value === '1' ? 'p\u00e4\u00e4ll\u00e4' : 'pois'}`);
        if (aux) parts.push(`Lis\u00e4l\u00e4mmitin: ${aux._value === 'true' || aux._value === '1' ? 'p\u00e4\u00e4ll\u00e4' : 'pois'}`);
        if (hw) parts.push(`K\u00e4ytt\u00f6vesi: ${parseFloat(hw._value).toFixed(0)}\u00b0C`);
      }

      if (data.airquality?.length) {
        const co2 = data.airquality.find(r => r._field === 'co2');
        const voc = data.airquality.find(r => r._field === 'voc_index');
        if (co2) parts.push(`Keitti\u00f6n CO2: ${parseFloat(co2._value).toFixed(0)} ppm`);
        if (voc) parts.push(`Keitti\u00f6n VOC: ${parseFloat(voc._value).toFixed(0)}`);
      }

      if (data.lights?.length) {
        const count = data.lights[0]?._value;
        if (count) parts.push(`Valoja p\u00e4\u00e4ll\u00e4: ${count}`);
      }

      if (data.electricity?.length) {
        const price = data.electricity[0]?._value;
        if (price) parts.push(`S\u00e4hk\u00f6n hinta: ${parseFloat(price).toFixed(2)} c/kWh`);
      }

      return parts.join('\n');
    }

    // -- Generate AI report (Ollama -> Claude -> OpenAI fallback) -------------
    async function generateReport(buildingData) {
      const context = formatBuildingContext(buildingData);
      if (!context) return null;

      const systemPrompt = 'Olet kotiautomaatioavustaja. Anna lyhyt 2 lauseen tilannekatsaus suomeksi. \u00c4l\u00e4 toista lukemia sellaisenaan, vaan tiivist\u00e4 oleellinen.';
      const userPrompt = `Talon tilanne juuri nyt:\n${context}`;

      // 1. Try Claude Bridge (MCP-powered, fetches its own data)
      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 15000);
        const res = await fetch('/api/chat/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: 'Anna lyhyt tilannekatsaus talon tämänhetkisestä tilanteesta.' }]
          }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);
        if (res.ok) {
          const data = await res.json();
          const text = data.response?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Bridge failed, try Ollama */ }

      // 2. Try Ollama (local, free)
      try {
        const model = appConfig.ollamaModel || 'llama3.1:8b';
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const res = await fetch('/api/ollama/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model,
            prompt: `${systemPrompt}\n\n${userPrompt}`,
            stream: false
          }),
          signal: controller.signal
        });
        clearTimeout(timeoutId);

        if (res.ok) {
          const data = await res.json();
          const text = data.response?.trim();
          if (text) return stripThinkTags(text);
        }
      } catch { /* Ollama failed, try Claude */ }

      // 3. Try Claude API (Haiku — fast and cheap, no MCP)
      if (appConfig.anthropicApiKey) {
        try {
          const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
              'x-api-key': appConfig.anthropicApiKey,
              'anthropic-version': '2023-06-01',
              'anthropic-dangerous-direct-browser-access': 'true',
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'claude-haiku-4-5-20251001',
              max_tokens: 150,
              system: systemPrompt,
              messages: [
                { role: 'user', content: userPrompt }
              ]
            })
          });

          if (res.ok) {
            const data = await res.json();
            const text = data.content?.[0]?.text?.trim();
            if (text) return stripThinkTags(text);
          }
        } catch { /* Claude failed, try OpenAI */ }
      }

      // 4. Fallback to OpenAI (gpt-4o-mini — cheap)
      if (appConfig.openaiApiKey) {
        try {
          const res = await fetch('https://api.openai.com/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${appConfig.openaiApiKey}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              model: 'gpt-4o-mini',
              messages: [
                { role: 'system', content: systemPrompt },
                { role: 'user', content: userPrompt }
              ],
              max_tokens: 150,
              temperature: 0.7
            })
          });

          if (res.ok) {
            const data = await res.json();
            const text = data.choices?.[0]?.message?.content?.trim();
            if (text) return stripThinkTags(text);
          }
        } catch { /* All failed */ }
      }

      return null;
    }

    // -- Auto-reload on backend version change ------------------------------
    let knownVersion = null;

    async function checkVersion() {
      try {
        const res = await fetch('/version.txt', { cache: 'no-store' });
        if (!res.ok) return;
        const version = (await res.text()).trim();
        if (knownVersion === null) {
          knownVersion = version;
        } else if (version !== knownVersion && kioskState !== STATES.GREETING) {
          window.location.reload();
        }
      } catch { /* network error — skip */ }
    }

    checkVersion();
    setInterval(checkVersion, 60_000);
  </script>
