name: marmorikatu-home-automation

services:
  influxdb:
    image: influxdb:2.7
    container_name: marmorikatu-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=wago
      - DOCKER_INFLUXDB_INIT_BUCKET=building_automation
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=wago-secret-token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Without this, if InfluxDB ever exits/stops it stays DOWN — which took the
    # whole data layer (Grafana, mobile app, all ingestion) offline on 2026-07-20.
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3.2
    container_name: marmorikatu-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./floorplan:/usr/share/grafana/public/build/img/floorplan:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Finnish date format (day.month.year)
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Europe/Helsinki
      - GF_DATE_FORMATS_FULL_DATE=DD/MM/YYYY HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_SECOND=HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_MINUTE=HH:mm
      - GF_DATE_FORMATS_INTERVAL_HOUR=DD/MM HH:mm
      - GF_DATE_FORMATS_INTERVAL_DAY=DD/MM
      - GF_DATE_FORMATS_INTERVAL_MONTH=MM/YYYY
      - GF_DATE_FORMATS_INTERVAL_YEAR=YYYY
      # Set Temperature Overview as default home dashboard
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/building_overview.json
      # Allow embedding in iframes
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Allow anonymous access (no login required for kiosk)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      # Serve from /grafana/ sub-path behind nginx HTTPS proxy
      - GF_SERVER_DOMAIN=192.168.1.160
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Legacy CSV-over-SFTP sync — superseded by the `plc` MQTT service.
  # Kept here (commented out) for emergency rollback. Remove once the MQTT
  # pipeline has been running cleanly for a soak period.
  # sync:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.sync
  #   container_name: marmorikatu-sync
  #   volumes:
  #     - ./data:/data
  #     - ./scripts:/scripts:ro
  #     - ./ssh:/ssh:ro
  #   environment:
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_TOKEN=wago-secret-token
  #     - INFLUXDB_ORG=wago
  #     - INFLUXDB_BUCKET=building_automation
  #     - DATA_DIR=/data
  #     - SSH_KEY=/ssh/wago_sync
  #     - SYNC_INTERVAL=300
  #     - REMOTE_HOST=192.168.1.10
  #     - REMOTE_USER=admin
  #     - REMOTE_PATH=/media/sd/CSV_Files/
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   restart: unless-stopped

  plc:
    build:
      context: .
      dockerfile: Dockerfile.plc
    container_name: marmorikatu-plc
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  ruuvi:
    build:
      context: .
      dockerfile: Dockerfile.ruuvi
    container_name: marmorikatu-ruuvi
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ruuvi/CC:F1:A2:8E:F8:8A/#
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Sensor name mappings (JSON format)
      - RUUVI_SENSOR_NAMES={"D1:86:61:6E:DF:E4":"Sauna","D3:1D:6A:1E:7C:4E":"Takka","D7:6C:BC:6D:29:46":"Olohuone","E6:DC:F8:EC:78:3B":"Keittiö","EE:3A:F4:B9:74:E5":"Jääkaappi","EF:AA:DF:C0:4F:8C":"Pakastin","F1:19:ED:0F:9A:F6":"Ulkolämpötila"}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # BLE identity ("who / anyone is home"). Requires the Ruuvi Gateway to be
  # configured to forward raw BLE advertisements to this broker/topic — until
  # that is enabled the container idles (no `ble` data). Start it after enabling
  # the gateway feed: `docker compose up -d ble`. See docs/lights-optimizer.md §F.
  ble:
    build:
      context: .
      dockerfile: Dockerfile.ble
    container_name: marmorikatu-ble
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - BLE_MQTT_TOPIC=ruuvi/#
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Optional friendly names for known static-MAC BLE tags (JSON MAC→name).
      - BLE_DEVICE_NAMES={}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # ── Presence platform (Zigbee) ──────────────────────────────────────────────
  # Both services are under the `presence` compose profile so a normal
  # `docker compose up -d` does NOT start them (zigbee2mqtt would crash-loop
  # before the coordinator exists). When the SLZB-06U is on the network:
  #   SLZB_HOST=<coordinator-ip> docker compose --profile presence up -d
  # See docs/presence-setup.md.
  zigbee2mqtt:
    image: koenkk/zigbee2mqtt:latest
    container_name: marmorikatu-zigbee2mqtt
    volumes:
      - ./zigbee2mqtt:/app/data
    ports:
      - "8080:8080"      # web frontend for pairing devices
    environment:
      - TZ=Europe/Helsinki
      - ZIGBEE2MQTT_CONFIG_MQTT_SERVER=mqtt://freenas.kherrala.fi:1883
      # SLZB-06U (CC2652P) over the network at 192.168.1.218:6638.
      # Override the IP with SLZB_HOST if it ever changes.
      - ZIGBEE2MQTT_CONFIG_SERIAL_PORT=tcp://${SLZB_HOST:-192.168.1.218}:6638
      - ZIGBEE2MQTT_CONFIG_SERIAL_BAUDRATE=115200
      - ZIGBEE2MQTT_CONFIG_SERIAL_ADAPTER=zstack
      - ZIGBEE2MQTT_CONFIG_SERIAL_DISABLE_LED=false
      # Coordinator TX power (dBm), max for the CC2652P.
      - ZIGBEE2MQTT_CONFIG_ADVANCED_TRANSMIT_POWER=20
    restart: unless-stopped

  # Presence Engine: normalizes Zigbee occupancy (Aqara FP300 mmWave, SONOFF
  # SNZB-03PR2 PIR) → per-room presence on presence/<room> + `presence`
  # InfluxDB measurement — the contract the lights-optimizer consumes.
  presence:
    build:
      context: .
      dockerfile: Dockerfile.presence
    container_name: marmorikatu-presence
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - Z2M_BASE_TOPIC=zigbee2mqtt
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - PRESENCE_ROOMS_FILE=/app/config/presence_rooms.json
    volumes:
      - ./config/presence_rooms.json:/app/config/presence_rooms.json:ro
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  thermia:
    build:
      context: .
      dockerfile: Dockerfile.thermia
    container_name: marmorikatu-thermia
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ThermIQ/ThermIQ-room2
      - MQTT_DATA_TOPIC=ThermIQ/marmorikatu/data
      - READ_INTERVAL=30
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: marmorikatu-mcp
    ports:
      - "3001:3001"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - MCP_PORT=3001
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - WEATHER_API_URL=http://weather:3020/api/weather
      - NEWS_API_URL=http://news:3021/api/news
      - BUS_API_URL=http://host.docker.internal:3010/api/departures
      - CALENDAR_API_URL=http://calendar:3022/api/calendar
      - HARMONY_HUB_HOST=${HARMONY_HUB_HOST:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  claude-bridge:
    build:
      context: .
      dockerfile: Dockerfile.claude-bridge
    container_name: marmorikatu-claude-bridge
    ports:
      - "3002:3002"
    environment:
      # db=kiosk: the remind 0.12.x rewrite has an incompatible on-disk schema,
      # so we start a fresh DB rather than migrate. The old home.db stays on the
      # remind-data volume, unused, for rollback.
      - MCP_URLS=http://mcp:3001/mcp/,http://remind:8765/sse?db=kiosk,http://playwright-mcp:3025/sse
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_MODEL=claude-haiku-4-5-20251001
      - OLLAMA_URL=http://192.168.1.36:11434
      # qwen3.6:35b = 35B MoE, 3B active — measured 58 tok/s + 4/4 Finnish
      # tool-calling on the 12GB-VRAM box. Rollback: gemma4:e4b.
      - OLLAMA_MODEL=qwen3.6:35b
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      # 64K KV cache on a 35B won't fit the 12GB card and forces the whole
      # model onto CPU. 32K keeps it GPU-resident once the box's Ollama can
      # see the 4070 Ti again. Bump only if a longer context is truly needed.
      - OLLAMA_NUM_CTX=32768
      - WHISPER_MODEL=base
      # Remote GPU whisper: OpenAI-compatible endpoint (speaches on the Ollama
      # box). Self-activating — while the endpoint is down, every request
      # falls back to the local CPU whisper after an instant refusal.
      # Set WHISPER_URL= (empty) to disable entirely.
      - WHISPER_URL=${WHISPER_URL-http://192.168.1.36:8971/v1/audio/transcriptions}
      - WHISPER_REMOTE_MODEL=${WHISPER_REMOTE_MODEL:-Systran/faster-whisper-large-v3-turbo}
      - BRIDGE_PORT=3002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mcp:
        condition: service_healthy
      remind:
        condition: service_healthy
    restart: unless-stopped

  remind:
    build:
      context: .
      dockerfile: Dockerfile.remind
    container_name: marmorikatu-remind
    ports:
      - "8765:8765"
    volumes:
      - remind-data:/root/.remind
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/stats?db=kiosk')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  playwright-mcp:
    build:
      context: .
      dockerfile: Dockerfile.playwright-mcp
    container_name: marmorikatu-playwright-mcp
    ports:
      - "3025:3025"
    restart: unless-stopped

  # Legacy HTTP poller against the standalone lights API — superseded by
  # the `plc` MQTT service which writes to the same `lights` measurement.
  # Kept here (commented out) for emergency rollback.
  # lights:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.lights
  #   container_name: marmorikatu-lights
  #   environment:
  #     - LIGHTS_API_URL=http://host.docker.internal:8080/api/lights
  #     - POLL_INTERVAL=300
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_TOKEN=wago-secret-token
  #     - INFLUXDB_ORG=wago
  #     - INFLUXDB_BUCKET=building_automation
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   restart: unless-stopped

  news:
    build:
      context: .
      dockerfile: Dockerfile.news
    container_name: marmorikatu-news
    environment:
      - NEWS_FEEDS=https://yle.fi/rss/uutiset/tuoreimmat,https://yle.fi/rss/t/18-146831/fi
      - NEWS_CACHE_TTL=900
      - NEWS_PORT=3021
    restart: unless-stopped

  weather:
    build:
      context: .
      dockerfile: Dockerfile.weather
    container_name: marmorikatu-weather
    environment:
      - WEATHER_LAT=61.4978
      - WEATHER_LON=23.7610
      - WEATHER_CACHE_TTL=600
      - WEATHER_PORT=3020
      # Deduced weather-warning thresholds (single source; the announcer speaks
      # these and the kiosk weather card shows them). Helle = FMI's ≥25 °C day.
      - WEATHER_WARN_HEAT_C=25.0
      - WEATHER_WARN_STORM_KMH=60.0
    restart: unless-stopped

  calendar:
    build:
      context: .
      dockerfile: Dockerfile.calendar
    container_name: marmorikatu-calendar
    volumes:
      - calendar-cache:/app/cache
    environment:
      - CALENDAR_ICAL_URL
      - CALENDAR_SCHOOL_ICAL_URL
      - CALENDAR_CACHE_TTL=900
      - CALENDAR_PORT=3022
      - PJHOY_USERNAME
      - PJHOY_PASSWORD
      - PJHOY_CUSTOMER_NUMBERS
    restart: unless-stopped

  kiosk:
    build:
      context: .
      dockerfile: Dockerfile.kiosk
    container_name: marmorikatu-kiosk
    environment:
      # Presence detector backend: faceapi (tfjs/WebGL, default) | pico
      # (pure-JS PICO) | motion (frame-diff). Change + restart to A/B on the
      # iPad; a ?detector= URL query overrides per-load. Trialing pico/motion
      # tests whether the WebGL/tfjs backend is what drives the ~2.5h reloads.
      - KIOSK_DETECTOR=faceapi
    ports:
      - "80:80"
      - "443:443"
      - "3080:3080"
      - "8888:8888"
    volumes:
      - kiosk-ssl:/etc/nginx/ssl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  electricity:
    build:
      context: .
      dockerfile: Dockerfile.electricity
    container_name: marmorikatu-electricity
    environment:
      - SPOT_HINTA_API_URL=https://api.spot-hinta.fi/TodayAndDayForward
      - RETRY_INTERVAL=600
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  indoor:
    build:
      context: .
      dockerfile: Dockerfile.indoor
    container_name: marmorikatu-indoor
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_SET_TOPIC=ThermIQ/marmorikatu/set
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Median across many sensors (Sauna hard-blacklisted in code).
      # Keittiö is reportedly the most accurate Ruuvi unit; included.
      - INDOOR_RUUVI_SENSORS=Olohuone,Keittiö,Takka
      - INDOOR_ROOM_FIELDS=MH_Seela,MH_Aarni,MH_aikuiset,MH_alakerta,Ylakerran_aula,Keittio,Eteinen,Kellari,Kellari_eteinen
      - AVERAGE_MINUTES=15
      # INDR_T is a runtime sensor input (no flash wear). 60s = quick
      # response to tier and demand changes; MIN_CHANGE=0.1°C still
      # gates actual MQTT publishes when the value hasn't moved.
      - CHECK_INTERVAL=60
      - MIN_CHANGE=0.1
      - INDOOR_MIN=19.0
      - INDOOR_MAX=25.0
      # Liveness: mark unhealthy if no successful publish-check in 15 min
      # (CHECK_INTERVAL is 60s, so this allows ~15 missed ticks).
      - HEALTH_MAX_AGE=900
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Spot-price tier classifier (analytics-only). Writes
  # heating_optimizer.{tier,price,outdoor_temp} to InfluxDB. Heat pump is
  # actually steered by indoor_temp_publisher's INDR_T bias — this service
  # no longer commands the unit.
  heating:
    build:
      context: .
      dockerfile: Dockerfile.heating
    container_name: marmorikatu-heating
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - PRICE_PERCENTILE_CHEAP=25
      - PRICE_PERCENTILE_EXPENSIVE=75
      - PRE_HEAT_HOURS=2
      # Liveness: this service only reclassifies at each ~15-min price-slot
      # boundary, so allow a generous staleness window before unhealthy.
      - HEALTH_MAX_AGE=1800
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  lights-optimizer:
    build:
      context: .
      dockerfile: Dockerfile.lights_optimizer
    container_name: marmorikatu-lights-optimizer
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - LOCAL_TZ=Europe/Helsinki
      - HOME_LAT=${HOME_LAT:-61.4978}
      - HOME_LON=${HOME_LON:-23.7610}
      # 5s tick for snappy presence→light response (InfluxDB load is nominal).
      # Safe against re-issuing commands mid-actuation: within_min_dwell holds a
      # light for MIN_DWELL after our own command (covers the ~12-13s PLC latency).
      - CHECK_INTERVAL=5
      - SUN_DARK_ELEVATION_DEG=8
      - SUNRISE_GRACE_MIN=60
      # Manual-grace + duration caps (v2). A human's light is held; transient
      # rooms cull after their cap; living/office/theater are never awake-hours off.
      - MANUAL_HOLD_MIN=90
      - BEDROOM_HOLD_MIN=30
      - TOILET_TIMEOUT_MIN=30
      - CIRCULATION_TIMEOUT_MIN=25
      - UTILITY_TIMEOUT_MIN=30
      # Gentle overnight cull 00:30 → 06:00 (a light switched on during the
      # window is protected). Front porch evening window ends 22:00.
      - OVERNIGHT_START_HOUR=0
      - OVERNIGHT_START_MIN=30
      - OVERNIGHT_END_HOUR=6
      - PORCH_OFF_HOUR=22
      # Whole-house-away: BLE-identity when available, else activity fallback.
      - LONG_ABSENCE_MIN=180
      - MIN_DWELL_SECONDS=300
      # Shadow mode: set LIGHTS_DRY_RUN=1 to log decisions without actuating.
      - DRY_RUN=${LIGHTS_DRY_RUN:-0}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Kiosk announcer: polls InfluxDB for state changes (HVAC alarms, sauna,
  # spot-price tier transitions, lights_optimizer decisions, air quality)
  # and pushes Finnish-language announcements to claude-bridge's SSE channel
  # so the kiosk speaks them even outside the camera/face greeting flow.
  # Quiet hours and the morning digest are enforced on the kiosk side.
  announcer:
    build:
      context: .
      dockerfile: Dockerfile.announcer
    container_name: marmorikatu-announcer
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - BRIDGE_PUSH_URL=http://claude-bridge:3002/announcements/push
      # 0=critical only, 1=normal, 2=verbose, 3=debug-every-light.
      # Initial rollout: max verbosity to surface every event we know how to
      # detect. Drop to 2 (or 1) once the user has tuned out the noise.
      - ANNOUNCE_VERBOSITY=3
      - ANNOUNCE_POLL_INTERVAL=30
      - ANNOUNCE_MAX_PER_TICK=5
      # Periodic news headlines (top of each hour, daytime). Spoken regardless
      # of ANNOUNCE_VERBOSITY. Set NEWS_ANNOUNCE_ENABLED=0 to turn off.
      - LOCAL_TZ=Europe/Helsinki
      - NEWS_ANNOUNCE_ENABLED=1
      - NEWS_API_URL=http://news:3021/api/news
      - NEWS_ANNOUNCE_START_HOUR=7
      - NEWS_ANNOUNCE_END_HOUR=20
      - NEWS_ANNOUNCE_NATIONAL_COUNT=3
      - NEWS_ANNOUNCE_REGIONAL_COUNT=1
      # Per-floor indoor heat warning (names the floor, suggests its cooler).
      # Weather warnings (helle/myrsky) are deduced by the weather service and
      # merely spoken here; their thresholds live on that service, not here.
      - WEATHER_API_URL=http://weather:3020/api/weather
      - ANNOUNCE_FLOOR_HOT_C=25.0
    depends_on:
      influxdb:
        condition: service_healthy
      claude-bridge:
        condition: service_started
      news:
        condition: service_started
    restart: unless-stopped

  # Unifi Protect webhook bridge: receives camera alarm POSTs on :5645 and
  # dispatches them through a JSON rules table (./config/unifi_webhook_rules.json)
  # to the kiosk announcement channel and/or arbitrary MQTT topics. Designed to
  # be extended with future triggers (e.g. person at front door → porch light
  # on) by editing the rules file — no code change required.
  unifi-webhook:
    build:
      context: .
      dockerfile: Dockerfile.unifi_webhook
    container_name: marmorikatu-unifi-webhook
    ports:
      - "5645:5645"
    volumes:
      - ./config/unifi_webhook_rules.json:/config/rules.json:ro
    environment:
      - UNIFI_WEBHOOK_PORT=5645
      - UNIFI_WEBHOOK_RULES=/config/rules.json
      - BRIDGE_PUSH_URL=http://claude-bridge:3002/announcements/push
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      # InfluxDB used only by mqtt_pulse to skip re-publishing ON for a
      # light that's already on (so we don't fight lights-optimizer).
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Set UNIFI_WEBHOOK_TOKEN to require an X-Webhook-Token header or
      # ?token=… query string. Default empty = open inside the LAN.
    depends_on:
      claude-bridge:
        condition: service_started
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: marmorikatu-backup
    volumes:
      - ./backups:/backups
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - RETENTION_DAYS=30
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
  calendar-cache:
  kiosk-ssl:
  remind-data:
