version: '3.8'

services:
  influxdb:
    image: influxdb:2.7
    container_name: wago-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=wago
      - DOCKER_INFLUXDB_INIT_BUCKET=building_automation
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=wago-secret-token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.3.2
    container_name: wago-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./floorplan:/usr/share/grafana/public/build/img/floorplan:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Finnish date format (day.month.year)
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Europe/Helsinki
      - GF_DATE_FORMATS_FULL_DATE=DD/MM/YYYY HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_SECOND=HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_MINUTE=HH:mm
      - GF_DATE_FORMATS_INTERVAL_HOUR=DD/MM HH:mm
      - GF_DATE_FORMATS_INTERVAL_DAY=DD/MM
      - GF_DATE_FORMATS_INTERVAL_MONTH=MM/YYYY
      - GF_DATE_FORMATS_INTERVAL_YEAR=YYYY
      # Set Temperature Overview as default home dashboard
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/building_overview.json
      # Allow embedding in iframes
      - GF_SECURITY_ALLOW_EMBEDDING=true
    depends_on:
      influxdb:
        condition: service_healthy

  sync:
    build:
      context: .
      dockerfile: Dockerfile.sync
    container_name: wago-sync
    volumes:
      - ./data:/data
      - ./scripts:/scripts:ro
      - ./ssh:/ssh:ro
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - DATA_DIR=/data
      - SSH_KEY=/ssh/wago_sync
      - SYNC_INTERVAL=300
      - REMOTE_HOST=192.168.1.10
      - REMOTE_USER=admin
      - REMOTE_PATH=/media/sd/CSV_Files/
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - sync

  ruuvi:
    build:
      context: .
      dockerfile: Dockerfile.ruuvi
    container_name: wago-ruuvi
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ruuvi/CC:F1:A2:8E:F8:8A/#
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Sensor name mappings (JSON format)
      - RUUVI_SENSOR_NAMES={"D1:86:61:6E:DF:E4":"Sauna","D3:1D:6A:1E:7C:4E":"Takka","D7:6C:BC:6D:29:46":"Olohuone","E6:DC:F8:EC:78:3B":"Keittiö","EE:3A:F4:B9:74:E5":"Jääkaappi","EF:AA:DF:C0:4F:8C":"Pakastin","F1:19:ED:0F:9A:F6":"Ulkolämpötila"}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  thermia:
    build:
      context: .
      dockerfile: Dockerfile.thermia
    container_name: wago-thermia
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ThermIQ/ThermIQ-room2
      - MQTT_DATA_TOPIC=ThermIQ/marmorikatu/data
      - READ_INTERVAL=30
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: wago-mcp
    ports:
      - "3001:3001"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - MCP_PORT=3001
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  lights:
    build:
      context: .
      dockerfile: Dockerfile.lights
    container_name: wago-lights
    environment:
      - LIGHTS_API_URL=http://host.docker.internal:8080/api/lights
      - POLL_INTERVAL=300
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  kiosk:
    build:
      context: .
      dockerfile: Dockerfile.kiosk
    container_name: wago-kiosk
    ports:
      - "80:80"
    restart: unless-stopped

  electricity:
    build:
      context: .
      dockerfile: Dockerfile.electricity
    container_name: wago-electricity
    environment:
      - SPOT_HINTA_API_URL=https://api.spot-hinta.fi/TodayAndDayForward
      - RETRY_INTERVAL=600
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  indoor:
    build:
      context: .
      dockerfile: Dockerfile.indoor
    container_name: wago-indoor
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_SET_TOPIC=ThermIQ/marmorikatu/set
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - INDOOR_SENSOR=Olohuone
      - AVERAGE_MINUTES=15
      - CHECK_INTERVAL=300
      - MIN_CHANGE=0.1
      - INDOOR_MIN=19.0
      - INDOOR_MAX=25.0
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  heating:
    build:
      context: .
      dockerfile: Dockerfile.heating
    container_name: wago-heating
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_WRITE_TOPIC=ThermIQ/marmorikatu/write
      - MQTT_SET_TOPIC=ThermIQ/marmorikatu/set
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - COMFORT_MIN=20
      - COMFORT_DEFAULT=22
      - COMFORT_MAX=23
      - REDUCTION_T=2
      - PRICE_PERCENTILE_CHEAP=25
      - PRICE_PERCENTILE_EXPENSIVE=75
      - PRE_HEAT_HOURS=2
      - BOILER_STEPS_DEFAULT=2
      - BOILER_COLD_LIMIT=-15
      - CHECK_INTERVAL=300
      - MIN_HOLD_MINUTES=15
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
