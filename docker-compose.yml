name: marmorikatu-home-automation

services:
  influxdb:
    image: influxdb:2.7
    container_name: marmorikatu-influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - influxdb-config:/etc/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=adminpassword
      - DOCKER_INFLUXDB_INIT_ORG=wago
      - DOCKER_INFLUXDB_INIT_BUCKET=building_automation
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=wago-secret-token
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:12.3.2
    container_name: marmorikatu-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./floorplan:/usr/share/grafana/public/build/img/floorplan:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      # Finnish date format (day.month.year)
      - GF_DATE_FORMATS_DEFAULT_TIMEZONE=Europe/Helsinki
      - GF_DATE_FORMATS_FULL_DATE=DD/MM/YYYY HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_SECOND=HH:mm:ss
      - GF_DATE_FORMATS_INTERVAL_MINUTE=HH:mm
      - GF_DATE_FORMATS_INTERVAL_HOUR=DD/MM HH:mm
      - GF_DATE_FORMATS_INTERVAL_DAY=DD/MM
      - GF_DATE_FORMATS_INTERVAL_MONTH=MM/YYYY
      - GF_DATE_FORMATS_INTERVAL_YEAR=YYYY
      # Set Temperature Overview as default home dashboard
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/etc/grafana/provisioning/dashboards/building_overview.json
      # Allow embedding in iframes
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # Allow anonymous access (no login required for kiosk)
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      # Serve from /grafana/ sub-path behind nginx HTTPS proxy
      - GF_SERVER_DOMAIN=192.168.1.160
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s:%(http_port)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Legacy CSV-over-SFTP sync — superseded by the `plc` MQTT service.
  # Kept here (commented out) for emergency rollback. Remove once the MQTT
  # pipeline has been running cleanly for a soak period.
  # sync:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.sync
  #   container_name: marmorikatu-sync
  #   volumes:
  #     - ./data:/data
  #     - ./scripts:/scripts:ro
  #     - ./ssh:/ssh:ro
  #   environment:
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_TOKEN=wago-secret-token
  #     - INFLUXDB_ORG=wago
  #     - INFLUXDB_BUCKET=building_automation
  #     - DATA_DIR=/data
  #     - SSH_KEY=/ssh/wago_sync
  #     - SYNC_INTERVAL=300
  #     - REMOTE_HOST=192.168.1.10
  #     - REMOTE_USER=admin
  #     - REMOTE_PATH=/media/sd/CSV_Files/
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   restart: unless-stopped

  plc:
    build:
      context: .
      dockerfile: Dockerfile.plc
    container_name: marmorikatu-plc
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  ruuvi:
    build:
      context: .
      dockerfile: Dockerfile.ruuvi
    container_name: marmorikatu-ruuvi
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ruuvi/CC:F1:A2:8E:F8:8A/#
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Sensor name mappings (JSON format)
      - RUUVI_SENSOR_NAMES={"D1:86:61:6E:DF:E4":"Sauna","D3:1D:6A:1E:7C:4E":"Takka","D7:6C:BC:6D:29:46":"Olohuone","E6:DC:F8:EC:78:3B":"Keittiö","EE:3A:F4:B9:74:E5":"Jääkaappi","EF:AA:DF:C0:4F:8C":"Pakastin","F1:19:ED:0F:9A:F6":"Ulkolämpötila"}
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  thermia:
    build:
      context: .
      dockerfile: Dockerfile.thermia
    container_name: marmorikatu-thermia
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC=ThermIQ/ThermIQ-room2
      - MQTT_DATA_TOPIC=ThermIQ/marmorikatu/data
      - READ_INTERVAL=30
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  mcp:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: marmorikatu-mcp
    ports:
      - "3001:3001"
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - MCP_PORT=3001
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - WEATHER_API_URL=http://weather:3020/api/weather
      - NEWS_API_URL=http://news:3021/api/news
      - BUS_API_URL=http://host.docker.internal:3010/api/departures
      - CALENDAR_API_URL=http://calendar:3022/api/calendar
      - HARMONY_HUB_HOST=${HARMONY_HUB_HOST:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  claude-bridge:
    build:
      context: .
      dockerfile: Dockerfile.claude-bridge
    container_name: marmorikatu-claude-bridge
    ports:
      - "3002:3002"
    environment:
      - MCP_URLS=http://mcp:3001/mcp/,http://remind:8765/sse?db=home,http://playwright-mcp:3025/sse
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - CLAUDE_MODEL=claude-haiku-4-5-20251001
      - OLLAMA_URL=http://192.168.1.36:11434
      - OLLAMA_MODEL=gemma4:e4b
      - OLLAMA_NUM_CTX=65536
      - WHISPER_MODEL=base
      - BRIDGE_PORT=3002
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mcp:
        condition: service_healthy
      remind:
        condition: service_healthy
    restart: unless-stopped

  remind:
    build:
      context: .
      dockerfile: Dockerfile.remind
    container_name: marmorikatu-remind
    ports:
      - "8765:8765"
    volumes:
      - remind-data:/root/.remind
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/api/v1/stats?db=home')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  playwright-mcp:
    build:
      context: .
      dockerfile: Dockerfile.playwright-mcp
    container_name: marmorikatu-playwright-mcp
    ports:
      - "3025:3025"
    restart: unless-stopped

  # Legacy HTTP poller against the standalone lights API — superseded by
  # the `plc` MQTT service which writes to the same `lights` measurement.
  # Kept here (commented out) for emergency rollback.
  # lights:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile.lights
  #   container_name: marmorikatu-lights
  #   environment:
  #     - LIGHTS_API_URL=http://host.docker.internal:8080/api/lights
  #     - POLL_INTERVAL=300
  #     - INFLUXDB_URL=http://influxdb:8086
  #     - INFLUXDB_TOKEN=wago-secret-token
  #     - INFLUXDB_ORG=wago
  #     - INFLUXDB_BUCKET=building_automation
  #   extra_hosts:
  #     - "host.docker.internal:host-gateway"
  #   depends_on:
  #     influxdb:
  #       condition: service_healthy
  #   restart: unless-stopped

  news:
    build:
      context: .
      dockerfile: Dockerfile.news
    container_name: marmorikatu-news
    environment:
      - NEWS_FEEDS=https://yle.fi/rss/uutiset/tuoreimmat,https://yle.fi/rss/t/18-146831/fi
      - NEWS_CACHE_TTL=900
      - NEWS_PORT=3021
    restart: unless-stopped

  weather:
    build:
      context: .
      dockerfile: Dockerfile.weather
    container_name: marmorikatu-weather
    environment:
      - WEATHER_LAT=61.4978
      - WEATHER_LON=23.7610
      - WEATHER_CACHE_TTL=600
      - WEATHER_PORT=3020
    restart: unless-stopped

  calendar:
    build:
      context: .
      dockerfile: Dockerfile.calendar
    container_name: marmorikatu-calendar
    volumes:
      - calendar-cache:/app/cache
    environment:
      - CALENDAR_ICAL_URL
      - CALENDAR_SCHOOL_ICAL_URL
      - CALENDAR_CACHE_TTL=900
      - CALENDAR_PORT=3022
      - PJHOY_USERNAME
      - PJHOY_PASSWORD
      - PJHOY_CUSTOMER_NUMBERS
    restart: unless-stopped

  kiosk:
    build:
      context: .
      dockerfile: Dockerfile.kiosk
    container_name: marmorikatu-kiosk
    ports:
      - "80:80"
      - "443:443"
      - "3080:3080"
      - "8888:8888"
    volumes:
      - kiosk-ssl:/etc/nginx/ssl
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  electricity:
    build:
      context: .
      dockerfile: Dockerfile.electricity
    container_name: marmorikatu-electricity
    environment:
      - SPOT_HINTA_API_URL=https://api.spot-hinta.fi/TodayAndDayForward
      - RETRY_INTERVAL=600
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  indoor:
    build:
      context: .
      dockerfile: Dockerfile.indoor
    container_name: marmorikatu-indoor
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_SET_TOPIC=ThermIQ/marmorikatu/set
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Median across many sensors (Sauna hard-blacklisted in code).
      # Keittiö is reportedly the most accurate Ruuvi unit; included.
      - INDOOR_RUUVI_SENSORS=Olohuone,Keittiö,Takka
      - INDOOR_ROOM_FIELDS=MH_Seela,MH_Aarni,MH_aikuiset,MH_alakerta,Ylakerran_aula,Keittio,Eteinen,Kellari,Kellari_eteinen
      - AVERAGE_MINUTES=15
      # INDR_T is a runtime sensor input (no flash wear). 60s = quick
      # response to tier and demand changes; MIN_CHANGE=0.1°C still
      # gates actual MQTT publishes when the value hasn't moved.
      - CHECK_INTERVAL=60
      - MIN_CHANGE=0.1
      - INDOOR_MIN=19.0
      - INDOOR_MAX=25.0
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Spot-price tier classifier (analytics-only). Writes
  # heating_optimizer.{tier,price,outdoor_temp} to InfluxDB. Heat pump is
  # actually steered by indoor_temp_publisher's INDR_T bias — this service
  # no longer commands the unit.
  heating:
    build:
      context: .
      dockerfile: Dockerfile.heating
    container_name: marmorikatu-heating
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - PRICE_PERCENTILE_CHEAP=25
      - PRICE_PERCENTILE_EXPENSIVE=75
      - PRE_HEAT_HOURS=2
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  lights-optimizer:
    build:
      context: .
      dockerfile: Dockerfile.lights_optimizer
    container_name: marmorikatu-lights-optimizer
    environment:
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      - MQTT_TOPIC_PREFIX=marmorikatu
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - LOCAL_TZ=Europe/Helsinki
      - HOME_LAT=${HOME_LAT:-61.4978}
      - HOME_LON=${HOME_LON:-23.7610}
      - CHECK_INTERVAL=60
      - SUNRISE_GRACE_MIN=60
      - WORKDAY_START_HOUR=9
      - WORKDAY_END_HOUR=16
      - TOILET_TIMEOUT_MIN=30
      - STAIRCASE_TIMEOUT_MIN=30
      - OCCUPANCY_WINDOW_MIN=30
      - LONG_ABSENCE_MIN=120
      - CO2_OCCUPANCY_DELTA_PPM=30
      - MANUAL_HOLD_MIN=90
      - BEDROOM_HOLD_MIN=30
      - TERRACE_OFF_HOUR=22
      # Deep-night auto-off window (00:30 → AFTER_MIDNIGHT_END_HOUR). Stops
      # before the early-riser routine so the toilet light isn't flapped off
      # against an active user.
      - AFTER_MIDNIGHT_END_HOUR=5
      - DRY_RUN=0
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  # Kiosk announcer: polls InfluxDB for state changes (HVAC alarms, sauna,
  # spot-price tier transitions, lights_optimizer decisions, air quality)
  # and pushes Finnish-language announcements to claude-bridge's SSE channel
  # so the kiosk speaks them even outside the camera/face greeting flow.
  # Quiet hours and the morning digest are enforced on the kiosk side.
  announcer:
    build:
      context: .
      dockerfile: Dockerfile.announcer
    container_name: marmorikatu-announcer
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      - BRIDGE_PUSH_URL=http://claude-bridge:3002/announcements/push
      # 0=critical only, 1=normal, 2=verbose, 3=debug-every-light.
      # Initial rollout: max verbosity to surface every event we know how to
      # detect. Drop to 2 (or 1) once the user has tuned out the noise.
      - ANNOUNCE_VERBOSITY=3
      - ANNOUNCE_POLL_INTERVAL=30
      - ANNOUNCE_MAX_PER_TICK=5
    depends_on:
      influxdb:
        condition: service_healthy
      claude-bridge:
        condition: service_started
    restart: unless-stopped

  # Unifi Protect webhook bridge: receives camera alarm POSTs on :5645 and
  # dispatches them through a JSON rules table (./config/unifi_webhook_rules.json)
  # to the kiosk announcement channel and/or arbitrary MQTT topics. Designed to
  # be extended with future triggers (e.g. person at front door → porch light
  # on) by editing the rules file — no code change required.
  unifi-webhook:
    build:
      context: .
      dockerfile: Dockerfile.unifi_webhook
    container_name: marmorikatu-unifi-webhook
    ports:
      - "5645:5645"
    volumes:
      - ./config/unifi_webhook_rules.json:/config/rules.json:ro
    environment:
      - UNIFI_WEBHOOK_PORT=5645
      - UNIFI_WEBHOOK_RULES=/config/rules.json
      - BRIDGE_PUSH_URL=http://claude-bridge:3002/announcements/push
      - MQTT_BROKER=freenas.kherrala.fi
      - MQTT_PORT=1883
      # InfluxDB used only by mqtt_pulse to skip re-publishing ON for a
      # light that's already on (so we don't fight lights-optimizer).
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - INFLUXDB_ORG=wago
      - INFLUXDB_BUCKET=building_automation
      # Set UNIFI_WEBHOOK_TOKEN to require an X-Webhook-Token header or
      # ?token=… query string. Default empty = open inside the LAN.
    depends_on:
      claude-bridge:
        condition: service_started
      influxdb:
        condition: service_healthy
    restart: unless-stopped

  backup:
    build:
      context: .
      dockerfile: Dockerfile.backup
    container_name: marmorikatu-backup
    volumes:
      - ./backups:/backups
    environment:
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_TOKEN=wago-secret-token
      - RETENTION_DAYS=30
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb-data:
  influxdb-config:
  grafana-data:
  calendar-cache:
  kiosk-ssl:
  remind-data:
